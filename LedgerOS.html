<title>LedgerOS — Personal Accounting</title>
<style>
:root{
  --bg:#f4f2ec; --panel:#ffffff; --panel2:#faf8f2; --line:#e2ddd0; --text:#221f1a; --muted:#75705f;
  --accent:#9a6b1f; --accent2:#b9822b; --green:#146c43; --red:#a3352c; --chip:#efe9d8; --input:#ffffff;
  --r:9px; --mono:'IBM Plex Mono','SF Mono',ui-monospace,Consolas,monospace;
  --serif:'Source Serif 4','Iowan Old Style',Georgia,serif;
  --sans:'Inter',-apple-system,'Segoe UI',Roboto,Arial,sans-serif;
  --head:linear-gradient(180deg,#faf8f2,#f4f2ec);
}
[data-theme="dark"]{
  --bg:#181510; --panel:#211d17; --panel2:#26221a; --line:#3a3428; --text:#eee7d8; --muted:#a89d84;
  --accent:#d9a643; --accent2:#e8bc63; --green:#3fbf85; --red:#e3695f; --chip:#2c271d; --input:#1c1812;
  --head:linear-gradient(180deg,#1c1812,#181510);
}
*{box-sizing:border-box}
html{height:100%}
body{margin:0}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:var(--basefs,14px);line-height:1.5;-webkit-font-smoothing:antialiased}
h1,h2,h3{font-family:var(--serif);font-weight:600;margin:0}
.num,td.num,.mono{font-family:var(--mono);font-variant-numeric:tabular-nums}
button,input,select,textarea{font-family:inherit;font-size:13.5px}
input,select,textarea{background:var(--input);border:1px solid var(--line);color:var(--text);border-radius:8px;padding:8px 10px;width:100%}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent)}
label.fl{display:block;font-size:10.5px;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);margin:0 0 4px;font-weight:600}
a{color:var(--accent)}
button{cursor:pointer}

header{display:flex;align-items:center;gap:6px;padding:10px 20px;background:var(--head);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:20}
header .brand{display:flex;align-items:center;gap:9px;margin-right:14px;white-space:nowrap}
header .brand .mark{width:26px;height:26px;border-radius:7px;background:var(--accent);color:#1a1508;display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-weight:700;font-size:15px}
header h1{font-size:15.5px;font-weight:650;white-space:nowrap}
nav{display:flex;gap:2px;flex-wrap:wrap}
nav button{background:none;border:none;color:var(--muted);padding:8px 12px;border-radius:8px;font-size:13px;font-weight:600}
nav button:hover{background:var(--chip);color:var(--text)}
nav button.on{background:var(--accent);color:#1a1508}
.spacer{flex:1}
.cloud{display:flex;align-items:center;gap:6px;font-size:11.5px;color:var(--muted);background:var(--chip);border:1px solid var(--line);border-radius:999px;padding:5px 11px;cursor:pointer;white-space:nowrap}
.dot{width:7px;height:7px;border-radius:50%;background:var(--muted)} .dot.ok{background:var(--green)} .dot.err{background:var(--red)}
.tbtn{background:var(--chip);border:1px solid var(--line);color:var(--text);border-radius:8px;padding:7px 10px;font-size:13px}
.tbtn:hover{background:var(--line)}

main{padding:22px;max-width:1240px;margin:0 auto;min-height:80vh}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:12px;margin-bottom:20px}
.kpi{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:16px}
.kpi .l{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;font-weight:600}
.kpi .v{font-family:var(--mono);font-size:23px;font-weight:600;margin-top:6px}
.kpi .v.g{color:var(--green)} .kpi .v.r{color:var(--red)}
.g{color:var(--green)} .r{color:var(--red)}

.panel{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:16px;margin-bottom:16px}
.panel h3{font-size:12px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin:0 0 12px;font-weight:700}
.row{display:flex;align-items:center;gap:9px;flex-wrap:wrap}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}

table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;color:var(--muted);font-weight:700;font-size:10.5px;text-transform:uppercase;letter-spacing:.04em;padding:8px 9px;border-bottom:1px solid var(--line);white-space:nowrap}
td{padding:8px 9px;border-bottom:1px solid var(--line)}
tr.click{cursor:pointer} tr.click:hover td{background:var(--panel2)}
.num{text-align:right}
tfoot td{font-weight:700;border-top:2px solid var(--line);border-bottom:none}

.badge{font-size:10.5px;padding:2px 8px;border-radius:999px;white-space:nowrap;font-weight:700;background:var(--chip);color:var(--muted)}
.badge.pos{color:var(--green)} .badge.neg{color:var(--red)}

.btn{border:none;border-radius:8px;padding:9px 16px;font-weight:650;font-size:13px}
.btn.pri{background:var(--accent);color:#1a1508}
.btn.pri:hover{background:var(--accent2)}
.btn.pri:disabled{opacity:.4;cursor:not-allowed}
.btn.ghost{background:var(--chip);color:var(--text);border:1px solid var(--line)}

.btn.del{background:transparent;color:var(--red);border:1px solid var(--line)}

<body>
<header>
  <div class="brand"><div class="mark">₪</div><h1>LedgerOS</h1></div>
  <nav id="nav"></nav>
  <div class="spacer"></div>
  <div class="cloud noprint" id="cloudBtn" onclick="openSettings()"><span class="dot" id="dot"></span><span id="statusTxt">Local only</span></div>
  <button class="themeBtn noprint" id="themeBtn" onclick="toggleTheme()" title="Toggle theme">🌙</button>
</header>
<main id="app"></main>
<div class="toast" id="toast"></div>
<div id="modalRoot"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.110.8"></script>

<script>
const SEED = {"accounts":[],"ledger":[],"budget":[],"templates":[],"categories":[],"subcategories":[],"provisionGroups":[],"accrualMappings":[]};
</script>
<script>
/* ============================= STATE ============================= */
const APP_VERSION = '1.14.0';
let D = {accounts:[], ledger:[], budget:[], templates:[], categories:[], subcategories:[], provisionGroups:[], accrualMappings:[]};
let jvDrafts = []; // local-only scratchpad of unfinished JVs — not synced to cloud
function loadJVDrafts(){ try{ return JSON.parse(localStorage.getItem('jvDrafts_v1')||'[]'); }catch(e){ return []; } }
function saveJVDraftsList(){ try{ localStorage.setItem('jvDrafts_v1', JSON.stringify(jvDrafts)); }catch(e){} }
let ACC_BY_ID = {};
let SB = null, usingCloud = false;
let screen = 'dashboard';
let ledgerPage = 0;
const PAGE_SIZE = 50;
let ledgerFilter = {acc:'', from:'', to:'', q:'', jv:'', preset:'', specificMonth:''};
let statementAcc = null;
let allocSelected = new Set();
let allocTab = 'unalloc';
let reconcileAcc = null;

/* ============================= UTIL ============================= */
function esc(s){ return (s===null||s===undefined) ? '' : String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function money(n){ n = Number(n)||0; if(Math.abs(n)<0.005) n=0; const s = Math.abs(n).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2}); return (n<0?'-':'')+s; }
function moneyClass(n){ n=Number(n)||0; return n<0?'r':(n>0?'g':''); }
// Formats a numeric value with thousands separators + 2 decimals for display in an editable field, keeping the sign.
function fmt2(n){ if(n===''||n===null||n===undefined||isNaN(Number(n))) return ''; let num=Number(n); if(Math.abs(num)<0.005) num=0; const s=Math.abs(num).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2}); return (num<0?'-':'')+s; }
function todayStr(){ return new Date().toISOString().slice(0,10); }
function fmtDateShort(d){
  if(!d) return '';
  const dt = new Date(d+'T00:00:00');
  const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return String(dt.getDate()).padStart(2,'0')+'-'+months[dt.getMonth()]+'-'+dt.getFullYear();
}
function monthOf(d){ return (d||'').slice(0,7); }
function toast(msg,bad){ const t=document.getElementById('toast'); t.textContent=msg; t.className='toast show'+(bad?' bad':''); clearTimeout(window._tt); window._tt=setTimeout(()=>t.className='toast', bad?7000:2200); }
function accName(id){ const a=ACC_BY_ID[id]; return a? (a.id+' — '+(a.name? a.name.replace(/^\d+\s*-\s*/,'') : a.descr)) : (id!==null&&id!==undefined? (id+' — (unknown)') : '(none)'); }
function accShort(id){ const a=ACC_BY_ID[id]; return a? (a.name? a.name.replace(/^\d+\s*-\s*/,'') : a.descr) : '(unknown)'; }
function rebuildIndex(){ ACC_BY_ID={}; D.accounts.forEach(a=>ACC_BY_ID[a.id]=a); }
function postableAccounts(){ return D.accounts.filter(a=>(a.acc_type==='Individual Account'||a.acc_type==='Accrual Account') && a.status!=='Deleted' && a.status!=='Inactive').sort((a,b)=>a.id-b.id); }
function filterableAccounts(){ return D.accounts.filter(a=>(a.acc_type==='Individual Account'||a.acc_type==='Accrual Account') && a.status!=='Deleted').sort((a,b)=>a.id-b.id); }
function nextJV(){ let m=0; D.ledger.forEach(l=>{ if(l.jv&&l.jv>m) m=l.jv; }); return m+1; }
function nextAllocNum(){ let m=0; D.ledger.forEach(l=>{ if(l.alloc&&l.alloc>m) m=l.alloc; }); return m+1; }
function pad5(n){ return String(n).padStart(5,'0'); }
function nextLedgerId(){ let m=0; D.ledger.forEach(l=>{ if(l.id>m) m=l.id; }); return m+1; }
function nextBudgetId(){ let m=0; D.budget.forEach(l=>{ if(l.id>m) m=l.id; }); return m+1; }

/* ---- Category / Subcategory structure ---- */
function sortedCategories(){ return [...D.categories].sort((a,b)=>a.digit-b.digit); }
function subcategoriesFor(catDigit){ return D.subcategories.filter(s=>s.catDigit===catDigit).sort((a,b)=>a.subCode-b.subCode); }
function nextSubCode(catDigit){ let m=0; subcategoriesFor(catDigit).forEach(s=>{ if(s.subCode>m) m=s.subCode; }); return m+1; }
function nextAccNumber(catDigit, subCode){
  const used = new Set();
  D.accounts.forEach(a=>{
    if(Math.floor(a.id/10000)===catDigit && Math.floor((a.id%10000)/100)===subCode){
      used.add(a.id%100);
    }
  });
  for(let seq=1; seq<=99; seq++){
    if(!used.has(seq)) return catDigit*10000 + subCode*100 + seq;
  }
  return null; // bucket genuinely full (all 99 slots taken)
}

/* ============================= PERSIST ============================= */
function persistLocal(){ try{ localStorage.setItem('ledgerData_v1', JSON.stringify(D)); }catch(e){ console.warn('local save failed',e); } }

function loadSeedIntoD(){
  D.accounts = SEED.accounts.map(a=>({...a}));
  D.ledger = SEED.ledger.map((r,i)=>({id:i+1, jv:r[0], date:r[1], acc:r[2], descr:r[3], amt:r[4], alloc:r[5], allocatable: !!r[6]}));
  D.budget = SEED.budget.map((r,i)=>({id:i+1, date:r[0], acc:r[1], descr:r[2], amt:r[3]}));
  D.templates = SEED.templates.map(t=>({...t}));
  D.categories = (SEED.categories||[]).map(c=>({...c}));
  D.subcategories = (SEED.subcategories||[]).map(s=>({...s}));
  D.provisionGroups = (SEED.provisionGroups||[]).map(g=>({...g}));
  D.accrualMappings = (SEED.accrualMappings||[]).map(m=>({...m}));
}

async function boot(){
  applyTheme(localStorage.getItem('uiTheme') || 'light');
  syncQueue = loadSyncQueue();
  jvDrafts = loadJVDrafts();
  const url = localStorage.getItem('sb_url'), key = localStorage.getItem('sb_key');
  if(url && key){
    try{ await connectCloud(url,key,true); return; }catch(e){ console.warn(e); }
    // connection failed (likely offline) — fall back to this device's own cached copy, same as before
    const local = localStorage.getItem('ledgerData_v1');
    if(local){
      D = JSON.parse(local);
      if(!Array.isArray(D.categories)) D.categories = [];
      if(!Array.isArray(D.subcategories)) D.subcategories = [];
      if(!Array.isArray(D.provisionGroups)) D.provisionGroups = [];
      if(!Array.isArray(D.accrualMappings)) D.accrualMappings = [];
      persistLocal();
      rebuildIndex();
      renderNav(); go('dashboard');
      updateSyncBadge();
      toast('Offline — showing your last synced data', true);
      return;
    }
  }
  // no saved credentials on this device — this file carries no data of its own, so nothing loads until connected
  renderConnectGate();
}
function renderConnectGate(){
  document.getElementById('nav').innerHTML = '';
  document.getElementById('app').innerHTML = `
    <div style="max-width:420px;margin:60px auto">
      <div class="panel">
        <h3 style="text-align:center">Connect to Continue</h3>
        <p class="mut" style="font-size:13px;text-align:center;margin-bottom:20px">This file doesn't contain any ledger data. Enter your Supabase project details to load it.</p>
        <label class="fl">Project URL</label><input id="gateUrl" placeholder="https://xxxx.supabase.co" style="margin-bottom:10px">
        <label class="fl">Anon public key</label><input id="gateKey" placeholder="eyJ..." style="margin-bottom:16px" onkeydown="if(event.key==='Enter') gateConnect()">
        <button class="btn pri" style="width:100%" onclick="gateConnect()">Connect</button>
        <div id="gateError" class="mut" style="color:var(--red);margin-top:10px;font-size:12.5px"></div>
      </div>
    </div>`;
}
async function gateConnect(){
  const url = document.getElementById('gateUrl').value.trim();
  const key = document.getElementById('gateKey').value.trim();
  const errEl = document.getElementById('gateError');
  if(!url || !key){ errEl.textContent = 'Enter both the Project URL and Anon Key.'; return; }
  errEl.textContent = 'Connecting…';
  try{
    await connectCloud(url, key, false);
  } catch(e){
    renderConnectGate();
    const err2 = document.getElementById('gateError');
    if(err2) err2.textContent = 'Could not connect — check your URL and key.';
  }
}

/* ============================= CLOUD (Supabase) ============================= */
function setStatus(text, kind){
  document.getElementById('statusTxt').textContent=text;
  const dot=document.getElementById('dot'); dot.className='dot'+(kind?(' '+kind):'');
}
async function connectCloud(url,key,silent){
  setStatus('Connecting…');
  SB = window.supabase.createClient(url,key);
  const probe = await SB.from('pd_accounts').select('id',{count:'exact',head:true});
  if(probe.error){ setStatus('Connect failed','err'); if(!silent) toast('Could not connect: '+probe.error.message, true); throw probe.error; }
  usingCloud = true;
  localStorage.setItem('sb_url',url); localStorage.setItem('sb_key',key);
  const count = probe.count||0;
  if(count===0){
    await seedCloud();
  } else {
    await fetchAllFromCloud();
  }
  rebuildIndex();
  renderNav(); go(screen||'dashboard');
  setStatus('Cloud synced','ok');
  await flushSyncQueue();
}
function disconnectCloud(){
  usingCloud=false; SB=null;
  localStorage.removeItem('sb_url'); localStorage.removeItem('sb_key');
  setStatus('Local only');
  toast('Disconnected — using local storage now');
}

/* ============================= OFFLINE SYNC QUEUE ============================= */
// Every write to accounts/ledger/budget/templates goes through syncWrite(). If we're online it
// writes straight to Supabase. If we're offline (or the write fails), it's queued locally with a
// "base" version stamp — the updated_at this device last saw for that row. When we reconnect,
// flushSyncQueue() replays the queue, but for each row first checks whether the server's current
// updated_at still matches that base. If it does, nobody else touched it — apply safely. If it
// doesn't, someone else's change already landed there first — that's a real conflict, and we stop
// and ask which version to keep rather than silently picking one.
let syncQueue = [];
let syncConflicts = [];
function loadSyncQueue(){ try{ return JSON.parse(localStorage.getItem('syncQueue_v1')||'[]'); }catch(e){ return []; } }
function saveSyncQueue(){ try{ localStorage.setItem('syncQueue_v1', JSON.stringify(syncQueue)); }catch(e){} }
function nowISO(){ return new Date().toISOString(); }
function updateSyncBadge(){
  const el = document.getElementById('statusTxt');
  if(!el) return;
  if(syncConflicts.length){ setStatus(syncConflicts.length+' conflict'+(syncConflicts.length>1?'s':'')+' to resolve','err'); }
  else if(syncQueue.length){ setStatus(syncQueue.length+' change'+(syncQueue.length>1?'s':'')+' pending sync', usingCloud?'':null); }
  else if(usingCloud){ setStatus('Cloud synced','ok'); }
  else { setStatus('Local only'); }
}
// kind: 'upsert' | 'delete'. row: full row object (must include pk). base: updated_at this device
// last saw for that row before this edit (null = brand new row, never existed before).
async function syncWrite(table, kind, row, base){
  if(kind==='upsert') row.updated_at = nowISO();
  const online = usingCloud && SB && navigator.onLine!==false;
  if(online){
    try{
      const r = kind==='upsert' ? await SB.from(table).upsert(row) : await SB.from(table).delete().eq('id', row.id);
      if(!r.error){ updateSyncBadge(); return {ok:true}; }
      console.warn('sync write failed, queueing:', r.error.message);
    } catch(e){ console.warn('sync write exception, queueing:', e); }
  }
  syncQueue.push({qid: Date.now()+'_'+Math.random().toString(36).slice(2), table, kind, row: kind==='upsert'?row:{id:row.id}, base, ts: nowISO()});
  saveSyncQueue();
  updateSyncBadge();
  return {ok:false, queued:true};
}
async function flushSyncQueue(){
  if(!usingCloud || !SB || !syncQueue.length){ updateSyncBadge(); return; }
  setStatus('Syncing '+syncQueue.length+' pending change(s)…');
  const remaining = [];
  const newConflicts = [];
  for(const op of syncQueue){
    let serverRow = null, serverUpdatedAt = null;
    try{
      const r = await SB.from(op.table).select('*').eq('id', op.row.id).maybeSingle();
      serverRow = r.data || null;
      serverUpdatedAt = serverRow ? (serverRow.updated_at || null) : null;
    } catch(e){ remaining.push(op); continue; }
    const baseVal = op.base || null;
    if(serverUpdatedAt !== baseVal){
      // someone else's write already landed on this row since we last saw it — real conflict
      newConflicts.push({op, serverRow});
      continue;
    }
    try{
      const r = op.kind==='upsert' ? await SB.from(op.table).upsert(op.row) : await SB.from(op.table).delete().eq('id', op.row.id);
      if(r.error) remaining.push(op);
    } catch(e){ remaining.push(op); }
  }
  syncQueue = remaining;
  saveSyncQueue();
  if(newConflicts.length){
    syncConflicts = syncConflicts.concat(newConflicts);
    updateSyncBadge();
    showConflictModal();
  } else if(remaining.length){
    updateSyncBadge();
    toast(remaining.length+' change(s) still couldn\'t sync — will retry later', true);
  } else {
    updateSyncBadge();
    toast('All pending changes synced ✓');
    await fetchAllFromCloud(); rebuildIndex(); go(screen||'dashboard');
  }
}
function fieldLabelsFor(table){
  return {
    pd_ledger: ['jv','entry_date','acc','descr','amt','alloc'],
    pd_accounts: ['descr','category','status','stmt_balance','is_savings','is_allocatable','is_credit_card','credit_limit'],
    pd_budget: ['entry_date','acc','descr','amt'],
    pd_templates: ['name'],
    pd_drafts: ['entry_date','saved_at'],
    pd_provisions: ['name'],
  }[table] || [];
}
function rowSummary(table, row){
  if(!row) return '<span class="mut">(deleted)</span>';
  const fields = fieldLabelsFor(table);
  return fields.map(f=> f+': <b>'+esc(String(row[f]===undefined||row[f]===null?'—':row[f]))+'</b>').join(', ');
}
let conflictChoices = {}; // qid -> 'mine'|'server'
function showConflictModal(){
  if(!syncConflicts.length){ closeModal(); return; }
  syncConflicts.forEach(c=>{ if(!conflictChoices[c.op.qid]) conflictChoices[c.op.qid] = 'mine'; });
  showModal(`
    <h3>⚠ ${syncConflicts.length} Sync Conflict${syncConflicts.length>1?'s':''}</h3>
    <p class="mut" style="font-size:13px">These were changed elsewhere before this device could sync its own changes. Pick which version to keep for each, then apply.</p>
    <div style="max-height:50vh;overflow:auto">
    ${syncConflicts.map((c,idx)=>`
      <div class="panel" style="margin-bottom:10px">
        <div class="mut" style="font-size:11px;text-transform:uppercase;margin-bottom:6px">${c.op.table.replace('pd_','').replace(/s$/,'')} — row ${c.op.row.id}</div>
        <label style="display:flex;gap:8px;align-items:flex-start;margin-bottom:8px;font-size:13px;cursor:pointer">
          <input type="radio" name="conflict_${idx}" ${conflictChoices[c.op.qid]==='mine'?'checked':''} onchange="conflictChoices['${c.op.qid}']='mine'">
          <span><b>Your version</b> (this device)<br><span class="mut">${rowSummary(c.op.table, c.op.kind==='delete'?null:c.op.row)}</span></span>
        </label>
        <label style="display:flex;gap:8px;align-items:flex-start;font-size:13px;cursor:pointer">
          <input type="radio" name="conflict_${idx}" ${conflictChoices[c.op.qid]==='server'?'checked':''} onchange="conflictChoices['${c.op.qid}']='server'">
          <span><b>Server version</b> (already synced)<br><span class="mut">${rowSummary(c.op.table, c.serverRow)}</span></span>
        </label>
      </div>`).join('')}
    </div>
    <div class="row" style="margin-top:16px;justify-content:flex-end">
      <button class="btn ghost" onclick="setAllConflicts('mine')">Keep All Mine</button>
      <button class="btn ghost" onclick="setAllConflicts('server')">Keep All Server</button>
      <button class="btn pri" onclick="applyConflictResolutions()">Apply</button>
    </div>`, true);
}
function setAllConflicts(choice){ syncConflicts.forEach(c=>{ conflictChoices[c.op.qid]=choice; }); showConflictModal(); }
async function applyConflictResolutions(){
  let ok=0, failed=0;
  for(const c of syncConflicts){
    const choice = conflictChoices[c.op.qid]||'mine';
    if(choice==='mine'){
      try{
        const r = c.op.kind==='upsert' ? await SB.from(c.op.table).upsert(c.op.row) : await SB.from(c.op.table).delete().eq('id', c.op.row.id);
        if(r.error){ failed++; continue; }
        ok++;
      } catch(e){ failed++; continue; }
    } else {
      applyServerRowToD(c.op.table, c.serverRow, c.op.row.id);
      ok++;
    }
  }
  persistLocal();
  syncConflicts = [];

async function fetchAllRows(table, orderCol, selectCols, onProgress){
  selectCols = selectCols || '*';
  let all = [];
  let from = 0;
  const PAGE = 1000;
  let total = null;
  if(onProgress){
    const countRes = await SB.from(table).select('id',{count:'exact',head:true});
    total = countRes.count || 0;
    onProgress(0, total);
  }
  while(true){
    const r = await SB.from(table).select(selectCols).order(orderCol||'id').range(from, from+PAGE-1);
    if(r.error) return {data:null, error:r.error};
    all = all.concat(r.data);
    if(onProgress) onProgress(all.length, total);
    if(r.data.length < PAGE) break;
    from += PAGE;
  }
  return {data: all, error: null};
}
async function fetchAllFromCloud(){
  setStatus('Loading account data…');
  const ledgerProgress = (loaded, total)=>{
    const pct = total? Math.round(Math.min(loaded,total)/total*100) : 0;
    setStatus('Loading account data… '+pct+'%');
  };
  const [acc,led,bud,tpl,cat,subcat,drafts,prov,accr] = await Promise.all([
    fetchAllRows('pd_accounts','id'),
    fetchAllRows('pd_ledger','id','*',ledgerProgress),
    fetchAllRows('pd_budget','id'),
    fetchAllRows('pd_templates','id'),
    fetchAllRows('pd_categories','digit'),
    fetchAllRows('pd_subcategories','cat_digit'),
    fetchAllRows('pd_drafts','id'),
    fetchAllRows('pd_provisions','id'),
    fetchAllRows('pd_accrual_mappings','category'),
  ]);
  if(acc.error||led.error||bud.error||tpl.error){ toast('Cloud load error',true); return; }
  D.accounts = acc.data.map(a=>({id:a.id, descr:a.descr, balance:a.balance, direction:a.direction, acc_type:a.acc_type, name:a.name, cf_type:a.cf_type, category:a.category, status:a.status, is_savings:!!a.is_savings, is_allocatable:!!a.is_allocatable, is_credit_card:!!a.is_credit_card, credit_limit:a.credit_limit, stmt_balance:a.stmt_balance, stmt_available:a.stmt_available, stmt_date:a.stmt_date||null, updated_at:a.updated_at||null}));
  D.ledger = led.data.map(l=>({id:l.id, jv:l.jv, date:l.entry_date, acc:l.acc, descr:l.descr, amt:Number(l.amt), alloc:l.alloc, allocatable:l.allocatable, updated_at:l.updated_at||null}));
  D.budget = bud.data.map(b=>({id:b.id, date:b.entry_date, acc:b.acc, descr:b.descr, amt:Number(b.amt), updated_at:b.updated_at||null}));
  D.templates = tpl.data.map(t=>({id:t.id, name:t.name, lines:t.lines, updated_at:t.updated_at||null}));
  D.categories = cat.error? (SEED.categories||[]).map(c=>({...c})) : cat.data.map(c=>({digit:c.digit, name:c.name}));
  D.subcategories = subcat.error? (SEED.subcategories||[]).map(s=>({...s})) : subcat.data.map(s=>({catDigit:s.cat_digit, subCode:s.sub_code, name:s.name}));
  if(!drafts.error){ jvDrafts = drafts.data.map(d=>({id:d.id, date:d.entry_date, lines:d.lines, savedAt:d.saved_at, updated_at:d.updated_at||null})); saveJVDraftsList(); }
  if(!prov.error){ D.provisionGroups = prov.data.map(g=>({id:g.id, name:g.name, lines:g.lines, months:g.months, updated_at:g.updated_at||null})); }
  if(!accr.error){ D.accrualMappings = accr.data.map(m=>({category:m.category, liabilityAcc:m.liability_acc, expenseAcc:m.expense_acc, updated_at:m.updated_at||null})); }
}
async function insertWithRetry(table, chunk, attempts){
  attempts = attempts || 3;
  let lastErr = null;
  for(let a=1; a<=attempts; a++){
    const r = await SB.from(table).upsert(chunk);
    if(!r.error) return r;
    lastErr = r.error;
    console.warn(table+' batch attempt '+a+' failed:', r.error.message);
    await new Promise(res=>setTimeout(res, 800*a));
  }
  return {error:lastErr};
}
async function seedCloud(){
  const localDrafts = jvDrafts.slice(); // preserve any local-only drafts made before first connecting
  const localProvisions = D.provisionGroups.slice();
  const localAccrualMappings = D.accrualMappings.slice();
  loadSeedIntoD();
  setStatus('Setting up your new project…');
  if(D.accounts.length) await insertWithRetry('pd_accounts', D.accounts.map(a=>({id:a.id,descr:a.descr,balance:a.balance,direction:a.direction,acc_type:a.acc_type,name:a.name,cf_type:a.cf_type,category:a.category,status:a.status,is_savings:!!a.is_savings,is_allocatable:!!a.is_allocatable,is_credit_card:!!a.is_credit_card,credit_limit:a.credit_limit,stmt_balance:a.stmt_balance,stmt_available:a.stmt_available,stmt_date:a.stmt_date})));
  if(D.templates.length) await insertWithRetry('pd_templates', D.templates.map(t=>({id:t.id,name:t.name,lines:t.lines})));
  if(D.categories.length) await insertWithRetry('pd_categories', D.categories.map(c=>({digit:c.digit,name:c.name})));
  if(D.subcategories.length) await insertWithRetry('pd_subcategories', D.subcategories.map(s=>({cat_digit:s.catDigit,sub_code:s.subCode,name:s.name})));
  if(localDrafts.length){ await insertWithRetry('pd_drafts', localDrafts.map(d=>({id:d.id, entry_date:d.date, lines:d.lines, saved_at:d.savedAt}))); jvDrafts = localDrafts; saveJVDraftsList(); }
  if(localProvisions.length){ await insertWithRetry('pd_provisions', localProvisions.map(g=>({id:g.id, name:g.name, lines:g.lines, months:g.months}))); D.provisionGroups = localProvisions; }
  if(localAccrualMappings.length){ await insertWithRetry('pd_accrual_mappings', localAccrualMappings.map(m=>({category:m.category, liability_acc:m.liabilityAcc, expense_acc:m.expenseAcc}))); D.accrualMappings = localAccrualMappings; }
  const BATCH=250;
  const failedBatches = [];
  for(let i=0;i<D.ledger.length;i+=BATCH){
    const chunk = D.ledger.slice(i,i+BATCH).map(l=>({id:l.id,jv:l.jv,entry_date:l.date,acc:l.acc,descr:l.descr,amt:l.amt,alloc:l.alloc,allocatable:l.allocatable}));
    const r = await insertWithRetry('pd_ledger', chunk);
    if(r.error){ console.error('Ledger batch permanently failed at row '+i+':', r.error); failedBatches.push(i); }
    setStatus('Seeding cloud… '+Math.min(i+BATCH,D.ledger.length)+'/'+D.ledger.length);
  }
  for(let i=0;i<D.budget.length;i+=BATCH){
    const chunk = D.budget.slice(i,i+BATCH).map(b=>({id:b.id,entry_date:b.date,acc:b.acc,descr:b.descr,amt:b.amt}));
    await insertWithRetry('pd_budget', chunk);
  }
  if(D.ledger.length){
    const check = await SB.from('pd_ledger').select('id',{count:'exact',head:true});
    const cloudCount = check.count||0;
    if(failedBatches.length || cloudCount!==D.ledger.length){
      setStatus('Seed incomplete','err');
      toast('Cloud seed incomplete: '+cloudCount+' of '+D.ledger.length+' ledger rows saved.', true);
    } else {
      toast('Cloud seeded ✓ ('+cloudCount+' rows verified)');
    }
  } else {
    toast('Connected ✓ — starting with a blank ledger. Add your chart of accounts in Settings to get going.');
  }
}

function sumAcc(pred, fromDate, toDate){
  let t=0;
  for(const l of D.ledger){
    if(!pred(l)) continue;
    if(fromDate && l.date<fromDate) continue;
    if(toDate && l.date>toDate) continue;
    t += Number(l.amt)||0;
  }
  return t;
}
function accountBalance(accId){ return sumAcc(l=>l.acc===accId); }
function categoryBalance(cat){
  const ids = new Set(D.accounts.filter(a=>a.category===cat).map(a=>a.id));
  return sumAcc(l=>ids.has(l.acc));
}
// 10199 "Working Capital" is an internal rollup account, not a real bank balance — exclude it from Bank Accounts totals
function bankBalance(){
  const ids = new Set(D.accounts.filter(a=>a.category==='Bank Accounts' && a.id!==10199).map(a=>a.id));
  return sumAcc(l=>ids.has(l.acc));
}
function firstDigit(accId){ return Math.floor(accId/10000); }
function absMoney(n){ return money(Math.abs(Number(n)||0)); }

function categoriesFor(digit){
  const cats = [...new Set(D.accounts.filter(a=>firstDigit(a.id)===digit && a.category).map(a=>a.category))];
  // keep COA's natural top-to-bottom order (by lowest account id in the category)
  return cats.sort((a,b)=>{
    const ma = Math.min(...D.accounts.filter(x=>x.category===a).map(x=>x.id));
    const mb = Math.min(...D.accounts.filter(x=>x.category===b).map(x=>x.id));
    return ma-mb;
  });
}

let jvDraft = { date: todayStr(), lines: [] };
function freshLine(){ return {key:Math.random().toString(36).slice(2), acc:'', descr:'', amt:'', _matches:[], _hi:-1, _descrMatches:[], _descrHi:-1}; }
function resetJVDraft(){ jvDraft = { date: todayStr(), lines: [freshLine(),freshLine()] }; }
if(jvDraft.lines.length===0) resetJVDraft();

function jvTotal(){ return jvDraft.lines.reduce((s,l)=>s+(Number(l.amt)||0),0); }
function jvIsBlankLine(l){ return !l.acc && (!l.descr||!l.descr.trim()) && (l.amt===''||l.amt===null||l.amt===undefined); }
function jvIsCompleteLine(l){ return l.acc && l.descr && l.descr.trim() && l.amt!==''&&l.amt!==null&&l.amt!==undefined && !isNaN(Number(l.amt)); }
function jvBalanced(){
  const nonBlank = jvDraft.lines.filter(l=>!jvIsBlankLine(l));
  if(nonBlank.some(l=>!jvIsCompleteLine(l))) return false;
  return Math.abs(jvTotal()) < 0.005 && nonBlank.length>=2;
}
function reconcileProjected(){
  const posted = accountBalance(reconcileAcc);
  const draft = jvDraft.lines.filter(l=>Number(l.acc)===reconcileAcc).reduce((s,l)=>s+(Number(l.amt)||0),0);
  return posted + draft;
}
function reconcileBannerHTML(){
  if(!reconcileAcc) return '';
  const a = ACC_BY_ID[reconcileAcc];
  if(!a || a.stmt_balance===null || a.stmt_balance===undefined) { reconcileAcc=null; return ''; }
  const projected = reconcileProjected();
  const remaining = Number(a.stmt_balance) - projected;
  const done = Math.abs(remaining) < 0.005;
  return `<div class="panel" style="background:${done?'#146c4322':'var(--chip)'};border-color:${done?'var(--green)':'var(--accent)'}">
    <div class="row" style="justify-content:space-between">
      <div><b>🏦 Reconciling ${a.id} — ${esc(accShort(a.id))}</b>
        <div class="mut" style="font-size:12px;margin-top:3px">Statement: <b class="mono">${money(a.stmt_balance)}</b> &nbsp; Ledger incl. this draft: <b class="mono" id="reconcileProjected">${money(projected)}</b></div>
      </div>
      <div style="text-align:right">
        <div class="mut" style="font-size:11px;text-transform:uppercase">Remaining</div>
        <div class="mono" id="reconcileRemaining" style="font-size:18px;font-weight:700;color:${done?'var(--green)':'var(--red)'}">${done? 'Reconciled ✓' : money(remaining)}</div>
      </div>
      <button class="x noprint" onclick="reconcileAcc=null; renderNewJV()" title="Exit reconciliation">✕</button>
    </div>
  </div>`;
}
function updateReconcileBanner(){
  if(!reconcileAcc) return;
  const a = ACC_BY_ID[reconcileAcc]; if(!a) return;
  const projected = reconcileProjected();
  const remaining = Number(a.stmt_balance) - projected;
  const done = Math.abs(remaining) < 0.005;
  const pEl = document.getElementById('reconcileProjected'); if(pEl) pEl.textContent = money(projected);
  const rEl = document.getElementById('reconcileRemaining');
  if(rEl){ rEl.textContent = done? 'Reconciled ✓' : money(remaining); rEl.style.color = done? 'var(--green)':'var(--red)'; }
}

// Lightweight update used while typing an amount — avoids re-rendering (and de-focusing) inputs
function updateJVTotals(){
  const t = jvTotal(), bal = jvBalanced();
  const disp = document.getElementById('jvTotalDisp');
  if(disp){ disp.textContent = money(t); disp.style.color = bal?'var(--green)':'var(--red)'; }

function jvLineRow(l,i){
  return `<tr>
    <td class="autoc"><div style="display:flex;gap:4px;align-items:center">
      <input id="jvAcc_${i}" style="flex:1" placeholder="Search account…" value="${l.acc? esc(accName(l.acc)) : (l._q||'')}"
        oninput="jvAccInput(${i},this.value)" onfocus="jvAccInput(${i},this.value)"
        onkeydown="jvAccKey(event,${i})" onblur="setTimeout(()=>closeAcDrop(${i}),150)">
      <button type="button" class="x" title="Clear" onclick="clearJVField(${i},'acc')">✕</button>
      <div class="acdrop" id="acdrop_${i}"></div>
    </div></td>
    <td class="autoc"><div style="display:flex;gap:4px;align-items:center">
      <input id="jvDescr_${i}" style="flex:1" value="${esc(l.descr)}" oninput="jvDescrInput(${i},this.value)" onfocus="jvDescrInput(${i},this.value)"
        onkeydown="jvDescrKey(event,${i})" onblur="setTimeout(()=>closeDescrDrop(${i}),150)" placeholder="Description">
      ${i>0? `<button type="button" class="x" title="Copy description from line above" onclick="copyDescrAbove(${i})">⤴</button>` : ''}
      <button type="button" class="x" title="Clear" onclick="clearJVField(${i},'descr')">✕</button>
      <div class="acdrop" id="descrdrop_${i}"></div>
    </div></td>
    <td><div style="display:flex;gap:4px;align-items:center">
      <input id="jvAmt_${i}" class="num" style="flex:1" type="text" inputmode="decimal" value="${l.amt===''?'':fmt2(l.amt)}"
        oninput="jvDraft.lines[${i}].amt=this.value; updateJVTotals()"
        onfocus="this.value = (jvDraft.lines[${i}].amt===''?'':jvDraft.lines[${i}].amt)"
        onblur="jvAmtBlur(${i})"
        onkeydown="jvAmtKey(event,${i})" placeholder="0.00 or 1+5-2">
      <button type="button" class="x" title="Clear" onclick="clearJVField(${i},'amt')">✕</button>
    </div></td>
    <td><button class="x" title="Remove line" onclick="removeJVLine(${i})">🗑</button></td>
  </tr>`;
}
function clearJVField(i, field){
  const l = jvDraft.lines[i]; if(!l) return;
  if(field==='acc'){ l.acc=''; l._q=''; l._matches=[]; l._hi=-1; const el=document.getElementById('jvAcc_'+i); if(el){ el.value=''; el.focus(); } closeAcDrop(i); }
  else if(field==='descr'){ l.descr=''; const el=document.getElementById('jvDescr_'+i); if(el){ el.value=''; el.focus(); } }
  else if(field==='amt'){ l.amt=''; const el=document.getElementById('jvAmt_'+i); if(el){ el.value=''; el.focus(); } }
  updateJVTotals();
}
function copyDescrAbove(i){
  if(i<1 || i>=jvDraft.lines.length) return;
  const val = jvDraft.lines[i-1].descr||'';
  jvDraft.lines[i].descr = val;
  const el = document.getElementById('jvDescr_'+i);
  if(el) el.value = val;
  const amtEl = document.getElementById('jvAmt_'+i);
  if(amtEl) amtEl.focus();
}
// Description autocomplete: suggests descriptions already typed on OTHER lines of this same JV
// (since a debit/credit pair usually shares the same description), and when picked, fills this
// line's amount as the reverse sign of the matched line's amount to help balance the entry.
function jvDescrInput(i, val){
  jvDraft.lines[i].descr = val;
  const q = val.toLowerCase().trim();
  if(!q){ jvDraft.lines[i]._descrMatches=[]; closeDescrDrop(i); return; }
  const seen = new Set(); const uniq=[];
  jvDraft.lines.forEach((l,idx)=>{
    if(idx===i) return;
    if(l.descr && l.descr.toLowerCase().includes(q) && !seen.has(l.descr)){ seen.add(l.descr); uniq.push(l); }
  });
  jvDraft.lines[i]._descrMatches = uniq.slice(0,8);
  jvDraft.lines[i]._descrHi = -1;
  renderDescrDrop(i);
}
function renderDescrDrop(i){
  const l = jvDraft.lines[i];
  const matches = l._descrMatches||[];
  const el = document.getElementById('descrdrop_'+i);
  const html = matches.map((m,idx)=>`<div class="${idx===l._descrHi?'hi':''}" onmousedown="pickDescrMatch(${i},'${m.key}')">${esc(m.descr)} <span class="mut" style="float:right">${m.amt!==''&&m.amt!==null&&!isNaN(Number(m.amt))?money(-Number(m.amt)):''}</span></div>`).join('');
  el.innerHTML = html;
  el.className = html? 'acdrop show' : 'acdrop';
}
function closeDescrDrop(i){ const el=document.getElementById('descrdrop_'+i); if(el){ el.innerHTML=''; el.className='acdrop'; } }
function jvDescrKey(ev,i){
  if(ev.ctrlKey||ev.metaKey) return;
  const matches = jvDraft.lines[i]._descrMatches||[];
  if(ev.key==='ArrowDown'){ if(matches.length){ ev.preventDefault(); jvDraft.lines[i]._descrHi = Math.min(matches.length-1, (jvDraft.lines[i]._descrHi??-1)+1); renderDescrDrop(i); } }
  else if(ev.key==='ArrowUp'){ if(matches.length){ ev.preventDefault(); jvDraft.lines[i]._descrHi = Math.max(0, (jvDraft.lines[i]._descrHi??0)-1); renderDescrDrop(i); } }
  else if(ev.key==='Enter'){
    if(matches.length && jvDraft.lines[i]._descrHi>=0){ ev.preventDefault(); pickDescrMatch(i, matches[jvDraft.lines[i]._descrHi].key); }
    else { ev.preventDefault(); closeDescrDrop(i); const el = document.getElementById('jvAmt_'+i); if(el) el.focus(); }
  }
  else if(ev.key==='Escape'){ closeDescrDrop(i); }
}
function pickDescrMatch(i, key){
  const matched = jvDraft.lines.find(l=>l.key===key);
  if(!matched) return;
  jvDraft.lines[i].descr = matched.descr;
  const hasAmt = matched.amt!==''&&matched.amt!==null&&!isNaN(Number(matched.amt));
  const reverseAmt = hasAmt ? -Number(matched.amt) : '';
  jvDraft.lines[i].amt = reverseAmt;
  const descrEl = document.getElementById('jvDescr_'+i); if(descrEl) descrEl.value = matched.descr;
  const amtEl = document.getElementById('jvAmt_'+i); if(amtEl) amtEl.value = reverseAmt===''? '' : fmt2(reverseAmt);
  jvDraft.lines[i]._descrMatches = [];
  closeDescrDrop(i);
  updateJVTotals();
  advanceAfterAmount(i);
}
function advanceAfterAmount(i){
  if(i+1 < jvDraft.lines.length){
    const el = document.getElementById('jvAcc_'+(i+1));
    if(el) el.focus();
  } else {
    addJVLine();
    const el = document.getElementById('jvAcc_'+(jvDraft.lines.length-1));
    if(el) el.focus();
  }
}
// Safely evaluates a typed arithmetic expression like "1+5-2" and rounds to 2 decimals.
// Only fires if the text actually contains an operator (so plain negative numbers like "-100" pass through untouched).
function tryEvalFormula(str){
  if(!/^[\d+\-*/.() \t]+$/.test(str)) return null;
  if(!/[+\-*/]/.test(str.slice(1))) return null;
  try{
    const result = Function('"use strict"; return (' + str + ')')();
    if(typeof result==='number' && isFinite(result)) return Math.round(result*100)/100;
  } catch(e){}
  return null;
}
function jvAmtBlur(i){
  const raw = jvDraft.lines[i].amt;
  let num;
  if(raw===''||raw===null){ num=''; }
  else{
    const cleaned = String(raw).replace(/,/g,'').trim();
    const formulaResult = tryEvalFormula(cleaned);
    num = formulaResult!==null ? formulaResult : Number(cleaned);
  }
  jvDraft.lines[i].amt = (num===''||isNaN(num))? '' : num;
  const el = document.getElementById('jvAmt_'+i);
  if(el) el.value = jvDraft.lines[i].amt===''? '' : fmt2(jvDraft.lines[i].amt);
  updateJVTotals();
}
function jvAmtKey(ev,i){
  if(ev.ctrlKey||ev.metaKey) return;
  if(ev.key==='ArrowUp'||ev.key==='ArrowDown'){
    ev.preventDefault();
    const target = ev.key==='ArrowUp'? i-1 : i+1;
    const el = document.getElementById('jvAmt_'+target);
    if(el){ el.focus(); el.select(); }
  } else if(ev.key==='Enter'){
    ev.preventDefault();
    jvAmtBlur(i);
    advanceAfterAmount(i);
  }
}
function addJVLine(){ const l = freshLine(); if(reconcileAcc) l.acc = reconcileAcc; if(jvDraft.lines.length) l.descr = jvDraft.lines[jvDraft.lines.length-1].descr||''; jvDraft.lines.push(l); renderNewJV(); }
function removeJVLine(i){ jvDraft.lines.splice(i,1); renderNewJV(); }
function jvAccInput(i,val){
  jvDraft.lines[i]._q = val;
  if(!val){ jvDraft.lines[i].acc=''; }
  const q = val.toLowerCase();
  const matches = postableAccounts().filter(a=> String(a.id).includes(q) || (a.name||'').toLowerCase().includes(q)).slice(0,25);
  jvDraft.lines[i]._matches = matches; jvDraft.lines[i]._hi = -1;
  renderAcDrop(i);
}
function renderAcDrop(i){
  const l = jvDraft.lines[i];
  const matches = l._matches||[];
  const el = document.getElementById('acdrop_'+i);
  const html = matches.map((a,idx)=>
    `<div class="${idx===l._hi?'hi':''}" onmousedown="pickJVAcc(${i},${a.id})">${a.id} — ${esc(accShort(a.id))}</div>`).join('') || (l._q? '<div class="mut">No match</div>' : '');
  el.innerHTML = html;
  el.className = html? 'acdrop show' : 'acdrop';
}
function jvAccKey(ev,i){
  if(ev.ctrlKey||ev.metaKey) return;
  const l = jvDraft.lines[i];
  const matches = l._matches||[];
  if(ev.key==='ArrowDown'){ if(matches.length){ ev.preventDefault(); l._hi = Math.min(matches.length-1, l._hi+1); renderAcDrop(i); } }
  else if(ev.key==='ArrowUp'){ if(matches.length){ ev.preventDefault(); l._hi = Math.max(0, l._hi-1); renderAcDrop(i); } }
  else if(ev.key==='Enter'){
    ev.preventDefault();
    if(matches.length && l._hi>=0){ pickJVAcc(i, matches[l._hi].id); }
    else { closeAcDrop(i); const d = document.getElementById('jvDescr_'+i); if(d) d.focus(); }
  }
  else if(ev.key==='Tab'){
    // commit the highlighted (or the only) match, then move focus to Description ourselves
    if(matches.length){
      const pick = l._hi>=0 ? matches[l._hi] : (matches.length===1 ? matches[0] : null);
      if(pick){ ev.preventDefault(); pickJVAcc(i, pick.id); }
    }
  }
  else if(ev.key==='Escape'){ closeAcDrop(i); }
}
function pickJVAcc(i,accId){
  jvDraft.lines[i].acc = accId; jvDraft.lines[i]._matches=[]; jvDraft.lines[i]._hi=-1;
  const inp = document.getElementById('jvAcc_'+i);
  if(inp) inp.value = accName(accId);
  closeAcDrop(i);
  updateJVTotals();
  const descr = document.getElementById('jvDescr_'+i);
  if(descr) descr.focus();
}
function closeAcDrop(i){ const el=document.getElementById('acdrop_'+i); if(el){ el.innerHTML=''; el.className='acdrop'; } }

function loadTemplate(id){
  if(!id) return;
  if(id==='accrual'){ accrualPanelOpen = true; accrualExplanation = []; renderNewJV(); return; }
  const t = D.templates.find(x=>String(x.id)===String(id));
  if(!t) return;
  accrualPanelOpen = false;
  jvDraft.lines = t.lines.map(l=>({key:Math.random().toString(36).slice(2), acc:l.acc, descr:l.descr, amt:l.amt, _matches:[], _hi:-1, _descrMatches:[], _descrHi:-1}));
  renderNewJV();
  toast('Loaded "'+t.name+'" — review dates & amounts before posting');
}
function nextTemplateId(){ let m=0; D.templates.forEach(t=>{ if(t.id>m) m=t.id; }); return m+1; }
function goManageTemplates(){ go('settings'); openTemplateModal(null); }

let accrualMonth = todayStr().slice(0,7);
let accrualExplanation = [];

function expenseCategoriesList(){
  const cats = [...new Set(D.accounts.filter(a=>firstDigit(a.id)===6 && (a.acc_type==='Individual Account'||a.acc_type==='Accrual Account')).map(a=>a.category))].filter(Boolean);

function sanitizeIdPart(s){ return String(s).replace(/[^a-zA-Z0-9]/g,'_'); }
async function saveAccrualMappingFromForm(sanitizedKey){
  const category = expenseCategoriesList().find(c=>sanitizeIdPart(c)===sanitizedKey);
  if(!category) return;
  const liabEl = document.getElementById('accrLiab_'+sanitizedKey);
  const expEl = document.getElementById('accrExp_'+sanitizedKey);
  const liabilityAcc = liabEl && liabEl.value? Number(liabEl.value) : null;
  const expenseAcc = expEl && expEl.value? Number(expEl.value) : null;
  if(!liabilityAcc || !expenseAcc){ toast('Pick both a liability account and an accrual expense account', true); return; }
  let m = D.accrualMappings.find(x=>x.category===category);
  if(m){ m.liabilityAcc = liabilityAcc; m.expenseAcc = expenseAcc; } else { m = {category, liabilityAcc, expenseAcc}; D.accrualMappings.push(m); }
  persistLocal();
  toast('Accrual mapping saved for "'+category+'" ✓');
  if(usingCloud){ const r = await SB.from('pd_accrual_mappings').upsert({category, liability_acc:liabilityAcc, expense_acc:expenseAcc}); if(r.error) toast('Cloud save failed: '+r.error.message, true); }
  renderSettings();
}
async function deleteAccrualMapping(sanitizedKey){
  const category = expenseCategoriesList().find(c=>sanitizeIdPart(c)===sanitizedKey) || (D.accrualMappings.find(m=>sanitizeIdPart(m.category)===sanitizedKey)||{}).category;
  if(!category) return;
  D.accrualMappings = D.accrualMappings.filter(x=>x.category!==category);
  persistLocal();
  toast('Accrual mapping removed');
  if(usingCloud){ await SB.from('pd_accrual_mappings').delete().eq('category', category); }
  renderSettings();
}
function renderAccrualPanel(){
  return `
    <div class="panel" style="background:var(--chip);border-color:var(--accent)">
      <div class="row" style="justify-content:space-between">
        <div class="row"><b>⚡ Month End JV – Post Accrual</b>
          <input type="month" id="accrualMonthInput" value="${accrualMonth}" style="width:150px">
          <button class="btn pri sm" onclick="computeAccrualJV()">Generate</button>
        </div>
        <button class="x noprint" onclick="accrualPanelOpen=false; renderNewJV()" title="Close">✕</button>
      </div>
      ${!getAccrualMappings().length? `<div class="mut" style="font-size:12px;margin-top:8px">No accrual mappings configured yet — go to Settings → Accrual Mappings to link each expense category to its liability and 99-account.</div>` : ''}
      ${accrualExplanation.length? `<div style="margin-top:10px">
        <table style="font-size:12.5px"><thead><tr><th>Category</th><th class="num">Budget</th><th class="num">Actual</th><th class="num">Variance</th><th>Action</th></tr></thead>
        <tbody>${accrualExplanation.map(e=>`<tr><td>${esc(e.category)}</td><td class="num mono">${money(e.budget)}</td><td class="num mono">${money(e.actual)}</td><td class="num mono ${moneyClass(e.variance)}">${money(e.variance)}</td><td class="mut">${esc(e.action)}</td></tr>`).join('')}</tbody></table>
      </div>` : ''}

function computeAccrualJV(){
  const monthInput = document.getElementById('accrualMonthInput');
  accrualMonth = monthInput? monthInput.value : accrualMonth;
  const mappings = getAccrualMappings();
  if(!mappings.length){ toast('No accrual mappings configured — set them up in Settings first', true); return; }
  const [mFrom, mTo] = monthRange(accrualMonth);
  const lines = [];
  const explanation = [];
  mappings.forEach(map=>{
    const catAccs = D.accounts.filter(a=>a.category===map.category && firstDigit(a.id)===6).map(a=>a.id);
    if(!catAccs.length){ return; }
    const budget = D.budget.filter(b=>catAccs.includes(b.acc) && b.date>=mFrom && b.date<=mTo).reduce((s,b)=>s+Number(b.amt),0);
    const actual = D.ledger.filter(l=>catAccs.includes(l.acc) && l.date>=mFrom && l.date<=mTo).reduce((s,l)=>s+Number(l.amt),0);
    const variance = budget - actual; // positive = under budget (surplus to accrue)
    if(Math.abs(variance)<0.005){ explanation.push({category:map.category, budget, actual, variance:0, action:'On budget — no accrual needed'}); return; }
    const tag = monthTag(accrualMonth);
    if(variance>0){
      // under budget: accrue the surplus — Dr the 99-account, Cr the liability
      lines.push({key:Math.random().toString(36).slice(2), acc:map.expenseAcc, descr:map.category+' Accrual - '+tag, amt: Math.round(variance*100)/100, _matches:[], _hi:-1, _descrMatches:[], _descrHi:-1});
      lines.push({key:Math.random().toString(36).slice(2), acc:map.liabilityAcc, descr:map.category+' Accrual - '+tag, amt: -Math.round(variance*100)/100, _matches:[], _hi:-1, _descrMatches:[], _descrHi:-1});
      explanation.push({category:map.category, budget, actual, variance, action:'Under budget — accrued '+money(variance)+' to liability'});
    } else {
      const overage = -variance;
      const liabBalance = accountBalance(map.liabilityAcc); // negative number
      const available = Math.abs(Math.min(liabBalance,0));
      const draw = Math.min(overage, available);
      if(draw<0.005){ explanation.push({category:map.category, budget, actual, variance, action:'Over budget by '+money(overage)+' but no liability balance available to draw from'}); return; }
      lines.push({key:Math.random().toString(36).slice(2), acc:map.liabilityAcc, descr:map.category+' Accrual Drawdown - '+tag, amt: Math.round(draw*100)/100, _matches:[], _hi:-1, _descrMatches:[], _descrHi:-1});
      lines.push({key:Math.random().toString(36).slice(2), acc:map.expenseAcc, descr:map.category+' Accrual Drawdown - '+tag, amt: -Math.round(draw*100)/100, _matches:[], _hi:-1, _descrMatches:[], _descrHi:-1});
      const note = draw<overage-0.005? ' (capped — only '+money(available)+' was available)' : '';
      explanation.push({category:map.category, budget, actual, variance, action:'Over budget — drew '+money(draw)+' from liability'+note});
    }
  });
  accrualExplanation = explanation;
  if(!lines.length){ toast('Nothing to accrue for '+monthLabel(accrualMonth)+' — every mapped category is on budget', true); renderNewJV(); return; }
  jvDraft.date = mTo;
  jvDraft.lines = lines;
  renderNewJV();
  toast('Generated accrual JV for '+monthLabel(accrualMonth)+' — review the explanation and lines before posting');
}

/* ---- Manage Categories / Subcategories ---- */
async function promptAddCategory(){
  const used = new Set(D.categories.map(c=>c.digit));
  const free = [1,2,3,4,5,6,7,8,9].filter(d=>!used.has(d));
  if(!free.length){ toast('All digits 1-9 are already used', true); return; }
  const digitStr = prompt('Digit for the new main category (free: '+free.join(', ')+'):');
  if(!digitStr) return;
  const digit = parseInt(digitStr,10);
  if(!free.includes(digit)){ toast('Pick one of the free digits: '+free.join(', '), true); return; }
  const name = prompt('Name for this main category (e.g. "Investment Accounts"):');
  if(!name) return;
  D.categories.push({digit, name: name.trim()});
  persistLocal(); renderSettings();
  toast('Main category added ✓');
  if(usingCloud){ const r = await SB.from('pd_categories').insert({digit, name: name.trim()}); if(r.error) toast('Cloud save failed: '+r.error.message, true); }
}
async function promptAddSubcategory(){
  if(!D.categories.length){ toast('Add a main category first', true); return; }
  const list = sortedCategories().map(c=>c.digit+' = '+c.name).join('\n');
  const catStr = prompt('Which main category is this sub category under? Enter its digit:\n'+list);
  if(!catStr) return;
  const catDigit = parseInt(catStr,10);
  if(!D.categories.find(c=>c.digit===catDigit)){ toast('That digit isn\'t a main category', true); return; }
  const suggested = nextSubCode(catDigit);
  const codeStr = prompt('2-digit code for this sub category within that main category (suggested: '+String(suggested).padStart(2,'0')+'):', String(suggested).padStart(2,'0'));
  if(!codeStr) return;
  const subCode = parseInt(codeStr,10);
  if(!subCode || subCode<1 || subCode>99){ toast('Enter a code between 01 and 99', true); return; }
  if(D.subcategories.find(s=>s.catDigit===catDigit && s.subCode===subCode)){ toast('That code is already used in this category', true); return; }
  const name = prompt('Name for this sub category (e.g. "Retirement Accounts"):');
  if(!name) return;
  D.subcategories.push({catDigit, subCode, name: name.trim()});
  persistLocal(); renderSettings();
  toast('Sub category added ✓');
  if(usingCloud){ const r = await SB.from('pd_subcategories').insert({cat_digit:catDigit, sub_code:subCode, name: name.trim()}); if(r.error) toast('Cloud save failed: '+r.error.message, true); }
}
function accountsUsingSubcategory(catDigit, subCode){
  const sub = D.subcategories.find(s=>s.catDigit===catDigit && s.subCode===subCode);
  if(!sub) return [];
  return D.accounts.filter(a=>a.category===sub.name);
}
async function deleteSubcategory(catDigit, subCode){
  const sub = D.subcategories.find(s=>s.catDigit===catDigit && s.subCode===subCode);
  if(!sub) return;
  const accs = accountsUsingSubcategory(catDigit, subCode);
  const withTx = accs.filter(a=>D.ledger.some(l=>l.acc===a.id));
  if(withTx.length){ toast('Can\'t delete — '+withTx.length+' account(s) under "'+sub.name+'" have transactions', true); return; }
  if(!confirm('Delete sub category "'+sub.name+'"?'+(accs.length? ' '+accs.length+' unused account(s) will keep their number but no longer belong to a listed sub category.':''))) return;
  D.subcategories = D.subcategories.filter(s=>!(s.catDigit===catDigit && s.subCode===subCode));
  persistLocal(); renderSettings();
  toast('Sub category deleted');
  if(usingCloud){ await SB.from('pd_subcategories').delete().eq('cat_digit',catDigit).eq('sub_code',subCode); }
}
async function deleteCategory(digit){
  const cat = D.categories.find(c=>c.digit===digit);
  if(!cat) return;
  const subs = subcategoriesFor(digit);
  if(subs.length){ toast('Remove its '+subs.length+' sub categor'+(subs.length===1?'y':'ies')+' first', true); return; }
  const accsWithTx = D.accounts.filter(a=>Math.floor(a.id/10000)===digit && D.ledger.some(l=>l.acc===a.id));
  if(accsWithTx.length){ toast('Can\'t delete — accounts under this category have transactions', true); return; }
  if(!confirm('Delete main category "'+cat.name+'"?')) return;
  D.categories = D.categories.filter(c=>c.digit!==digit);
  persistLocal(); renderSettings();
  toast('Main category deleted');
  if(usingCloud){ await SB.from('pd_categories').delete().eq('digit',digit); }
}

function nextDraftId(){ let m=0; jvDrafts.forEach(d=>{ if(d.id>m) m=d.id; }); return m+1; }
async function saveJVDraft(){
  const lines = jvDraft.lines.filter(l=>l.acc || l.descr || l.amt!=='');
  if(!lines.length){ toast('Nothing to save yet', true); return; }
  const draft = { id: nextDraftId(), date: jvDraft.date, lines: lines.map(l=>({acc:l.acc, descr:l.descr||'', amt:l.amt})), savedAt: nowISO() };
  jvDrafts.push(draft);
  saveJVDraftsList();
  toast('Saved as draft — find it under 📝 Drafts'+(syncQueue.length?' (queued for sync)':''));
  resetJVDraft();
  reconcileAcc = null;
  renderNewJV();
  await syncWrite('pd_drafts', 'upsert', {id:draft.id, entry_date:draft.date, lines:draft.lines, saved_at:draft.savedAt}, null);
}

async function continueDraft(id){
  const d = jvDrafts.find(x=>x.id===id);
  if(!d) return;
  const base = d.updated_at||null;
  jvDraft = { date: d.date, lines: d.lines.map(l=>({key:Math.random().toString(36).slice(2), acc:l.acc, descr:l.descr, amt:l.amt, _matches:[], _hi:-1})) };
  jvDrafts = jvDrafts.filter(x=>x.id!==id);
  saveJVDraftsList();
  closeModal();
  renderNewJV();
  toast('Draft loaded — review and post when ready');
  await syncWrite('pd_drafts', 'delete', {id}, base);
}
async function deleteDraft(id){
  const d = jvDrafts.find(x=>x.id===id);
  const base = d? d.updated_at||null : null;
  jvDrafts = jvDrafts.filter(x=>x.id!==id);
  saveJVDraftsList();
  openDraftsModal();
  await syncWrite('pd_drafts', 'delete', {id}, base);
}

async function postJV(){
  const nonBlank = jvDraft.lines.filter(l=>!jvIsBlankLine(l));
  const incomplete = nonBlank.filter(l=>!jvIsCompleteLine(l));
  if(incomplete.length){ toast('Every line needs an account, a description, and an amount — fill in or remove the incomplete line(s)', true); return; }
  const lines = nonBlank;
  const total = lines.reduce((s,l)=>s+(Number(l.amt)||0),0);
  if(Math.abs(total)>=0.005){ toast('Lines must net to zero before posting',true); return; }
  if(lines.length<2){ toast('Add at least two lines',true); return; }
  const jv = nextJV();
  let id = nextLedgerId();
  const rows = lines.map(l=>({id:id++, jv, date:jvDraft.date, acc:Number(l.acc), descr:l.descr||'', amt:Number(l.amt), alloc:null, allocatable:false}));
  D.ledger.push(...rows);
  persistLocal();
  for(const r of rows){
    await syncWrite('pd_ledger', 'upsert', {id:r.id, jv:r.jv, entry_date:r.date, acc:r.acc, descr:r.descr, amt:r.amt, alloc:r.alloc, allocatable:r.allocatable}, null);
  }
  toast('JV #'+jv+' posted ✓'+(syncQueue.length? ' (queued for sync)':''));
  resetJVDraft();
  ledgerFilter = {acc:'', from:'', to:'', q:'', jv:'', preset:'', specificMonth:''};
  ledgerPage = 0;
  if(reconcileAcc){ reconcileAcc = null; go('dashboard'); }
  else go('ledger');
}

/* ============================= LEDGER ============================= */
function filteredLedger(){
  return D.ledger.filter(l=>{
    if(ledgerFilter.acc && String(l.acc)!==String(ledgerFilter.acc)) return false;
    if(ledgerFilter.from && l.date < ledgerFilter.from) return false;
    if(ledgerFilter.to && l.date > ledgerFilter.to) return false;
    if(ledgerFilter.jv && String(l.jv)!==String(ledgerFilter.jv)) return false;
    if(ledgerFilter.q){
      const q=ledgerFilter.q.toLowerCase();
      if(!(String(l.descr||'').toLowerCase().includes(q) || String(l.acc).includes(q) || accShort(l.acc).toLowerCase().includes(q))) return false;
    }
    return true;
  }).sort((a,b)=> (b.date||'').localeCompare(a.date||'') || b.jv-a.jv);
}
function shiftDate(dstr, days){ const d=new Date(dstr+'T00:00:00'); d.setDate(d.getDate()+days); return d.toISOString().slice(0,10); }
function monthRange(ym){ const [y,m]=ym.split('-').map(Number); const lastDay=new Date(y,m,0).getDate(); return [ym+'-01', ym+'-'+String(lastDay).padStart(2,'0')]; }
function applyLedgerPreset(val){
  ledgerFilter.preset = val;
  const today = todayStr();
  if(val==='month'){ [ledgerFilter.from, ledgerFilter.to] = monthRange(today.slice(0,7)); }
  else if(val==='30'){ ledgerFilter.from = shiftDate(today,-30); ledgerFilter.to = today; }
  else if(val==='60'){ ledgerFilter.from = shiftDate(today,-60); ledgerFilter.to = today; }
  else if(val==='90'){ ledgerFilter.from = shiftDate(today,-90); ledgerFilter.to = today; }
  else if(val==='ytd'){ ledgerFilter.from = today.slice(0,4)+'-01-01'; ledgerFilter.to = today; }
  else if(val==='all'){ ledgerFilter.from=''; ledgerFilter.to=''; }
  else if(val==='specific'){ const ym = ledgerFilter.specificMonth || today.slice(0,7); ledgerFilter.specificMonth = ym; [ledgerFilter.from, ledgerFilter.to] = monthRange(ym); }
  ledgerPage=0; renderLedger();
}
function ledgerSpecificMonthChange(val){ ledgerFilter.specificMonth = val; ledgerFilter.preset='specific'; [ledgerFilter.from, ledgerFilter.to] = monthRange(val); ledgerPage=0; renderLedger(); }
function csvEscape(v){ v = v===null||v===undefined? '' : String(v); if(/[",\n]/.test(v)) return '"'+v.replace(/"/g,'""')+'"'; return v; }
function ledgerExportFilename(){
  const parts = [];
  if(ledgerFilter.acc){ parts.push(accShort(Number(ledgerFilter.acc)).replace(/[\\/:*?"<>|,]/g,'')); } else { parts.push('All Accounts'); }
  if(ledgerFilter.preset==='specific' && ledgerFilter.specificMonth){ parts.push(monthLabel(ledgerFilter.specificMonth)); }
  else if(ledgerFilter.preset==='month'){ parts.push(monthLabel(todayStr().slice(0,7))); }
  else if(ledgerFilter.preset==='ytd'){ parts.push(todayStr().slice(0,4)+' YTD'); }
  else if(ledgerFilter.preset==='all'){ parts.push('Full History'); }
  else if(ledgerFilter.from || ledgerFilter.to){ parts.push((ledgerFilter.from||'start')+' to '+(ledgerFilter.to||'today')); }
  else { parts.push(todayStr()); }
  return parts.join(' - ')+'.csv';
}
function exportLedgerCSV(){
  const rows = filteredLedger();
  const header = ['JV#','Date','Account#','Account Name','Description','Amount','Alloc#'];
  const lines = [header.join(',')];
  rows.forEach(l=> lines.push([l.jv, l.date, l.acc, accShort(l.acc), l.descr, l.amt, l.alloc? pad5(l.alloc):''].map(csvEscape).join(',')));
  const blob = new Blob([lines.join('\n')], {type:'text/csv'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = ledgerExportFilename(); a.click();
  toast('Exported '+rows.length.toLocaleString()+' rows to CSV');
}

}
function ledgerAccKey(ev){
  const matches = ledgerAccPicker.matches||[];
  if(ev.key==='ArrowDown'){ if(matches.length){ ev.preventDefault(); ledgerAccPicker.hi=Math.min(matches.length-1,ledgerAccPicker.hi+1); renderLedgerAcDrop(); } }
  else if(ev.key==='ArrowUp'){ if(matches.length){ ev.preventDefault(); ledgerAccPicker.hi=Math.max(0,ledgerAccPicker.hi-1); renderLedgerAcDrop(); } }
  else if(ev.key==='Enter'){ ev.preventDefault(); if(matches.length && ledgerAccPicker.hi>=0){ pickLedgerAcc(matches[ledgerAccPicker.hi].id); } }
  else if(ev.key==='Escape'){ closeLedgerAcDrop(); }
}
function pickLedgerAcc(accId){
  ledgerFilter.acc = accId; ledgerAccPicker = {q: accName(accId), matches:[], hi:-1};
  const inp = document.getElementById('ledgerAccInput'); if(inp) inp.value = accName(accId);
  closeLedgerAcDrop();
  ledgerPage = 0; renderLedgerResults();
}
function closeLedgerAcDrop(){ const el=document.getElementById('ledgerAcdrop'); if(el){ el.innerHTML=''; el.className='acdrop'; } }
function renderLedgerResults(){
  const rows = filteredLedger();
  const total = rows.reduce((s,l)=>s+(Number(l.amt)||0),0);
  const pages = Math.max(1, Math.ceil(rows.length/PAGE_SIZE));
  ledgerPage = Math.min(ledgerPage, pages-1);
  const pageRows = rows.slice(ledgerPage*PAGE_SIZE, ledgerPage*PAGE_SIZE+PAGE_SIZE);
  const el = document.getElementById('ledgerResults');
  if(!el) return;
  el.innerHTML = `
    <div class="panel" style="padding:0">
      <table><thead><tr><th>JV#</th><th>Date</th><th>Account</th><th>Description</th><th class="num">Amount</th><th>Alloc</th></tr></thead>
      <tbody>${pageRows.map(l=>`<tr class="click" onclick="viewJV(${l.jv})">
        <td class="mono">#${l.jv}</td><td class="mono">${esc(l.date)}</td>
        <td>${l.acc}<div class="mut" style="font-size:11.5px">${esc(accShort(l.acc))}</div></td>
        <td>${esc(l.descr)}</td><td class="num mono ${moneyClass(l.amt)}">${money(l.amt)}</td>
        <td>${l.alloc? '<span class="badge">'+pad5(l.alloc)+'</span>':''}</td></tr>`).join('') || '<tr><td colspan="6" class="empty">No transactions match these filters</td></tr>'}</tbody>
      <tfoot><tr><td colspan="4">Filtered total (${rows.length.toLocaleString()} lines)</td><td class="num mono ${moneyClass(total)}">${money(total)}</td><td></td></tr></tfoot>
      </table>
      <div class="pagebar noprint">
        <span>Page ${ledgerPage+1} of ${pages}</span>
        <button onclick="ledgerPage=Math.max(0,ledgerPage-1); renderLedgerResults()" ${ledgerPage===0?'disabled':''}>‹ Prev</button>
        <button onclick="ledgerPage=Math.min(${pages-1},ledgerPage+1); renderLedgerResults()" ${ledgerPage>=pages-1?'disabled':''}>Next ›</button>
      </div>
    </div>`;
}
function viewJV(jv){
  const lines = D.ledger.filter(l=>l.jv===jv).sort((a,b)=>a.id-b.id);
  const total = lines.reduce((s,l)=>s+(Number(l.amt)||0),0);
  showModal(`
    <h3>Journal Voucher #${jv}</h3>
    <table><thead><tr><th>Account</th><th>Description</th><th class="num">Amount</th></tr></thead>
    <tbody>${lines.map(l=>`<tr><td>${l.acc}<div class="mut" style="font-size:11.5px">${esc(accShort(l.acc))}</div></td><td>${esc(l.descr)}</td><td class="num mono ${moneyClass(l.amt)}">${money(l.amt)}</td></tr>`).join('')}</tbody>
    <tfoot><tr><td colspan="2">Total</td><td class="num mono">${money(total)}</td></tr></tfoot></table>
    <div class="row" style="margin-top:16px;justify-content:flex-end">

      <button class="btn ghost" onclick="duplicateJV(${jv})">⧉ Duplicate as New JV</button>
      <button class="btn del" onclick="deleteJV(${jv})">Delete this JV</button>
      <button class="btn ghost" onclick="closeModal()">Close</button>
    </div>`, true);
}
/* ---- Edit an existing JV in place (values only — no adding/removing lines) ---- */
let jvEditDraft = null;
function startEditJV(jv){
  const lines = D.ledger.filter(l=>l.jv===jv).sort((a,b)=>a.id-b.id);
  jvEditDraft = { jv, lines: lines.map(l=>({id:l.id, acc:l.acc, descr:l.descr, amt:l.amt, updated_at:l.updated_at||null, _q:'', _matches:[], _hi:-1})) };
  renderJVEditModal();
}
function renderJVEditModal(){
  const d = jvEditDraft;
  const total = d.lines.reduce((s,l)=>s+(Number(l.amt)||0),0);
  const balanced = Math.abs(total)<0.005;
  const complete = d.lines.every(l=> l.acc && l.descr && String(l.descr).trim() && l.amt!==''&&l.amt!==null&&l.amt!==undefined && !isNaN(Number(l.amt)));
  const canSave = balanced && complete;
  showModal(`
    <h3>Edit Journal Voucher #${d.jv}</h3>
    <table class="jv-lines"><thead><tr><th style="width:36%">Account</th><th style="width:36%">Description</th><th style="width:20%">Amount</th></tr></thead>
    <tbody>${d.lines.map((l,i)=>`<tr>
      <td class="autoc"><input id="jveAcc_${i}" placeholder="Search account…" value="${l.acc? esc(accName(l.acc)) : (l._q||'')}"
        oninput="jveAccInput(${i},this.value)" onfocus="jveAccInput(${i},this.value)"
        onkeydown="jveAccKey(event,${i})" onblur="setTimeout(()=>jveCloseAcDrop(${i}),150)">
        <div class="acdrop" id="jveAcdrop_${i}"></div></td>
      <td><input id="jveDescr_${i}" value="${esc(l.descr)}" oninput="jvEditDraft.lines[${i}].descr=this.value"></td>
      <td><input id="jveAmt_${i}" class="num" type="text" inputmode="decimal" value="${l.amt===''?'':fmt2(l.amt)}"
        oninput="jvEditDraft.lines[${i}].amt=this.value; updateJVEditTotals()"
        onfocus="this.value = (jvEditDraft.lines[${i}].amt===''?'':jvEditDraft.lines[${i}].amt)"
        onblur="jveAmtBlur(${i})" placeholder="0.00 or 1+5-2"></td>
    </tr>`).join('')}</tbody></table>
    <div class="row" style="margin-top:14px;justify-content:flex-end">
      <div class="mut" style="margin-right:auto">${!complete? 'Every line needs an account, description, and amount.' : (!balanced? 'Lines must net to zero.' : '')}</div>
      <div style="text-align:right">
        <div class="mut" style="font-size:11px;text-transform:uppercase">Total</div>
        <div class="num mono" id="jveTotalDisp" style="font-size:18px;font-weight:700;color:${balanced?'var(--green)':'var(--red)'}">${money(total)}</div>
      </div>
      <button class="btn ghost" onclick="viewJV(${d.jv})">Cancel</button>
      <button class="btn pri" id="jveSaveBtn" ${canSave?'':'disabled'} onclick="saveJVEdit()">Save Changes</button>
    </div>`, true);
}
function updateJVEditTotals(){
  const d = jvEditDraft;
  const total = d.lines.reduce((s,l)=>s+(Number(l.amt)||0),0);
  const balanced = Math.abs(total)<0.005;
  const complete = d.lines.every(l=> l.acc && l.descr && String(l.descr).trim() && l.amt!==''&&l.amt!==null&&l.amt!==undefined && !isNaN(Number(l.amt)));
  const disp = document.getElementById('jveTotalDisp');
  if(disp){ disp.textContent = money(total); disp.style.color = balanced?'var(--green)':'var(--red)'; }
  const btn = document.getElementById('jveSaveBtn');
  if(btn) btn.disabled = !(balanced && complete);
}
function jveAmtBlur(i){
  const raw = jvEditDraft.lines[i].amt;
  let num;
  if(raw===''||raw===null){ num=''; }
  else{
    const cleaned = String(raw).replace(/,/g,'').trim();
    const formulaResult = tryEvalFormula(cleaned);
    num = formulaResult!==null ? formulaResult : Number(cleaned);
  }
  jvEditDraft.lines[i].amt = (num===''||isNaN(num))? '' : num;
  const el = document.getElementById('jveAmt_'+i);
  if(el) el.value = jvEditDraft.lines[i].amt===''? '' : fmt2(jvEditDraft.lines[i].amt);
  updateJVEditTotals();
}
function jveAccInput(i,val){
  const l = jvEditDraft.lines[i];
  l._q = val;
  if(!val){ l.acc=''; }
  const q = val.toLowerCase();
  const matches = postableAccounts().filter(a=> String(a.id).includes(q) || (a.name||'').toLowerCase().includes(q)).slice(0,25);
  l._matches = matches; l._hi = -1;
  jveRenderAcDrop(i);
}
function jveRenderAcDrop(i){
  const l = jvEditDraft.lines[i];
  const matches = l._matches||[];
  const el = document.getElementById('jveAcdrop_'+i);
  const html = matches.map((a,idx)=> `<div class="${idx===l._hi?'hi':''}" onmousedown="jvePickAcc(${i},${a.id})">${a.id} — ${esc(accShort(a.id))}</div>`).join('') || (l._q? '<div class="mut">No match</div>' : '');
  el.innerHTML = html;
  el.className = html? 'acdrop show' : 'acdrop';
}
function jveAccKey(ev,i){
  const l = jvEditDraft.lines[i];
  const matches = l._matches||[];
  if(ev.key==='ArrowDown'){ if(matches.length){ ev.preventDefault(); l._hi=Math.min(matches.length-1,l._hi+1); jveRenderAcDrop(i); } }
  else if(ev.key==='ArrowUp'){ if(matches.length){ ev.preventDefault(); l._hi=Math.max(0,l._hi-1); jveRenderAcDrop(i); } }
  else if(ev.key==='Enter'){ ev.preventDefault(); if(matches.length && l._hi>=0){ jvePickAcc(i,matches[l._hi].id); } else { jveCloseAcDrop(i); const d=document.getElementById('jveDescr_'+i); if(d) d.focus(); } }
  else if(ev.key==='Escape'){ jveCloseAcDrop(i); }
}
function jvePickAcc(i,accId){
  jvEditDraft.lines[i].acc = accId; jvEditDraft.lines[i]._matches=[]; jvEditDraft.lines[i]._hi=-1;
  const inp = document.getElementById('jveAcc_'+i); if(inp) inp.value = accName(accId);
  jveCloseAcDrop(i); updateJVEditTotals();
  const descr = document.getElementById('jveDescr_'+i); if(descr) descr.focus();
}
function jveCloseAcDrop(i){ const el=document.getElementById('jveAcdrop_'+i); if(el){ el.innerHTML=''; el.className='acdrop'; } }
async function saveJVEdit(){
  const d = jvEditDraft;
  const total = d.lines.reduce((s,l)=>s+(Number(l.amt)||0),0);
  const complete = d.lines.every(l=> l.acc && l.descr && String(l.descr).trim() && l.amt!==''&&l.amt!==null&&l.amt!==undefined && !isNaN(Number(l.amt)));
  if(!complete){ toast('Every line needs an account, description, and amount', true); return; }
  if(Math.abs(total)>=0.005){ toast('Lines must net to zero before saving', true); return; }
  const jvDate = D.ledger.find(l=>l.jv===d.jv)?.date;
  if(jvDate && jvDate.slice(0,7)!==todayStr().slice(0,7)){
    if(!confirm('This JV is dated '+jvDate+', outside the current month. Changing it will affect historical numbers for that period. Continue?')) return;
  }
  const touched = [];
  d.lines.forEach(l=>{
    const row = D.ledger.find(x=>x.id===l.id);
    if(!row) return;
    row.acc = Number(l.acc); row.descr = l.descr; row.amt = Number(l.amt);
    touched.push(row);
  });
  persistLocal();
  closeModal();
  toast('JV #'+d.jv+' updated ✓');
  for(const row of touched){
    await syncWrite('pd_ledger', 'upsert', {id:row.id, jv:row.jv, entry_date:row.date, acc:row.acc, descr:row.descr, amt:row.amt, alloc:row.alloc, allocatable:row.allocatable}, row.updated_at||null);
  }
  if(screen==='ledger') renderLedger();
  else if(screen==='dashboard') renderDashboard();
  else if(screen==='statement') renderStatement();
  else if(screen==='alloc') renderAlloc();
}
function exportJVCSV(jv){
  const lines = D.ledger.filter(l=>l.jv===jv).sort((a,b)=>a.id-b.id);
  const header = ['JV#','Date','Account#','Account Name','Description','Amount'];
  const rows = [header.join(',')];
  lines.forEach(l=> rows.push([l.jv,l.date,l.acc,accShort(l.acc),l.descr,l.amt].map(csvEscape).join(',')));
  const blob = new Blob([rows.join('\n')], {type:'text/csv'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'jv-'+jv+'.csv'; a.click();
  toast('JV #'+jv+' exported to CSV');
}
function duplicateJV(jv){
  const lines = D.ledger.filter(l=>l.jv===jv).sort((a,b)=>a.id-b.id);
  jvDraft = { date: todayStr(), lines: lines.map(l=>({key:Math.random().toString(36).slice(2), acc:l.acc, descr:l.descr, amt:l.amt, _matches:[], _hi:-1})) };
  closeModal();
  go('newjv');
  toast('Loaded JV #'+jv+' as a starting point — review and post');
}
async function deleteJV(jv){
  if(!confirm('Delete JV #'+jv+' and all its lines? This cannot be undone.')) return;
  const rows = D.ledger.filter(l=>l.jv===jv);
  D.ledger = D.ledger.filter(l=>l.jv!==jv);
  persistLocal(); closeModal(); renderLedger();
  toast('JV #'+jv+' deleted');
  for(const r of rows){ await syncWrite('pd_ledger', 'delete', {id:r.id}, r.updated_at||null); }
}

let accQ = '', accShowDeleted = false;
function browsableAccounts(){ return D.accounts.filter(a=>a.acc_type==='Individual Account'||a.acc_type==='Accrual Account'); }
function renderAccounts(){
  document.getElementById('app').innerHTML = `
    <div class="panel noprint row" style="justify-content:space-between">

        <label style="display:flex;align-items:center;gap:6px;white-space:nowrap;font-size:12.5px;color:var(--muted)"><input type="checkbox" class="chk" ${accShowDeleted?'checked':''} onchange="accShowDeleted=this.checked; renderAccountResults()"> Show deleted</label>
      </div>
      <button class="btn pri" onclick="openAccountModal(null)">+ Add Account</button>
    </div>
    <div id="accountResults"></div>
  `;
  renderAccountResults();
}
function filterAccounts(v){ accQ = v; renderAccountResults(); }
function renderAccountResults(){
  const accs = browsableAccounts().filter(a=>{
    if(!accShowDeleted && a.status==='Deleted') return false;
    if(!accQ) return true;
    const q=accQ.toLowerCase();
    return String(a.id).includes(q) || (a.name||'').toLowerCase().includes(q) || (a.category||'').toLowerCase().includes(q);
  });
  const byCat = {};
  accs.forEach(a=>{ (byCat[a.category||'Other'] ??= []).push(a); });
  const cats = Object.keys(byCat).sort((a,b)=>{
    const ma = Math.min(...byCat[a].map(x=>x.id));
    const mb = Math.min(...byCat[b].map(x=>x.id));
    return ma-mb;
  });
  const el = document.getElementById('accountResults');
  if(!el) return;
  el.innerHTML = cats.map(cat=>{
      const catTotal = byCat[cat].reduce((s,a)=>s+accountBalance(a.id),0);
      return `
      <div class="panel">
        <h3>${esc(cat)}</h3>
        <table><thead><tr><th>Acc#</th><th>Name</th><th class="num">Balance</th><th></th><th></th></tr></thead>
        <tbody>${byCat[cat].sort((a,b)=>a.id-b.id).map(a=>{
          const bal = accountBalance(a.id);
          const isDeleted = a.status==='Deleted';
          return `<tr ${isDeleted?'style="background:#a3352c22"':''}><td class="mono click" onclick="openStatement(${a.id})">${a.id}</td>
          <td class="click" onclick="openStatement(${a.id})">${esc(accShort(a.id))} ${a.status==='Inactive'?'<span class="badge">inactive</span>':''}${isDeleted?'<span class="badge neg">deleted</span>':''}${a.is_savings?'<span class="badge pos">savings</span>':''}${a.is_allocatable?'<span class="badge pos">allocatable</span>':''}${a.is_credit_card?'<span class="badge">credit card</span>':''}</td>
          <td class="num mono click ${moneyClass(bal)}" onclick="openStatement(${a.id})">${money(bal)}</td>
          <td><button class="x" title="Edit" onclick='openAccountModal(${a.id})'>✎</button></td>
          <td class="mut click" onclick="openStatement(${a.id})">view →</td></tr>`;
        }).join('')}</tbody>
        <tfoot><tr><td colspan="2">Total — ${esc(cat)}</td><td class="num mono" style="font-weight:700">${money(catTotal)}</td><td></td><td></td></tr></tfoot></table>
      </div>`;
    }).join('') || '<div class="empty">No accounts match your search</div>';
}
function openStatement(accId){ statementAcc = accId; go('statement'); }
async function saveStmtBalance(accId, val, focusNextId){
  const a = D.accounts.find(x=>x.id===accId); if(!a) return;
  const base = a.updated_at||null;
  const clean = String(val).replace(/,/g,'').trim();
  if(a.is_credit_card){
    a.stmt_available = clean===''? null : Number(clean);
    a.stmt_balance = clean===''? null : (Number(clean) - Number(a.credit_limit||0));
  } else {
    a.stmt_balance = clean===''? null : Number(clean);
  }
  a.stmt_date = clean===''? null : todayStr();
  persistLocal(); renderDashboard();
  if(focusNextId){ const el = document.getElementById('stmtBal_'+focusNextId); if(el){ el.focus(); el.select(); } }
  toast('Statement balance saved');
  await syncWrite('pd_accounts', 'upsert', {...a}, base);
}

async function saveAccount(){

let budgetMonth = todayStr().slice(0,7);

function prevMonth(ym){ const [y,m]=ym.split('-').map(Number); const d=new Date(y,m-2,1); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0'); }

function viewBudgetAccountMonth(acc){

      <tbody>${rowCats.map(cat=>{

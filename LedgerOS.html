            <td class="num mono" style="font-weight:700">${money(cp)}</td><td class="num mono" style="font-weight:700">${money(ca)}</td>
            <td class="num mono ${budgetVarClass(ca-cp)}" style="font-weight:700">${money(ca-cp)}</td></tr>` +
          items.map(r=>`<tr><td class="mono click" style="padding-left:18px" onclick="viewBudgetAccountMonth(${r.acc})">${r.acc}</td><td>${esc(accShort(r.acc))}</td>
            <td class="num mono">${money(r.planned)}</td><td class="num mono">${money(r.actual)}</td>
            <td class="num mono ${budgetVarClass(r.variance)}">${money(r.variance)}</td></tr>`).join('');
      }).join('') || '<tr><td colspan="5" class="empty">No budget or actuals for this month</td></tr>'}</tbody>
      <tfoot><tr><td colspan="2">Total</td><td class="num mono">${money(tp)}</td><td class="num mono">${money(ta)}</td><td class="num mono ${budgetVarClass(ta-tp)}">${money(ta-tp)}</td></tr></tfoot></table>
    </div>
    <div class="panel">
      <div class="row" style="justify-content:space-between;margin-bottom:6px">
        <h3 style="margin:0">Quick Budget Entry — all expense accounts, ${budgetMonth}</h3>
        <button class="btn pri" onclick="saveAllBudget()">Save All</button>
      </div>
      <div class="mut" style="font-size:12px;margin-bottom:10px">Type an amount for any account, then Save All. Saving replaces any existing budget entries for that account this month with the single amount shown here. Variance turns red when actual spend is above budget.</div>
      ${cats.map(cat=>`
        <div class="section-h">${esc(cat)}</div>
        <table><tbody>${byCat[cat].sort((a,b)=>a.id-b.id).map(a=>{
          const planned = budgetPlannedForAccMonth(a.id, budgetMonth);
          const actual = bulkActualsCache[a.id];
          return `<tr><td style="width:70px" class="mono">${a.id}</td><td>${esc(accShort(a.id))}</td>
            <td style="width:140px"><input id="bgAmt_${a.id}" type="number" step="0.01" value="${planned||''}" placeholder="0.00" class="num" oninput="updateBulkRow(${a.id})"></td>
            <td class="num mut" style="width:110px">actual ${money(actual)}</td>
            <td class="num mono ${budgetVarClass(actual-planned)}" id="bgVar_${a.id}" style="width:110px">${money(actual-planned)}</td></tr>`;
        }).join('')}</tbody></table>`).join('') || '<div class="empty">No expense accounts found</div>'}
    </div>
    <div class="panel" style="padding:0">
      <h3 style="padding:16px 16px 0">Budget Line Items — by Month</h3>
      <table><thead><tr><th>Month</th><th class="num">Lines</th><th class="num">Total Budgeted</th></tr></thead>
      <tbody>${budgetMonthsList().map(m=>{
        const items = D.budget.filter(b=>monthOf(b.date)===m);
        const total = items.reduce((s,b)=>s+Number(b.amt),0);
        return `<tr class="click" onclick="openBudgetMonthModal('${m}')"><td class="mono">${esc(monthLabel(m))}</td><td class="num">${items.length}</td><td class="num mono">${money(total)}</td></tr>`;
      }).join('') || '<tr><td colspan="3" class="empty">No budget lines entered yet</td></tr>'}</tbody></table>
    </div>`;
}
function budgetMonthsList(){ return [...new Set(D.budget.map(b=>monthOf(b.date)))].sort().reverse(); }
let budgetMonthEditDraft = null;

function budgetMonthAmtBlur(i, el){
  const raw = el.value.replace(/,/g,'').trim();
  const num = Number(raw);
  budgetMonthEditDraft.lines[i].amt = raw===''? '' : (isNaN(num)? '' : num);

}
function budgetMonthDeleteLine(i){
  const l = budgetMonthEditDraft.lines[i];
  if(l.isNew){ l.amt=''; renderBudgetMonthModal(); return; }
  if(!confirm('Remove this budget line?')) return;
  l.deleted = true;

}
async function saveBudgetMonthEdits(){
  const d = budgetMonthEditDraft;
  const toDelete = d.lines.filter(l=>!l.isNew && l.deleted);
  const toUpdate = d.lines.filter(l=>!l.isNew && !l.deleted);
  const toCreate = d.lines.filter(l=>l.isNew && l.amt!==''&&l.amt!==null && !isNaN(Number(l.amt)) && Number(l.amt)!==0);
  for(const l of toDelete){
    D.budget = D.budget.filter(b=>b.id!==l.id);
    await syncWrite('pd_budget', 'delete', {id:l.id}, l.updated_at||null);
  }
  for(const l of toUpdate){
    const row = D.budget.find(b=>b.id===l.id);
    if(row){ const base = row.updated_at||null; row.descr=l.descr; row.amt=Number(l.amt)||0; await syncWrite('pd_budget', 'upsert', {id:row.id, entry_date:row.date, acc:row.acc, descr:row.descr, amt:row.amt}, base); }
  }
  for(const l of toCreate){
    const row = {id: nextBudgetId(), date: l.date, acc: l.acc, descr: l.descr, amt: Number(l.amt)};
    D.budget.push(row);
    await syncWrite('pd_budget', 'upsert', {id:row.id, entry_date:row.date, acc:row.acc, descr:row.descr, amt:row.amt}, null);
  }
  persistLocal();
  closeModal();
  toast('Budget line items updated ✓');
  renderBudget();
}
function updateBulkRow(acc){

async function saveAllBudget(){

    const inp = document.getElementById('bgAmt_'+a.id);

async function saveBudgetLine(id){

/* ============================= P&L ============================= */
let pnlFrom = todayStr().slice(0,8)+'01', pnlTo = todayStr();
let pnlPreset = 'month', pnlSpecificMonth = todayStr().slice(0,7), pnlYear = todayStr().slice(0,4);
function dataYears(){
  const ys = new Set(D.ledger.map(l=>(l.date||'').slice(0,4)).filter(Boolean));
  return [...ys].sort();
}
function applyPnLPreset(val){
  pnlPreset = val;
  const today = todayStr();
  if(val==='month'){ [pnlFrom,pnlTo] = monthRange(today.slice(0,7)); }
  else if(val==='specific'){ [pnlFrom,pnlTo] = monthRange(pnlSpecificMonth); }
  else if(val==='ytd'){ pnlFrom = today.slice(0,4)+'-01-01'; pnlTo = today; }
  else if(val==='year'){ pnlFrom = pnlYear+'-01-01'; pnlTo = pnlYear+'-12-31'; }
  renderPnL();
}
function pnlSpecificMonthChange(v){ pnlSpecificMonth=v; pnlPreset='specific'; [pnlFrom,pnlTo]=monthRange(v); renderPnL(); }
function pnlYearChange(v){ pnlYear=v; pnlPreset='year'; pnlFrom=v+'-01-01'; pnlTo=v+'-12-31'; renderPnL(); }

function renderPnL(){
  // ---- Income: shown positive, grouped by category with subtotals ----
  const incAccs = D.accounts.filter(a=>firstDigit(a.id)===3 && (a.acc_type==='Individual Account'||a.acc_type==='Accrual Account'));
  const incByCat = {};
  incAccs.forEach(a=>{ const raw = sumAcc(l=>l.acc===a.id, pnlFrom, pnlTo); if(raw!==0) (incByCat[a.category] ??= []).push({a, v: Math.abs(raw)}); });
  const incCats = Object.keys(incByCat).sort((x,y)=> Math.min(...incByCat[x].map(i=>i.a.id)) - Math.min(...incByCat[y].map(i=>i.a.id)));
  let incTotal = 0;
  const incBody = incCats.map(cat=>{
    const items = incByCat[cat]; const catTotal = items.reduce((s,i)=>s+i.v,0); incTotal += catTotal;
    return `<tr style="background:var(--chip)"><td style="font-weight:700;color:var(--accent)">${esc(cat)}</td><td class="num mono g" style="font-weight:700">${money(catTotal)}</td></tr>` +
      items.map(i=>`<tr><td class="click" style="padding-left:18px" onclick="viewPnLAccountTransactions(${i.a.id})">${esc(accShort(i.a.id))}</td><td class="num mono g">${money(i.v)}</td></tr>`).join('');
  }).join('');

  // ---- Expenses: shown negative, grouped by category, with Budget/Actual/Variance — every expense account listed, even at zero ----
  const expAccs = D.accounts.filter(a=>firstDigit(a.id)===6 && (a.acc_type==='Individual Account'||a.acc_type==='Accrual Account') && a.status!=='Deleted');
  const expByCat = {};
  expAccs.forEach(a=>{
    const actualRaw = sumAcc(l=>l.acc===a.id, pnlFrom, pnlTo);
    const budgetRaw = D.budget.filter(b=>b.acc===a.id && b.date>=pnlFrom && b.date<=pnlTo).reduce((s,b)=>s+Number(b.amt),0);
    (expByCat[a.category] ??= []).push({a, actual: -Math.abs(actualRaw), budget: -Math.abs(budgetRaw)});
  });
  const expCats = Object.keys(expByCat).sort((x,y)=> Math.min(...expByCat[x].map(i=>i.a.id)) - Math.min(...expByCat[y].map(i=>i.a.id)));
  let expTotal = 0, expBudgetTotal = 0;
  const expBody = expCats.map(cat=>{
    const items = expByCat[cat].sort((a,b)=>a.a.id-b.a.id);
    const catTotal = items.reduce((s,i)=>s+i.actual,0), catBudget = items.reduce((s,i)=>s+i.budget,0);
    expTotal += catTotal; expBudgetTotal += catBudget;
    return `<tr style="background:var(--chip)"><td style="font-weight:700;color:var(--accent)">${esc(cat)}</td><td class="num mono" style="font-weight:700">${money(catBudget)}</td><td class="num mono r" style="font-weight:700">${money(catTotal)}</td><td class="num mono ${moneyClass(catTotal-catBudget)}" style="font-weight:700">${money(catTotal-catBudget)}</td></tr>` +
      items.map(i=>`<tr><td class="click" style="padding-left:18px" onclick="viewPnLAccountTransactions(${i.a.id})">${esc(accShort(i.a.id))}</td><td class="num mono">${money(i.budget)}</td><td class="num mono r">${money(i.actual)}</td><td class="num mono ${moneyClass(i.actual-i.budget)}">${money(i.actual-i.budget)}</td></tr>`).join('');
  }).join('');

  const net = incTotal + expTotal;
  const years = dataYears();
  document.getElementById('app').innerHTML = `
    <div class="panel noprint">
      <div class="row">
        <div style="width:190px"><label class="fl">Period</label>
          <select onchange="applyPnLPreset(this.value)">
            <option value="month" ${pnlPreset==='month'?'selected':''}>This month</option>
            <option value="specific" ${pnlPreset==='specific'?'selected':''}>Specific month…</option>
            <option value="ytd" ${pnlPreset==='ytd'?'selected':''}>Year to date</option>
            <option value="year" ${pnlPreset==='year'?'selected':''}>Specific year…</option>
            <option value="custom" ${pnlPreset==='custom'?'selected':''}>Custom range</option>
          </select>
        </div>
        ${pnlPreset==='specific'? `<div style="width:170px"><label class="fl">Month</label><input type="month" value="${pnlSpecificMonth}" onchange="pnlSpecificMonthChange(this.value)"></div>`:''}
        ${pnlPreset==='year'? `<div style="width:140px"><label class="fl">Year</label><select onchange="pnlYearChange(this.value)">${years.map(y=>`<option value="${y}" ${y===pnlYear?'selected':''}>${y}</option>`).join('')}</select></div>`:''}
        ${pnlPreset==='custom'? `<div style="width:170px"><label class="fl">From</label><input type="date" value="${pnlFrom}" onchange="pnlFrom=this.value; renderPnL()"></div><div style="width:170px"><label class="fl">To</label><input type="date" value="${pnlTo}" onchange="pnlTo=this.value; renderPnL()"></div>`:''}
        <div class="mut" style="align-self:center;margin-left:auto">${esc(pnlFrom)} → ${esc(pnlTo)}</div>
      </div>
    </div>
    <div class="panel"><h3>Income</h3><table><tbody>${incBody||'<tr><td class="empty" colspan="2">No income activity</td></tr>'}</tbody>
      <tfoot><tr><td>Total Income</td><td class="num mono g" style="font-size:15px">${money(incTotal)}</td></tr></tfoot></table></div>
    <div class="panel"><h3>Expenses</h3><table><thead><tr><th></th><th class="num">Budget</th><th class="num">Actual</th><th class="num">Variance</th></tr></thead>
      <tbody>${expBody||'<tr><td class="empty" colspan="4">No expense activity</td></tr>'}</tbody>
      <tfoot><tr><td>Total Expenses</td><td class="num mono" style="font-size:15px">${money(expBudgetTotal)}</td><td class="num mono r" style="font-size:15px">${money(expTotal)}</td><td class="num mono ${moneyClass(expTotal-expBudgetTotal)}" style="font-size:15px">${money(expTotal-expBudgetTotal)}</td></tr></tfoot></table></div>
    <div class="panel"><div class="row" style="justify-content:space-between"><h3 style="margin:0">Net Result</h3><div class="num mono" style="font-size:20px;font-weight:700;color:${moneyClass(net)==='r'?'var(--red)':(moneyClass(net)==='g'?'var(--green)':'inherit')}">${money(net)}</div></div>
    <div class="mut" style="font-size:12px;margin-top:6px">Income is shown as a positive figure and expenses as a negative figure — Net Result is Income + Expenses. Variance on expenses is Actual − Budget; negative means over budget.</div></div>`;
}
function viewPnLAccountTransactions(accId){
  const lines = D.ledger.filter(l=>l.acc===accId && l.date>=pnlFrom && l.date<=pnlTo).sort((a,b)=>(a.date||'').localeCompare(b.date||''));
  const total = lines.reduce((s,l)=>s+Number(l.amt),0);
  showModal(`
    <h3>${accId} — ${esc(accShort(accId))}</h3>
    <div class="mut" style="font-size:12px;margin-bottom:10px">Transactions from ${esc(pnlFrom)} to ${esc(pnlTo)}</div>
    <table><thead><tr><th>Date</th><th>JV#</th><th>Description</th><th class="num">Amount</th></tr></thead>
    <tbody>${lines.map(l=>`<tr class="click" onclick="viewJV(${l.jv})"><td class="mono">${esc(l.date)}</td><td class="mono">#${l.jv}</td><td>${esc(l.descr)}</td><td class="num mono ${moneyClass(l.amt)}">${money(l.amt)}</td></tr>`).join('') || '<tr><td colspan="4" class="empty">No transactions in this period</td></tr>'}</tbody>
    <tfoot><tr><td colspan="3">Total</td><td class="num mono ${moneyClass(total)}">${money(total)}</td></tr></tfoot></table>
    <div class="row" style="margin-top:16px;justify-content:flex-end"><button class="btn ghost" onclick="closeModal()">Close</button></div>`);
}

/* ============================= CASH FLOW ============================= */
let cfFrom = todayStr().slice(0,8)+'01', cfTo = todayStr();
function renderCashFlow(){
  const byType = {};
  D.ledger.forEach(l=>{
    if(l.date<cfFrom||l.date>cfTo) return;
    const a = ACC_BY_ID[l.acc]; const t = a? (a.cf_type||'Other') : 'Other';
    if(t==='--') return;
    (byType[t] ??= []).push(l);
  });
  const types = Object.keys(byType).sort();
  let grand=0;
  const rows = types.map(t=>{
    const total = byType[t].reduce((s,l)=>s+Number(l.amt),0); grand+=total;
    return `<tr><td>${esc(t)}</td><td class="num mut">${byType[t].length}</td><td class="num mono ${moneyClass(total)}">${money(total)}</td></tr>`;
  }).join('');
  document.getElementById('app').innerHTML = `
    <div class="panel noprint"><div class="row"><div style="width:170px"><label class="fl">From</label><input type="date" value="${cfFrom}" onchange="cfFrom=this.value; renderCashFlow()"></div>
      <div style="width:170px"><label class="fl">To</label><input type="date" value="${cfTo}" onchange="cfTo=this.value; renderCashFlow()"></div></div></div>
    <div class="panel"><h3>Cash Flow by Type</h3>
      <table><thead><tr><th>Cash Flow Type</th><th class="num">Lines</th><th class="num">Net Amount</th></tr></thead>
      <tbody>${rows || '<tr><td colspan="3" class="empty">No activity in this range</td></tr>'}</tbody>
      <tfoot><tr><td colspan="2">Net Cash Change</td><td class="num mono ${moneyClass(grand)}">${money(grand)}</td></tr></tfoot></table>
    </div>`;
}

/* ============================= PROVISIONS (recurring provision planner) ============================= */
function monthTag(ym){
  const [y,m] = ym.split('-').map(Number);
  const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return months[m-1]+' - '+String(y).slice(-2)+"'";
}
function monthLabel(ym){
  const [y,m] = ym.split('-').map(Number);
  const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return months[m-1]+'-'+String(y).slice(-2);
}
function sortedMonthKeys(group){ return Object.keys(group.months||{}).sort(); }
function groupStatus(group){
  const keys = sortedMonthKeys(group);
  for(const k of keys){
    const cell = group.months[k]||{};
    const vals = Object.values(cell).filter(v=>v!==''&&v!==null&&v!==undefined);
    if(!vals.length) continue;
    const sum = vals.reduce((s,v)=>s+Number(v),0);
    if(Math.abs(sum)>0.01) return {ok:false, badMonth:k};
  }
  return {ok:true};
}
function nextProvisionId(){ let m=0; D.provisionGroups.forEach(g=>{ if(g.id>m) m=g.id; }); return m+1; }
function findProvisionGroup(id){ return D.provisionGroups.find(g=>g.id===id); }
async function persistProvisionGroup(g){
  const base = g.updated_at||null;
  persistLocal();
  await syncWrite('pd_provisions', 'upsert', {id:g.id, name:g.name, lines:g.lines, months:g.months}, base);
}

let provisionEditingId = null;
function renderProvisions(){
  document.getElementById('app').innerHTML = `
    <div class="panel noprint row" style="justify-content:space-between">
      <div class="mut" style="font-size:12.5px">Plan recurring provision journal entries months in advance, then generate that month's JV with one click when it's time to post.</div>
      <button class="btn pri" onclick="openNewProvisionGroup()">+ New Group</button>
    </div>
    <div id="provisionGroupsList"></div>`;
  renderProvisionGroupsList();
}
function renderProvisionGroupsList(){
  const el = document.getElementById('provisionGroupsList');
  if(!el) return;
  el.innerHTML = D.provisionGroups.map(g=>{
    const status = groupStatus(g);
    const isEditing = provisionEditingId===g.id;
    const months = sortedMonthKeys(g);
    return `<div class="panel">
      <div class="row" style="justify-content:space-between">
        <div class="row">
          <span class="badge ${status.ok?'pos':'neg'}">${status.ok?'OK':'Error'}</span>
          <h3 style="margin:0;text-transform:none;font-size:16px;color:var(--text)">${esc(g.name)}</h3>
        </div>
        <div class="row">
          <button class="btn ghost sm" onclick="toggleProvisionEdit(${g.id})">${isEditing?'Collapse':'Edit Grid'}</button>

        </div>
      </div>
      ${!status.ok? `<div class="mut" style="font-size:12px;color:var(--red);margin-top:6px">${esc(monthLabel(status.badMonth))} doesn't net to zero — check the grid below.</div>`:''}
      <div class="row noprint" style="margin-top:10px;gap:8px">
        <select id="genMonthSel_${g.id}">${months.map(k=>`<option value="${k}">${esc(monthLabel(k))}</option>`).join('') || '<option value="">No months planned yet</option>'}</select>
        <button class="btn pri sm" ${months.length?'':'disabled'} onclick="generateProvisionJV(${g.id})">Generate JV</button>
      </div>
      ${isEditing? renderProvisionGrid(g) : ''}
    </div>`;
  }).join('') || '<div class="empty">No provision groups yet — click "+ New Group" to plan your first one.</div>';
}
function toggleProvisionEdit(id){ provisionEditingId = provisionEditingId===id? null : id; renderProvisionGroupsList(); }
function renderProvisionGrid(g){
  const months = sortedMonthKeys(g);
  return `
    <div style="overflow-x:auto;margin-top:12px">
    <table style="min-width:600px">
      <thead><tr><th style="min-width:220px">Account</th>${months.map(k=>`<th class="num">${esc(monthLabel(k))}</th>`).join('')}<th></th></tr></thead>
      <tbody>${g.lines.map((line,li)=>`<tr>
        <td>
          <div class="mono" style="font-size:12px">${line.acc} — ${esc(accShort(line.acc))}</div>
          <input value="${esc(line.descrBase)}" style="margin-top:3px;font-size:12px" placeholder="Description base" onchange="setProvisionDescrBase(${g.id},${li},this.value)">
          <button type="button" class="btn ghost sm" style="margin-top:4px;padding:3px 8px;font-size:11px" onclick="openBulkFillModal(${g.id},${li})">Bulk Fill…</button>
        </td>
        ${months.map(k=>{
          const v = (g.months[k]||{})[line.acc];
          const has = v!==undefined && v!==null && v!=='';
          return `<td class="num"><input type="text" inputmode="decimal" class="num" style="width:100px" value="${has?fmt2(v):''}" placeholder="—" data-raw="${has?v:''}"
            onfocus="this.value=this.dataset.raw" onblur="setProvisionCell(${g.id},'${k}',${line.acc},this.value)"></td>`;
        }).join('')}
        <td><button class="x" title="Remove account" onclick="removeProvisionLine(${g.id},${li})">✕</button></td>
      </tr>`).join('')}</tbody>
    </table>
    </div>
    <div class="row noprint" style="margin-top:12px;gap:8px">
      <div class="autoc" style="position:relative;width:260px">
        <input id="provAddAcc_${g.id}" placeholder="Add account…" oninput="provAccInput(${g.id},this.value)" onfocus="provAccInput(${g.id},this.value)"
          onkeydown="provAccKey(event,${g.id})" onblur="setTimeout(()=>provCloseAcDrop(${g.id}),150)">
        <div class="acdrop" id="provAcdrop_${g.id}"></div>
      </div>
      <input type="month" id="provAddMonth_${g.id}">
      <button class="btn ghost sm" onclick="addProvisionMonth(${g.id})">+ Add Month</button>
    </div>`;
}
function openBulkFillModal(gid, li){
  const g = findProvisionGroup(gid); if(!g) return;
  const line = g.lines[li];
  showModal(`
    <h3>Bulk Fill — ${line.acc} — ${esc(accShort(line.acc))}</h3>
    <label class="fl">Starting Month</label><input id="bfStartMonth" type="month" value="${todayStr().slice(0,7)}" style="margin-bottom:10px">
    <label class="fl">Amount</label><input id="bfAmount" type="text" inputmode="decimal" placeholder="e.g. 3334 or -3334" style="margin-bottom:10px">
    <label class="fl">Number of Months</label><input id="bfMonthCount" type="number" min="1" value="6" style="margin-bottom:14px">
    <div class="mut" style="font-size:11.5px;margin-bottom:14px">Fills this account's row for that many consecutive months starting from the month above, adding any months to the grid that don't already exist. You can still edit individual months afterward for exceptions.</div>
    <div class="row" style="justify-content:flex-end"><button class="btn ghost" onclick="closeModal()">Cancel</button><button class="btn pri" onclick="applyBulkFill(${gid},${li})">Fill</button></div>`);
}
function applyBulkFill(gid, li){
  const g = findProvisionGroup(gid); if(!g) return;
  const line = g.lines[li];
  const startMonth = document.getElementById('bfStartMonth').value;
  const amtRaw = document.getElementById('bfAmount').value;
  const count = parseInt(document.getElementById('bfMonthCount').value,10);
  const amt = Number(String(amtRaw).replace(/,/g,'').trim());
  if(!startMonth || isNaN(amt) || !count || count<1){ toast('Fill in a valid starting month, amount, and number of months', true); return; }
  let [y,m] = startMonth.split('-').map(Number);
  for(let i=0;i<count;i++){
    const key = y+'-'+String(m).padStart(2,'0');
    if(!g.months[key]) g.months[key] = {};
    g.months[key][line.acc] = amt;
    m++; if(m>12){ m=1; y++; }
  }
  persistProvisionGroup(g);
  closeModal();
  renderProvisionGroupsList();
  toast('Filled '+count+' month(s) ✓');
}
function openNewProvisionGroup(){
  const name = prompt('Name this provision group (e.g. "Madinah Home Rent"):');
  if(!name) return;
  const g = {id: nextProvisionId(), name: name.trim(), lines: [], months: {}};
  D.provisionGroups.push(g);
  persistProvisionGroup(g);
  provisionEditingId = g.id;
  renderProvisionGroupsList();
}
async function deleteProvisionGroup(id){
  if(!confirm('Delete this provision group? This only removes the plan, not any JVs you already posted.')) return;
  const g = findProvisionGroup(id);
  D.provisionGroups = D.provisionGroups.filter(x=>x.id!==id);
  persistLocal(); renderProvisionGroupsList();
  await syncWrite('pd_provisions', 'delete', {id}, g? g.updated_at||null : null);
}
function setProvisionDescrBase(gid, li, val){ const g=findProvisionGroup(gid); if(!g) return; g.lines[li].descrBase = val; persistProvisionGroup(g); }
function setProvisionCell(gid, monthKey, acc, val){
  const g = findProvisionGroup(gid); if(!g) return;
  const clean = String(val).replace(/,/g,'').trim();
  if(!g.months[monthKey]) g.months[monthKey] = {};
  if(clean===''){ delete g.months[monthKey][acc]; } else { g.months[monthKey][acc] = Number(clean); }
  persistProvisionGroup(g);
  renderProvisionGroupsList();
}
function removeProvisionLine(gid, li){ const g=findProvisionGroup(gid); if(!g) return; g.lines.splice(li,1); persistProvisionGroup(g); renderProvisionGroupsList(); }
function addProvisionMonth(gid){
  const g = findProvisionGroup(gid); if(!g) return;
  const ym = document.getElementById('provAddMonth_'+gid).value;
  if(!ym){ toast('Pick a month first', true); return; }
  if(!g.months[ym]) g.months[ym] = {};
  persistProvisionGroup(g);
  renderProvisionGroupsList();
}
let provPicker = {}; // gid -> {matches, hi}
function provAccInput(gid, val){
  const q = val.toLowerCase();
  const matches = postableAccounts().filter(a=> String(a.id).includes(q) || (a.name||'').toLowerCase().includes(q)).slice(0,20);
  provPicker[gid] = {matches, hi:-1};
  renderProvAcDrop(gid, val);
}
function renderProvAcDrop(gid, q){
  const state = provPicker[gid]||{matches:[],hi:-1};
  const el = document.getElementById('provAcdrop_'+gid);
  const html = state.matches.map((a,idx)=>`<div class="${idx===state.hi?'hi':''}" onmousedown="provPickAcc(${gid},${a.id})">${a.id} — ${esc(accShort(a.id))}</div>`).join('') || (q? '<div class="mut">No match</div>' : '');
  el.innerHTML = html;
  el.className = html? 'acdrop show' : 'acdrop';
}
function provAccKey(ev, gid){
  const state = provPicker[gid]||{matches:[],hi:-1};
  const matches = state.matches||[];
  if(ev.key==='ArrowDown'){ if(matches.length){ ev.preventDefault(); state.hi=Math.min(matches.length-1,state.hi+1); provPicker[gid]=state; renderProvAcDrop(gid,''); } }
  else if(ev.key==='ArrowUp'){ if(matches.length){ ev.preventDefault(); state.hi=Math.max(0,state.hi-1); provPicker[gid]=state; renderProvAcDrop(gid,''); } }
  else if(ev.key==='Enter'){ ev.preventDefault(); if(matches.length && state.hi>=0){ provPickAcc(gid, matches[state.hi].id); } }
  else if(ev.key==='Escape'){ provCloseAcDrop(gid); }
}
function provCloseAcDrop(gid){ const el=document.getElementById('provAcdrop_'+gid); if(el){ el.innerHTML=''; el.className='acdrop'; } }
function provPickAcc(gid, accId){
  const g = findProvisionGroup(gid); if(!g) return;
  if(g.lines.some(l=>l.acc===accId)){ toast('That account is already in this group', true); return; }
  g.lines.push({acc:accId, descrBase: accShort(accId)});
  persistProvisionGroup(g);
  const inp = document.getElementById('provAddAcc_'+gid); if(inp) inp.value='';
  provPicker[gid] = {matches:[], hi:-1};
  provCloseAcDrop(gid);
  renderProvisionGroupsList();
}
function generateProvisionJV(gid){
  const g = findProvisionGroup(gid); if(!g) return;
  const monthKey = document.getElementById('genMonthSel_'+gid).value;
  if(!monthKey){ toast('No month selected', true); return; }
  const cell = g.months[monthKey]||{};
  const lines = g.lines.filter(l=> cell[l.acc]!==undefined && cell[l.acc]!==null && cell[l.acc]!=='').map(l=>({
    key: Math.random().toString(36).slice(2), acc: l.acc, descr: (l.descrBase||accShort(l.acc))+' - '+monthTag(monthKey), amt: cell[l.acc], _matches:[], _hi:-1
  }));
  if(lines.length<2){ toast('This month needs at least two lines with amounts entered', true); return; }
  jvDraft = { date: monthKey+'-01', lines };
  go('newjv');
  toast('Prefilled '+monthLabel(monthKey)+' provision JV for "'+g.name+'" — review and post');
}

/* ============================= ALLOCATIONS ============================= */
let allocQ = '', allocAccFilter='';
function renderAlloc(){
  document.getElementById('app').innerHTML = `
    <div class="row noprint" style="margin-bottom:14px">
      <div class="toggle-tabs" style="display:inline-flex;border:1px solid var(--line);border-radius:8px;overflow:hidden">
        <button class="tbtn" style="border:none;border-radius:0;${allocTab==='unalloc'?'background:var(--accent);color:#1a1508':''}" onclick="allocTab='unalloc'; allocSelected.clear(); renderAlloc()">Unallocated</button>
        <button class="tbtn" style="border:none;border-radius:0;${allocTab==='groups'?'background:var(--accent);color:#1a1508':''}" onclick="allocTab='groups'; renderAlloc()">Existing Allocations</button>
      </div>
    </div>
    <div id="allocBody"></div>`;
  if(allocTab==='unalloc') renderAllocUnalloc(); else renderAllocGroups();
}
function unallocItems(){
  return D.ledger.filter(l=> ACC_BY_ID[l.acc]?.is_allocatable && !l.alloc).filter(l=>{
    if(allocAccFilter && String(l.acc)!==String(allocAccFilter)) return false;
    if(allocQ && !String(l.descr||'').toLowerCase().includes(allocQ.toLowerCase())) return false;
    return true;
  }).sort((a,b)=> a.acc-b.acc || (a.date||'').localeCompare(b.date||''));
}
function allocatableAccountsWithData(){
  const raw = D.ledger.filter(l=> ACC_BY_ID[l.acc]?.is_allocatable && !l.alloc);
  return [...new Set(raw.map(l=>l.acc))].sort((a,b)=>a-b);

function renderAllocUnalloc(){

function createBalancingJV(acc){
  const accSelected = [...allocSelected].filter(id=>{ const l=D.ledger.find(x=>x.id===id); return l && l.acc===acc; });
  const selSum = accSelected.reduce((s,id)=>{ const l=D.ledger.find(x=>x.id===id); return s+(l?Number(l.amt):0); },0);
  const needed = Math.round(-selSum*100)/100;
  resetJVDraft();
  jvDraft.lines[0].acc = acc;
  jvDraft.lines[0].amt = needed;
  jvDraft.lines[0].descr = 'Balance allocation for '+accShort(acc);
  reconcileAcc = null;
  go('newjv');
  toast('Prefilled a line for '+accShort(acc)+' ('+money(needed)+') to balance your selection — add the offsetting account and post');
}
function toggleAllocSel(id, acc){
  // an allocation can only ever contain lines from one account — starting a selection in a
  // different account's group clears whatever was selected elsewhere first
  if(!allocSelected.has(id) && allocSelected.size>0){
    const firstId = [...allocSelected][0];
    const firstLine = D.ledger.find(l=>l.id===firstId);
    if(firstLine && firstLine.acc!==acc){ allocSelected.clear(); }
  }
  if(allocSelected.has(id)) allocSelected.delete(id); else allocSelected.add(id);
  renderAllocUnallocResults();
}
async function assignAllocation(acc){
  const input = document.getElementById('allocNumInput_'+acc);
  const raw = input.value.trim();
  const num = parseInt(raw,10);
  if(!num || num<1){ toast('Enter a valid allocation number', true); return; }
  const ids = [...allocSelected];
  const accs = new Set(ids.map(id=>{ const l=D.ledger.find(x=>x.id===id); return l?l.acc:null; }));
  if(accs.size>1){ toast('An allocation can only group transactions from a single account', true); return; }
  const touched = [];
  ids.forEach(id=>{ const l = D.ledger.find(x=>x.id===id); if(l){ const base=l.updated_at||null; l.alloc = num; touched.push({row:l, base}); } });
  persistLocal();
  for(const t of touched){ await syncWrite('pd_ledger', 'upsert', {id:t.row.id, jv:t.row.jv, entry_date:t.row.date, acc:t.row.acc, descr:t.row.descr, amt:t.row.amt, alloc:t.row.alloc, allocatable:t.row.allocatable}, t.base); }
  toast('Allocation #'+pad5(num)+' created with '+ids.length+' lines ✓');
  allocSelected.clear();
  renderAlloc();
}

function viewAllocGroup(n){
  const lines = D.ledger.filter(l=>l.alloc===n).sort((a,b)=> a.acc-b.acc || (a.date||'').localeCompare(b.date||''));
  const total = lines.reduce((s,l)=>s+Number(l.amt),0);
  showModal(`<h3>Allocation #${pad5(n)}</h3>
    <div class="row" style="margin-bottom:14px"><label class="fl" style="margin:0">Renumber to</label><input id="allocRenumInput" style="width:130px" value="${pad5(n)}"><button class="btn ghost sm" onclick="renumberAllocation(${n})">Save number</button></div>
    <table><thead><tr><th style="width:70px">JV#</th><th>Date</th><th>Account</th><th>Description</th><th class="num">Amount</th><th></th></tr></thead>
    <tbody>${lines.map(l=>`<tr><td class="mono click" onclick="viewJV(${l.jv})">#${l.jv}</td><td class="mono">${esc(l.date)}</td><td>${l.acc}<div class="mut" style="font-size:11px">${esc(accShort(l.acc))}</div></td><td>${esc(l.descr)}</td>
      <td class="num mono ${moneyClass(l.amt)}">${money(l.amt)}</td><td><button class="x" title="Remove from allocation" onclick="unassignLine(${l.id},${n})">✕</button></td></tr>`).join('')}</tbody>
    <tfoot><tr><td colspan="4">Net</td><td class="num mono ${moneyClass(total)}">${money(total)}</td><td></td></tr></tfoot></table>
    <div class="row" style="margin-top:16px;justify-content:flex-end"><button class="btn ghost" onclick="closeModal()">Close</button></div>`, true);
}
async function renumberAllocation(oldNum){
  const raw = document.getElementById('allocRenumInput').value.trim();
  const newNum = parseInt(raw,10);
  if(!newNum || newNum<1){ toast('Enter a valid allocation number', true); return; }
  if(newNum===oldNum){ toast("That's already the current number"); return; }
  const collision = D.ledger.some(l=>l.alloc===newNum);
  if(collision){ toast('Allocation #'+pad5(newNum)+' is already in use — pick a different number', true); return; }
  const rows = D.ledger.filter(l=>l.alloc===oldNum);
  const touched = rows.map(l=>({row:l, base:l.updated_at||null}));
  rows.forEach(l=>{ l.alloc=newNum; });
  persistLocal();
  for(const t of touched){ await syncWrite('pd_ledger', 'upsert', {id:t.row.id, jv:t.row.jv, entry_date:t.row.date, acc:t.row.acc, descr:t.row.descr, amt:t.row.amt, alloc:t.row.alloc, allocatable:t.row.allocatable}, t.base); }
  toast('Renumbered to #'+pad5(newNum)+' ✓');
  viewAllocGroup(newNum);
  renderAlloc();
}
async function unassignLine(id,n){
  const l = D.ledger.find(x=>x.id===id);
  if(l){
    const base = l.updated_at||null;
    l.alloc=null;
    persistLocal();
    await syncWrite('pd_ledger', 'upsert', {id:l.id, jv:l.jv, entry_date:l.date, acc:l.acc, descr:l.descr, amt:l.amt, alloc:l.alloc, allocatable:l.allocatable}, base);
  }
  const remaining = D.ledger.filter(l=>l.alloc===n).length;
  if(remaining) viewAllocGroup(n); else closeModal();
  renderAlloc();
  toast('Removed from allocation');
}

async function doConnect(){

  const key = document.getElementById('sbKey').value.trim();
  if(!url||!key){ toast('Enter both the URL and key', true); return; }
  try{ await connectCloud(url,key,false); toast('Connected to your cloud database ✓'); renderSettings(); }

}

function handleRestoreFile(inputEl){
  const file = inputEl.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = async () => {
    let parsed;
    try{ parsed = JSON.parse(reader.result); }
    catch(e){ toast('That file isn\'t valid JSON', true); inputEl.value=''; return; }
    if(!parsed || !Array.isArray(parsed.accounts) || !Array.isArray(parsed.ledger)){
      toast('That doesn\'t look like a ledger backup file', true); inputEl.value=''; return;
    }
    const summary = 'Accounts: '+parsed.accounts.length+', Ledger: '+parsed.ledger.length+', Budget: '+(parsed.budget||[]).length+', Templates: '+(parsed.templates||[]).length;
    if(!confirm('Restore this backup?\n\n'+summary+'\n\nThis replaces everything currently shown in this browser'+(usingCloud?' AND your connected cloud project':'')+'.')){ inputEl.value=''; return; }
    await restoreFromBackup(parsed);
    inputEl.value='';
  };
  reader.readAsText(file);
}
async function restoreFromBackup(parsed){
  D = { accounts: parsed.accounts||[], ledger: parsed.ledger||[], budget: parsed.budget||[], templates: parsed.templates||[],
        categories: parsed.categories||(SEED.categories||[]).map(c=>({...c})), subcategories: parsed.subcategories||(SEED.subcategories||[]).map(s=>({...s})),
        provisionGroups: parsed.provisionGroups||[], accrualMappings: parsed.accrualMappings||[] };
  jvDrafts = parsed.drafts||[];
  saveJVDraftsList();
  rebuildIndex(); persistLocal();
  toast('Backup restored ✓');
  if(usingCloud){
    setStatus('Restoring to cloud…');
    await SB.from('pd_ledger').delete().neq('id',-1);
    await SB.from('pd_budget').delete().neq('id',-1);
    await SB.from('pd_templates').delete().neq('id',-1);
    await SB.from('pd_accounts').delete().neq('id',-1);
    await SB.from('pd_categories').delete().neq('digit',-1);
    await SB.from('pd_subcategories').delete().neq('sub_code',-1);
    await SB.from('pd_drafts').delete().neq('id',-1);
    await SB.from('pd_provisions').delete().neq('id',-1);
    await SB.from('pd_accrual_mappings').delete().neq('category','');
    if(D.accounts.length) await insertWithRetry('pd_accounts', D.accounts.map(a=>({id:a.id,descr:a.descr,balance:a.balance,direction:a.direction,acc_type:a.acc_type,name:a.name,cf_type:a.cf_type,category:a.category,status:a.status,is_savings:!!a.is_savings,is_allocatable:!!a.is_allocatable,is_credit_card:!!a.is_credit_card,credit_limit:a.credit_limit,stmt_balance:a.stmt_balance,stmt_available:a.stmt_available,stmt_date:a.stmt_date})));
    if(D.templates.length) await insertWithRetry('pd_templates', D.templates.map(t=>({id:t.id,name:t.name,lines:t.lines})));
    if(D.categories.length) await insertWithRetry('pd_categories', D.categories.map(c=>({digit:c.digit,name:c.name})));
    if(D.subcategories.length) await insertWithRetry('pd_subcategories', D.subcategories.map(s=>({cat_digit:s.catDigit,sub_code:s.subCode,name:s.name})));
    if(jvDrafts.length) await insertWithRetry('pd_drafts', jvDrafts.map(d=>({id:d.id, entry_date:d.date, lines:d.lines, saved_at:d.savedAt})));
    if(D.provisionGroups.length) await insertWithRetry('pd_provisions', D.provisionGroups.map(g=>({id:g.id, name:g.name, lines:g.lines, months:g.months})));
    if(D.accrualMappings.length) await insertWithRetry('pd_accrual_mappings', D.accrualMappings.map(m=>({category:m.category, liability_acc:m.liabilityAcc, expense_acc:m.expenseAcc})));
    const BATCH=250;
    for(let i=0;i<D.ledger.length;i+=BATCH){
      const chunk = D.ledger.slice(i,i+BATCH).map(l=>({id:l.id,jv:l.jv,entry_date:l.date,acc:l.acc,descr:l.descr,amt:l.amt,alloc:l.alloc,allocatable:l.allocatable}));
      await insertWithRetry('pd_ledger', chunk);
      setStatus('Restoring to cloud… '+Math.min(i+BATCH,D.ledger.length)+'/'+D.ledger.length);
    }
    for(let i=0;i<D.budget.length;i+=BATCH){
      const chunk = D.budget.slice(i,i+BATCH).map(b=>({id:b.id,entry_date:b.date,acc:b.acc,descr:b.descr,amt:b.amt}));
      await insertWithRetry('pd_budget', chunk);
    }
    const check = await SB.from('pd_ledger').select('id',{count:'exact',head:true});
    if((check.count||0)===D.ledger.length){ setStatus('Cloud synced','ok'); }
    else { setStatus('Restore incomplete','err'); toast('Only '+(check.count||0)+' of '+D.ledger.length+' rows made it — try restoring again', true); }
  }
  go('dashboard');
}

async function saveTemplateModal(){

async function deleteTemplate(id){

  D.templates = D.templates.filter(t=>t.id!==id);

/* ---- CSV import ---- */
function parseCSV(text){
  const rows = []; let row=[], field='', inQuotes=false;
  for(let i=0;i<text.length;i++){
    const c = text[i];
    if(inQuotes){
      if(c==='"'){ if(text[i+1]==='"'){ field+='"'; i++; } else inQuotes=false; }
      else field+=c;
    } else {
      if(c==='"') inQuotes=true;
      else if(c===','){ row.push(field); field=''; }
      else if(c==='\n'||c==='\r'){ if(c==='\r'&&text[i+1]==='\n')i++; row.push(field); field=''; rows.push(row); row=[]; }
      else field+=c;
    }
  }
  if(field!==''||row.length){ row.push(field); rows.push(row); }
  return rows.filter(r=>!(r.length===1 && r[0]===''));
}
function csvToObjects(text){
  const rows = parseCSV(text);
  if(!rows.length) return [];
  const headers = rows[0].map(h=>h.trim().toLowerCase());
  return rows.slice(1).map(r=>{ const o={}; headers.forEach((h,i)=>o[h]=(r[i]||'').trim()); return o; });
}
function downloadTemplateCSV(kind){
  const templates = {
    ledger: 'JV#,Date,Account#,Description,Amount,Alloc#\n2900,2026-07-15,10101,Example cash deposit,500,\n2900,2026-07-15,10102,Example transfer out,-500,\n',
    allocations: 'JV#,Account#,Amount,Alloc#\n2900,10101,500,50000\n',
    coa: 'Acc#,Name,Category,Account Type,Cash Flow Type,Direction,Status\n60199,Example Expense Account,Home Accounts,Individual Account,Expenses - Monthly,Outflow,\n'
  };
  const blob = new Blob([templates[kind]], {type:'text/csv'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = kind+'-import-template.csv'; a.click();
}
function handleImportFile(kind, inputEl){
  const file = inputEl.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = async () => {
    const rows = csvToObjects(reader.result);
    if(!rows.length){ toast('No rows found in that CSV', true); inputEl.value=''; return; }
    if(kind==='ledger') await importLedgerCSV(rows);
    else if(kind==='allocations') await importAllocationsCSV(rows);
    else if(kind==='coa') await importCOACSV(rows);
    inputEl.value='';
  };
  reader.readAsText(file);
}
async function importLedgerCSV(rows){
  if(!confirm('Import '+rows.length+' ledger rows? This adds new transactions — it does not check that they balance to zero.')) return;
  let id = nextLedgerId();
  const newRows = [];
  rows.forEach(r=>{
    const acc = parseInt(r['account#']||r['account'],10);
    const amt = Number(r['amount']);
    if(!acc || isNaN(amt)) return;
    const jv = parseInt(r['jv#']||r['jv'],10) || nextJV()+newRows.length;
    const alloc = parseInt(r['alloc#']||r['alloc'],10) || null;
    newRows.push({id: id++, jv, date: r['date']||todayStr(), acc, descr: r['description']||r['descr']||'', amt, alloc: alloc||null, allocatable:false});
  });
  D.ledger.push(...newRows);
  persistLocal();
  toast('Imported '+newRows.length+' ledger rows ✓'+(newRows.length>50?' — syncing…':''));
  for(const l of newRows){ await syncWrite('pd_ledger', 'upsert', {id:l.id,jv:l.jv,entry_date:l.date,acc:l.acc,descr:l.descr,amt:l.amt,alloc:l.alloc,allocatable:l.allocatable}, null); }
  renderSettings();
}
async function importAllocationsCSV(rows){
  let matched=0, unmatched=0;
  const touched = [];
  rows.forEach(r=>{
    const jv = parseInt(r['jv#']||r['jv'],10);
    const acc = parseInt(r['account#']||r['account'],10);
    const amt = Number(r['amount']);
    const alloc = parseInt(r['alloc#']||r['alloc'],10);
    if(!jv||!acc||isNaN(amt)||!alloc){ unmatched++; return; }
    const line = D.ledger.find(l=>l.jv===jv && l.acc===acc && Math.abs(l.amt-amt)<0.01 && !l.alloc);
    if(line){ const base=line.updated_at||null; line.alloc = alloc; touched.push({row:line, base}); matched++; } else unmatched++;
  });
  persistLocal();
  toast('Allocations: '+matched+' matched, '+unmatched+' unmatched');
  for(const t of touched){ await syncWrite('pd_ledger', 'upsert', {id:t.row.id, jv:t.row.jv, entry_date:t.row.date, acc:t.row.acc, descr:t.row.descr, amt:t.row.amt, alloc:t.row.alloc, allocatable:t.row.allocatable}, t.base); }
  renderSettings();
}
async function importCOACSV(rows){
  let added=0, updated=0;
  const touched = [];
  rows.forEach(r=>{
    const id = parseInt(r['acc#']||r['account#'],10);
    const name = r['name']||r['account name'];
    if(!id||!name) return;
    const obj = { id, descr:name, name:id+' - '+name, category:r['category']||'', acc_type:r['account type']||'Individual Account', cf_type:r['cash flow type']||'', direction:r['direction']||'', status:r['status']||null, is_savings:false, balance:0 };
    const existing = D.accounts.find(x=>x.id===id);
    const base = existing? existing.updated_at||null : null;
    if(existing){ Object.assign(existing, obj); updated++; } else { D.accounts.push(obj); added++; }
    touched.push({row:obj, base});
  });
  rebuildIndex(); persistLocal();
  toast('Chart of Accounts: '+added+' added, '+updated+' updated');
  for(const t of touched){ await syncWrite('pd_accounts', 'upsert', t.row, t.base); }
  renderSettings();
}

async function clearCOAData(){

async function clearAllocationsData(){

}

    await SB.from('pd_accrual_mappings').delete().neq('category','');
  }
  go('dashboard');
}

/* ============================= THEME ============================= */
const ACCENT_PALETTES = {
  amber:  {label:'Amber (default)', light:['#9a6b1f','#b9822b'], dark:['#d9a643','#e8bc63']},
  blue:   {label:'Blue',            light:['#2f5fa8','#4a7dc9'], dark:['#6fa8f5','#8ec1ff']},
  green:  {label:'Green',           light:['#146c43','#1f8a58'], dark:['#3fbf85','#5cd9a0']},
  purple: {label:'Purple',          light:['#6b3fa0','#8657c4'], dark:['#b98ff0','#cba8f7']},
  rust:   {label:'Rust',            light:['#a3352c','#c14839'], dark:['#e3695f','#f08a80']},
  teal:   {label:'Teal',            light:['#0f766e','#14a08f'], dark:['#2dd4bf','#5eead4']},
};
function applyAccent(){
  const name = localStorage.getItem('accentColor')||'amber';
  const pal = ACCENT_PALETTES[name]||ACCENT_PALETTES.amber;
  const dark = document.documentElement.dataset.theme==='dark';
  const [a,a2] = dark? pal.dark : pal.light;
  document.documentElement.style.setProperty('--accent', a);
  document.documentElement.style.setProperty('--accent2', a2);
}
function setAccentColor(name){ localStorage.setItem('accentColor', name); applyAccent(); renderSettings(); toast('Color updated ✓'); }
const FONT_SIZES = {
  small:  {label:'Small',  px:'13px'},
  medium: {label:'Medium (default)', px:'14px'},
  large:  {label:'Large',  px:'16px'},
  xlarge: {label:'Extra Large', px:'18px'},
};
const FONT_FAMILIES = {
  system: {label:'System Default (current)', stack:"-apple-system,'Segoe UI',Roboto,Arial,sans-serif"},
  serif:  {label:'Classic Serif', stack:"Georgia,'Iowan Old Style',serif"},
  humanist: {label:'Humanist Sans', stack:"Verdana,Tahoma,Geneva,sans-serif"},
  rounded: {label:'Rounded', stack:"'Trebuchet MS',Verdana,sans-serif"},
};
function applyTypography(){
  const sizeKey = localStorage.getItem('fontSize')||'medium';
  const famKey = localStorage.getItem('fontFamily')||'system';
  const size = FONT_SIZES[sizeKey]||FONT_SIZES.medium;
  const fam = FONT_FAMILIES[famKey]||FONT_FAMILIES.system;
  document.documentElement.style.setProperty('--basefs', size.px);
  document.documentElement.style.setProperty('--sans', fam.stack);
}
function setFontSize(v){ localStorage.setItem('fontSize', v); applyTypography(); renderSettings(); toast('Font size updated ✓'); }
function setFontFamily(v){ localStorage.setItem('fontFamily', v); applyTypography(); renderSettings(); toast('Font updated ✓'); }
const DEFAULT_SEMANTIC_COLORS = { light:{green:'#146c43', red:'#a3352c'}, dark:{green:'#3fbf85', red:'#e3695f'} };
function getCustomColor(kind){
  const dark = document.documentElement.dataset.theme==='dark';
  const stored = localStorage.getItem('color_'+kind+'_'+(dark?'dark':'light'));
  return stored || DEFAULT_SEMANTIC_COLORS[dark?'dark':'light'][kind];
}
function setCustomColor(kind, val){
  const dark = document.documentElement.dataset.theme==='dark';
  localStorage.setItem('color_'+kind+'_'+(dark?'dark':'light'), val);
  applySemanticColors();
  renderSettings();
  toast((kind==='green'?'Positive':'Negative')+' color updated ✓');
}
function resetCustomColor(kind){
  const dark = document.documentElement.dataset.theme==='dark';
  localStorage.removeItem('color_'+kind+'_'+(dark?'dark':'light'));
  applySemanticColors();
  renderSettings();
  toast('Reset to default');
}
function applySemanticColors(){
  document.documentElement.style.setProperty('--green', getCustomColor('green'));
  document.documentElement.style.setProperty('--red', getCustomColor('red'));
}
function getHiddenPages(){ try{ return JSON.parse(localStorage.getItem('hiddenPages')||'[]'); }catch(e){ return []; } }
function togglePageVisibility(id, visible){
  let hidden = getHiddenPages();
  if(visible){ hidden = hidden.filter(x=>x!==id); } else { if(!hidden.includes(id)) hidden.push(id); }
  localStorage.setItem('hiddenPages', JSON.stringify(hidden));
  renderNav();
  toast(visible? 'Page shown':'Page hidden');
}
function applyTheme(t){
  document.documentElement.dataset.theme = t;
  const b = document.getElementById('themeBtn'); if(b) b.textContent = (t==='dark'?'☀️':'🌙');
  try{ localStorage.setItem('uiTheme',t); }catch(e){}
  applyAccent();
  applyTypography();
  applySemanticColors();
}
function toggleTheme(){ applyTheme(document.documentElement.dataset.theme==='dark'?'light':'dark'); }

boot();

async function applyBatchEdit(tab){
  const location = document.getElementById('batch_location').value;
  const silo = document.getElementById('batch_silo').value;
  const priority = document.getElementById('batch_priority').value;
  const dueEnabled = tab==='oneTime' && document.getElementById('batch_due_enable').checked;
  const due = dueEnabled ? document.getElementById('batch_due').value : null;

  if(!location && !silo && !priority && !dueEnabled){ showToast('Pick at least one field to change'); return; }

  const list = tab==='oneTime' ? state.tasks.oneTime : state.tasks.recurring;
  let count = 0;
  list.forEach(t=>{
    if(!state.selectedTaskIds.has(t.id)) return;
    if(location) t.location = location;
    if(silo) t.silo = silo;
    if(priority) t.priority = priority;
    if(dueEnabled && due){
      if(!t.dueHistory) t.dueHistory = [];
      if(t.due && t.due !== due) t.dueHistory.push(t.due);
      t.due = due;
    }
    count++;
  });
  await saveTasks();
  exitBatchSelect();
  renderMain();
  showToast(`Updated ${count} task${count===1?'':'s'}`);
}

/* =========================================================
   RENDER: CALENDAR VIEW
   ========================================================= */
function densityForDate(dateStr){
  let count = 0, overdueCount = 0;
  const today = todayStr();
  state.tasks.oneTime.forEach(t=>{
    if(t.due === dateStr){
      // an incomplete overdue task no longer counts on its original date —
      // it piles up on today's box instead, so today shows what actually
      // needs attention and rescheduling
      if(!t.done && dateStr < today) return;
      count++;
    }
  });
  if(dateStr === today){
    const overdue = getOverdueOneTime().length;
    count += overdue;
    overdueCount += overdue;
  }
  if(state.calDensityMode === 'all'){
    state.tasks.recurring.forEach(t=>{ if(isDueOn(t, dateStr)) count++; });
  }
  return { count, overdueCount };
}
function setCalDensityMode(mode){
  state.calDensityMode = mode;
  renderMain();
}
async function toggleWeekendDay(day){
  const arr = state.settings.weekendDays;
  const idx = arr.indexOf(day);
  if(idx === -1) arr.push(day); else arr.splice(idx,1);
  await saveSettings();
  renderMain();
}

function renderCalendarView(){
  if(!state.calMonthCursor){
    const t = parseDate(todayStr());
    state.calMonthCursor = { year: t.getFullYear(), month: t.getMonth() };
  }
  const { year, month } = state.calMonthCursor;
  const firstOfMonth = new Date(year, month, 1);
  const startDow = firstOfMonth.getDay();
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const weekendDays = state.settings.weekendDays || [];

  let cells = '';
  for(let i=0;i<startDow;i++) cells += `<div class="cal-cell empty"></div>`;
  for(let day=1; day<=daysInMonth; day++){
    const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    const { count, overdueCount } = densityForDate(dateStr);
    const isToday = dateStr === todayStr();
    const dow = new Date(year, month, day).getDay();
    const isWeekend = weekendDays.includes(DOW_ABBR[dow]);
    const dots = Array.from({length: Math.min(count,6)}).map((_,i)=>
      `<span class="dot ${i < overdueCount ? 'over':''}"></span>`
    ).join('');
    cells += `
      <div class="cal-cell ${isToday?'today':''} ${isWeekend?'weekend':''}" onclick="jumpToDate('${dateStr}')">
        <span class="date-num">${day}</span>
        <div>
          <div class="dot-row">${dots}</div>
          ${count>0 ? `<span class="density-count">${count}</span>` : ''}
        </div>
      </div>`;
  }

  return `
    <div class="topbar">
      <div>
        <h1 class="page-title">Calendar</h1>
        <div class="page-sub">Task density by day — click a day to jump to Dashboard. Weekend days are set in Settings.</div>
      </div>
    </div>

    <div class="filter-bar">
      <div class="chip-select">
        <button class="${state.calDensityMode==='all'?'active':''}" onclick="setCalDensityMode('all')">All Tasks</button>
        <button class="${state.calDensityMode==='oneTime'?'active':''}" onclick="setCalDensityMode('oneTime')">One-Time Only</button>
      </div>
      <div class="sync-status" style="margin-left:auto;">
        <span class="dot" style="background:var(--brass);"></span> Due that day
        &nbsp;&nbsp;<span class="dot over" style="background:var(--flag);"></span> Overdue &amp; incomplete
        &nbsp;&nbsp;<span style="display:inline-block;width:10px;height:10px;border-radius:3px;background:color-mix(in srgb, var(--brass) 8%, var(--paper-raised));border:1px solid var(--line);"></span> Weekend
      </div>
    </div>

    <div class="card" style="padding:20px;">
      <div class="cal-header">
        <button class="btn secondary sm" onclick="shiftMonth(-1)">← Prev</button>
        <h2>${MONTH_NAMES[month]} ${year}</h2>
        <button class="btn secondary sm" onclick="shiftMonth(1)">Next →</button>
        <button class="btn ghost sm" onclick="goToCurrentMonth()">Today</button>
      </div>
      <div class="cal-grid">
        ${DOW_ABBR.map(d=>`<div class="cal-dow">${d}</div>`).join('')}
        ${cells}
      </div>
    </div>
  `;
}
function shiftMonth(delta){
  let { year, month } = state.calMonthCursor;
  month += delta;
  if(month < 0){ month = 11; year--; }
  if(month > 11){ month = 0; year++; }
  state.calMonthCursor = { year, month };
  renderMain();
}
function goToCurrentMonth(){
  const t = parseDate(todayStr());
  state.calMonthCursor = { year: t.getFullYear(), month: t.getMonth() };
  renderMain();
}
function jumpToDate(dateStr){
  state.selectedDate = dateStr;
  state.dashboardFilter = 'Today';
  state.view = 'dashboard';
  render();
}

async function toggleListItem(listId, itemId){
  const list = state.lists.find(l=>l.id===listId);
  const item = list?.items.find(i=>i.id===itemId);
  if(!item) return;
  item.done = !item.done;
  await saveLists();
  renderMain();
}
async function uncheckAllListItems(listId){
  const list = state.lists.find(l=>l.id===listId);
  if(!list) return;
  list.items.forEach(i=> i.done = false);
  await saveLists();
  renderMain();
  showToast('All items unchecked');
}
async function deleteListItem(listId, itemId){
  const list = state.lists.find(l=>l.id===listId);
  if(!list) return;
  list.items = list.items.filter(i=>i.id!==itemId);
  await saveLists();
  if(syncConfigured()){
    await enqueueSync(()=> runSyncSteps([
      ()=> supaDeleteMatch('list_items', `id=eq.${encodeURIComponent(itemId)}`),
    ]));
  }
  renderMain();
}
async function addListItem(listId, text){
  text = (text||'').trim();
  if(!text) return;
  const list = state.lists.find(l=>l.id===listId);
  if(!list) return;
  list.items.push({ id: newId('item'), text, done:false });
  await saveLists();
  renderMain();
  // keep the person typing without needing to re-click the box
  const inp = document.getElementById(`addItemInput_${listId}`);
  if(inp){ inp.focus(); }
}
async function deleteList(listId){
  if(!confirm('Delete this entire list?')) return;
  state.lists = state.lists.filter(l=>l.id!==listId);
  await saveLists();
  if(syncConfigured()){
    await enqueueSync(()=> runSyncSteps([
      ()=> supaDeleteMatch('lists', `id=eq.${encodeURIComponent(listId)}`),
      ()=> supaDeleteMatch('list_items', `list_id=eq.${encodeURIComponent(listId)}`),
    ]));
  }
  renderMain();
}
async function addNewList(){
  const title = prompt('Name this list:');
  if(!title || !title.trim()) return;
  state.lists.push({ id: newId('list'), title: title.trim(), items: [] });
  await saveLists();
  renderMain();
}

/* ---------- Drag-and-drop location reorder ---------- */
let dragFromIndex = null;
function onDragStart(e){
  dragFromIndex = Number(e.currentTarget.dataset.index);
  e.currentTarget.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
}
function onDragOver(e){
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
}
async function onDragDrop(e){
  e.preventDefault();
  const toIndex = Number(e.currentTarget.dataset.index);
  if(dragFromIndex === null || dragFromIndex === toIndex) return;
  const arr = state.settings.locations;
  const [moved] = arr.splice(dragFromIndex, 1);
  arr.splice(toIndex, 0, moved);
  await saveSettings();
  renderMain();
}
function onDragEnd(e){
  e.currentTarget.classList.remove('dragging');
  dragFromIndex = null;
}

/* ---------- Drag-and-drop page/sidebar reorder ---------- */
let pageDragFromIndex = null;
function onPageDragStart(e){
  pageDragFromIndex = Number(e.currentTarget.dataset.index);
  e.currentTarget.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
}
async function onPageDragDrop(e){
  e.preventDefault();
  const toIndex = Number(e.currentTarget.dataset.index);
  if(pageDragFromIndex === null || pageDragFromIndex === toIndex) return;
  const arr = state.settings.pageOrder;
  const [moved] = arr.splice(pageDragFromIndex, 1);
  arr.splice(toIndex, 0, moved);
  pageDragFromIndex = null;
  await saveSettings();
  render(); // sidebar order changed, needs a full shell re-render
}

async function setAccentColor(color){
  state.settings.accentColor = color;
  await saveSettings();
  renderMain();
}
async function setCompletedColor(color){
  state.settings.completedColor = color;
  await saveSettings();
  renderMain();
}
async function setRecurTypeColor(type, color){
  state.settings.recurTypeColors[type] = color;
  await saveSettings();
  renderMain();
}
async function setSiloColor(silo, color){
  if(!state.settings.siloColors) state.settings.siloColors = {};
  state.settings.siloColors[silo] = color;
  await saveSettings();
  renderMain();
}
async function togglePageVisible(key){
  const hidden = state.settings.hiddenPages;
  const idx = hidden.indexOf(key);
  if(idx === -1) hidden.push(key); else hidden.splice(idx,1);
  await saveSettings();
  render();
}

async function addTag(field, value){
  value = (value||'').trim();
  if(!value) return;
  if(state.settings[field].includes(value)){ showToast('Already exists'); return; }
  state.settings[field].push(value);
  await saveSettings();
  renderMain();
}
async function removeTag(field, value){
  state.settings[field] = state.settings[field].filter(v=>v!==value);
  await saveSettings();
  renderMain();
}
async function renameTag(field, oldValue){
  const newValue = prompt(`Rename "${oldValue}" to:`, oldValue);
  if(!newValue || !newValue.trim() || newValue.trim() === oldValue) return;
  const trimmed = newValue.trim();
  const idx = state.settings[field].indexOf(oldValue);
  if(idx === -1) return;
  state.settings[field][idx] = trimmed;

  // cascade the rename across every task that referenced the old value
  const taskField = field === 'locations' ? 'location' : 'silo';
  state.tasks.oneTime.forEach(t=>{ if(t[taskField] === oldValue) t[taskField] = trimmed; });
  state.tasks.recurring.forEach(t=>{ if(t[taskField] === oldValue) t[taskField] = trimmed; });

  await saveSettings();
  await saveTasks();
  renderMain();
  showToast(`Renamed to "${trimmed}" — updated on all matching tasks`);
}

function copySql(){
  const text = document.getElementById('sqlBlock').textContent;
  navigator.clipboard.writeText(text).then(()=> showToast('SQL copied')).catch(()=> showToast('Could not copy — select manually'));
}

async function connectSync(){
  const url = document.getElementById('syncUrl').value.trim();
  const anonKey = document.getElementById('syncKey').value.trim();
  const pin = document.getElementById('syncPin').value.trim();
  if(!url || !anonKey || !pin){ showToast('Fill in URL, key, and PIN'); return; }
  try{
    await testSupabaseConnection(url, anonKey, pin);
  } catch(e){
    console.error(e);
    showToast('Could not connect — check URL/key and that you ran the SQL');
    return;
  }
  state.settings.sync = { url, anonKey, pin };
  await window.storage.set(STORAGE_KEYS.SETTINGS, JSON.stringify(state.settings), false);
  state.syncMeta.status = 'syncing';
  updateSyncBadge();

  // reconcile: remote wins if it already has rows, otherwise push what we have now
  try{
    await pullFromSupabase((cur,total)=>{
      state.syncMeta.progress = { current: cur, total };
      updateSyncBadge();
      renderMain();
    });
    await markSyncSuccess();
  } catch(e){
    console.error(e);
    await markSyncError(e.message||String(e));
    updateSyncBadge();
    showToast('Connected, but initial sync failed — check the console');
    renderMain();
    return;
  }
  updateSyncBadge();
  renderMain();
  showToast('Connected — synced across devices');
}

async function disconnectSync(){
  if(!confirm('Disconnect sync? This device will keep its local copy of your data, but will stop mirroring to Supabase.')) return;
  state.settings.sync = null;
  await saveSettings();
  state.syncMeta = { status: 'off', dirty: false, lastSyncedAt: null, lastError: null };
  try{ await window.storage.set(STORAGE_KEYS.SYNC_META, JSON.stringify(state.syncMeta), false); } catch(e){}
  renderMain();
  showToast('Sync disconnected');
}

function quickDateButtonsHtml(inputId){
  return `
    <div class="quick-date-row">
      <button type="button" class="quick-date-btn" onclick="setQuickDate('${inputId}','tomorrow')">Tomorrow</button>
      <button type="button" class="quick-date-btn" onclick="setQuickDate('${inputId}','plus3')">In 3 days</button>
      <button type="button" class="quick-date-btn" onclick="setQuickDate('${inputId}','plus7')">In 7 days</button>
      <button type="button" class="quick-date-btn" onclick="setQuickDate('${inputId}','nextSunday')">Next Sunday</button>
      <button type="button" class="quick-date-btn" onclick="setQuickDate('${inputId}','nextMonth1st')">1st of next month</button>
    </div>
  `;
}
function setQuickDate(inputId, preset){
  const today = todayStr();
  let result;
  if(preset === 'tomorrow') result = addDays(today, 1);
  else if(preset === 'plus3') result = addDays(today, 3);
  else if(preset === 'plus7') result = addDays(today, 7);
  else if(preset === 'nextSunday'){
    const d = parseDate(today);
    let daysUntilSunday = (7 - d.getDay()) % 7;
    if(daysUntilSunday === 0) daysUntilSunday = 7; // "next" Sunday, not today even if today is Sunday
    result = addDays(today, daysUntilSunday);
  } else if(preset === 'nextMonth1st'){
    const d = parseDate(today);
    const y = d.getMonth()===11 ? d.getFullYear()+1 : d.getFullYear();
    const m = d.getMonth()===11 ? 0 : d.getMonth()+1;
    result = `${y}-${String(m+1).padStart(2,'0')}-01`;
  }
  const input = document.getElementById(inputId);
  if(input) input.value = result;
}

function recurDetailInputHtml(type, detail){
  if(type === 'Daily'){
    return `<label>Detail</label><input type="text" id="f_detail" value="" disabled placeholder="No detail needed for Daily">`;
  }
  if(type === 'Days of Week'){
    const selected = (detail||'').split(',').map(s=>s.trim());
    return `<label>Days (select all that apply)</label>
      <div class="radio-pills">
        ${DOW_ABBR.map(d=>`<button type="button" class="radio-pill dow-pill ${selected.includes(d)?'active':''}" data-day="${d}" onclick="this.classList.toggle('active')">${d}</button>`).join('')}
      </div>`;
  }
  if(type === 'Weekly' || type === 'Bi-Weekly'){
    return `<label>${type === 'Bi-Weekly' ? 'Occurs every 2 weeks on' : 'Day of week'}</label>
      <select id="f_detail">${DOW_FULL.map(d=>`<option value="${d}" ${d===detail?'selected':''}>${d}</option>`).join('')}</select>`;
  }
  if(type === 'Monthly'){
    return `<label>Day of Month (1–31)</label><input type="number" id="f_detail" min="1" max="31" value="${detail||1}">`;
  }
  if(type === 'Yearly'){
    const [mm,dd] = (detail||'01-01').split('-');
    return `<label>Month-Day (MM-DD)</label>
      <div class="field-row">
        <input type="number" id="f_detail_mm" min="1" max="12" value="${mm||1}" placeholder="MM">
        <input type="number" id="f_detail_dd" min="1" max="31" value="${dd||1}" placeholder="DD">
      </div>`;
  }
  if(type === 'Every X Days'){
    return `<label>Every N Days</label><input type="number" id="f_detail" min="1" value="${detail||5}">`;
  }
  return '';
}

function pickRecurType(type){
  modalRecurType = type;
  document.querySelectorAll('#recurTypePills .radio-pill').forEach(b=>{
    b.classList.toggle('active', b.textContent === type);
  });
  document.getElementById('recurDetailField').innerHTML = recurDetailInputHtml(type, '');
}

function readRecurDetail(){
  const type = modalRecurType;
  if(type === 'Daily') return '';
  if(type === 'Days of Week'){
    const picked = Array.from(document.querySelectorAll('.dow-pill.active')).map(b=>b.dataset.day);
    return picked.join(',');
  }
  if(type === 'Yearly'){
    const mm = String(document.getElementById('f_detail_mm').value).padStart(2,'0');
    const dd = String(document.getElementById('f_detail_dd').value).padStart(2,'0');
    return `${mm}-${dd}`;
  }
  const el = document.getElementById('f_detail');
  return el ? el.value : '';
}

function closeModal(){
  const overlay = document.getElementById('modalOverlay');
  if(overlay) overlay.remove();
}

function showRescheduleHistory(taskId){
  const t = state.tasks.oneTime.find(x=>x.id===taskId);
  if(!t || !t.dueHistory || !t.dueHistory.length) return;
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.id = 'rescheduleOverlay';
  overlay.onclick = (e)=>{ if(e.target === overlay) overlay.remove(); };
  overlay.innerHTML = `
    <div class="modal">
      <h3>Reschedule History</h3>
      <div class="modal-sub">${escapeHtml(t.name)}</div>
      <div class="newday-summary">
        ${t.dueHistory.map((d,i)=>`<div class="row"><span>Originally due (${i===0?'created':'change '+i})</span><b>${humanDate(d)}</b></div>`).join('')}
        <div class="row"><span>Currently due</span><b>${humanDate(t.due)}</b></div>
      </div>
      <div class="modal-actions">
        <button class="btn secondary" onclick="document.getElementById('rescheduleOverlay').remove();">Close</button>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);
}

async function saveTaskModal(){
  const name = document.getElementById('f_name').value.trim();
  if(!name){ showToast('Task name is required'); return; }
  const location = document.getElementById('f_location').value;
  const silo = document.getElementById('f_silo').value;
  const priority = document.getElementById('f_priority').value;
  const notes = document.getElementById('f_notes').value;

  if(modalKind === 'oneTime'){
    const due = document.getElementById('f_due').value;
    if(modalEditingId){
      const t = state.tasks.oneTime.find(x=>x.id===modalEditingId);
      if(!t.dueHistory) t.dueHistory = [];
      if(t.due && due && t.due !== due){
        t.dueHistory.push(t.due);
      }
      Object.assign(t, { name, location, silo, priority, notes, due });
    } else {
      state.tasks.oneTime.push({ id:newId('ot'), name, location, silo, priority, notes, due, done:false, dueHistory:[] });
    }
  } else {
    const type = modalRecurType;
    const detail = readRecurDetail();
    const start = document.getElementById('f_start').value || todayStr();
    const end = document.getElementById('f_end').value || null;
    if(modalEditingId){
      const t = state.tasks.recurring.find(x=>x.id===modalEditingId);
      Object.assign(t, { name, location, silo, priority, notes, type, detail, start, end });
    } else {
      state.tasks.recurring.push({ id:newId('rt'), name, location, silo, priority, notes, type, detail, start, end });
    }
  }
  await saveTasks();
  closeModal();
  renderMain();
  showToast(modalEditingId ? 'Task updated' : 'Task created');
}

/* =========================================================
   NEW DAY CONFIRMATION
   ========================================================= */
function maybeShowNewDayModal(){
  const last = state.settings.lastActiveDate;
  const today = todayStr();
  if(!last || last === today) return;

  // gather summary for the last active date
  const dueOneTime = state.tasks.oneTime.filter(t=>t.due === last);
  const doneOneTime = dueOneTime.filter(t=>t.done).length;

  const dueRecurring = state.tasks.recurring.filter(t=>isDueOn(t, last));
  const doneRecurring = dueRecurring.filter(t=>isCompletedOn(t.id, last)).length;

  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.id = 'newDayOverlay';
  overlay.innerHTML = `
    <div class="modal">
      <h3>Good morning 👋</h3>
      <div class="modal-sub">Here's how ${humanDate(last)} wrapped up. Confirm to move ${APP_NAME} forward to ${humanDate(today)}.</div>
      <div class="newday-summary">
        <div class="row"><span>One-time tasks completed</span><b>${doneOneTime} / ${dueOneTime.length}</b></div>
        <div class="row"><span>Recurring tasks completed</span><b>${doneRecurring} / ${dueRecurring.length}</b></div>
      </div>
      <div class="modal-sub">Nothing is deleted — past days stay in your history and streaks. This just moves "Today" forward.</div>
      <div class="modal-actions">
        <button class="btn brass" onclick="confirmNewDay()">Start ${humanDate(today)} →</button>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);
}

async function confirmNewDay(){
  state.settings.lastActiveDate = todayStr();
  state.selectedDate = todayStr();
  await saveSettings();
  const overlay = document.getElementById('newDayOverlay');
  if(overlay) overlay.remove();
  render();
}

/* =========================================================
   INIT
   ========================================================= */
function setLoadingText(text){
  const el = document.querySelector('#loadingScreen div:last-child');
  if(el) el.textContent = text;
}

/* =========================================================
   PASSCODE GATE
   Blocks all app content — including Settings, seed data, everything —
   until the right passcode is entered. Re-asked on every load; nothing is
   ever remembered as "unlocked" between sessions.

   IMPORTANT (told to the person, not hidden): this is a static file with no
   server behind it. This gate deters casual viewing of a shared link; it is
   not real security against someone who deliberately inspects the page
   source. Real protection means controlling who can reach the URL at all.
   ========================================================= */
function gateEl(){ return document.getElementById('gateScreen'); }

// If "stay unlocked on this device" is on and the last successful unlock
// matches the CURRENT correct value, skip the gate entirely. If the PIN/
// passcode has since changed, this naturally stops matching and the gate
// reappears — no separate invalidation logic needed.
async function checkRememberedUnlock(stored){
  if(!stored || stored.rememberUnlock === false) return false;
  const correctValue = (stored.sync && stored.sync.pin) ? stored.sync.pin : (stored.localPasscode || null);
  if(!correctValue) return false;
  const unlockRes = await safeGet(STORAGE_KEYS.UNLOCK);
  if(!unlockRes) return false;
  try{
    const saved = JSON.parse(unlockRes.value);
    return saved && saved.value === correctValue;
  } catch(e){ return false; }
}
async function rememberThisUnlock(stored, correctValue){
  if(stored.rememberUnlock === false) return;
  try{ await window.storage.set(STORAGE_KEYS.UNLOCK, JSON.stringify({ value: correctValue }), false); } catch(e){}
}
async function forgetRememberedUnlock(){
  try{ await window.storage.delete(STORAGE_KEYS.UNLOCK, false); } catch(e){}
}

// The gate needs to write partial settings (just a pin, or just localPasscode)
// before the rest of the app has ever initialized full defaults. This
// guarantees whatever gets written is always a COMPLETE settings object —
// otherwise a fresh device's first write would omit locations/silos/etc,
// and every view that reads them would crash on next load.
function completeSettingsObject(partial){
  const base = Object.assign({
    locations: ['1.Office','2.Errand','3.Home','4.Madinah','5.Last'],
    silos: ['Financial','Work','Personal Tasks','Self Development','Career Development','Home Maintenance','Lamees'],
    lastActiveDate: todayStr(),
    sync: null,
  }, DEFAULT_SETTINGS_EXTRAS, partial||{});
  return base;
}

async function runPasscodeGate(){
  const settingsRes = await safeGet(STORAGE_KEYS.SETTINGS);
  const stored = settingsRes ? JSON.parse(settingsRes.value) : null;
  const knownPin = stored && stored.sync && stored.sync.pin ? stored.sync.pin : null;
  const knownLocalPasscode = stored && stored.localPasscode ? stored.localPasscode : null;

  if(await checkRememberedUnlock(stored)) return; // skip the gate entirely

  return new Promise(resolve=>{
    if(knownPin){
      renderPinGate(knownPin, resolve, stored);
    } else if(knownLocalPasscode){
      renderPinGate(knownLocalPasscode, resolve, stored);
    } else {
      renderSetupGate(resolve);
    }
  });
}

function renderPinGate(correctValue, resolve, stored){
  gateEl().innerHTML = `
    <div class="gate-screen">
      <div class="gate-card">
        <div class="gate-brand"><span class="brand-mark"></span>${APP_NAME}</div>
        <div class="gate-sub">Enter your passcode to continue.</div>
        <div class="gate-error" id="gateError">Incorrect passcode.</div>
        <div class="field">
          <input type="password" id="gatePasscodeInput" inputmode="numeric" placeholder="Passcode" autofocus>
        </div>
        <button class="btn brass" style="width:100%; justify-content:center;" onclick="submitPinGate()">Unlock</button>
        <button class="gate-link" onclick="forgotGatePasscode()">Forgot passcode?</button>
      </div>
    </div>
  `;
  window.__gateResolve = resolve;
  window.__gateCorrectValue = correctValue;
  window.__gateStored = stored;
  const input = document.getElementById('gatePasscodeInput');
  input.focus();
  input.addEventListener('keydown', (e)=>{ if(e.key==='Enter') submitPinGate(); });
}
async function forgotGatePasscode(){
  const ok = confirm(
    "This clears this device's saved connection info (not your actual tasks) and returns you to setup.\n\n" +
    "If you were syncing with Supabase: your data is safe there — just reconnect with your URL, key, and PIN.\n" +
    "If you were in local-only mode: your local tasks stay on this device — you'll set a new passcode to get back in.\n\n" +
    "Continue?"
  );
  if(!ok) return;
  const settingsRes = await safeGet(STORAGE_KEYS.SETTINGS);
  const stored = completeSettingsObject(settingsRes ? JSON.parse(settingsRes.value) : {});
  stored.sync = null;
  stored.localPasscode = null;
  await window.storage.set(STORAGE_KEYS.SETTINGS, JSON.stringify(stored), false);
  await forgetRememberedUnlock();
  renderSetupGate(window.__gateResolve);
}
async function submitPinGate(){
  const val = document.getElementById('gatePasscodeInput').value;
  if(val === window.__gateCorrectValue){
    await rememberThisUnlock(window.__gateStored || {}, val);
    gateEl().innerHTML = '';
    window.__gateResolve();
  } else {
    document.getElementById('gateError').classList.add('show');
    const input = document.getElementById('gatePasscodeInput');
    input.value = '';
    input.focus();
  }
}

function renderSetupGate(resolve){
  gateEl().innerHTML = `
    <div class="gate-screen">
      <div class="gate-card wide">
        <div class="gate-brand"><span class="brand-mark"></span>${APP_NAME}</div>
        <div class="gate-sub">First time on this device. Connect to your existing Supabase sync to pull your data and set this device's passcode.</div>
        <div class="gate-error" id="gateError"></div>
        <div class="field"><label>Project URL</label><input type="text" id="gateUrl" placeholder="https://xxxxx.supabase.co"></div>
        <div class="field"><label>Anon / Public API Key</label><input type="text" id="gateKey" placeholder="eyJhbGciOi..."></div>
        <div class="field"><label>PIN</label><input type="password" id="gatePin" inputmode="numeric" placeholder="Your sync PIN"></div>
        <button class="btn brass" style="width:100%; justify-content:center;" onclick="submitSetupGate()">Connect &amp; Unlock</button>
        <div class="gate-divider">or</div>
        <button class="gate-link" onclick="showLocalOnlyGate()">Use this device without sync — set a local passcode instead</button>
      </div>
    </div>
  `;
  window.__gateResolve = resolve;
}
async function submitSetupGate(){
  const url = document.getElementById('gateUrl').value.trim();
  const anonKey = document.getElementById('gateKey').value.trim();
  const pin = document.getElementById('gatePin').value.trim();
  const errEl = document.getElementById('gateError');
  if(!url || !anonKey || !pin){ errEl.textContent = 'Fill in all three fields.'; errEl.classList.add('show'); return; }
  errEl.classList.remove('show');
  try{
    await testSupabaseConnection(url, anonKey, pin);
  } catch(e){
    errEl.textContent = 'Could not connect — check the URL and key.';
    errEl.classList.add('show');
    return;
  }
  // save just enough for loadAll() to pick up normally right after this
  const settingsRes = await safeGet(STORAGE_KEYS.SETTINGS);
  const stored = completeSettingsObject(settingsRes ? JSON.parse(settingsRes.value) : {});
  stored.sync = { url, anonKey, pin };
  await window.storage.set(STORAGE_KEYS.SETTINGS, JSON.stringify(stored), false);
  await rememberThisUnlock(stored, pin);
  gateEl().innerHTML = '';
  window.__gateResolve();
}
function showLocalOnlyGate(){
  gateEl().innerHTML = `
    <div class="gate-screen">
      <div class="gate-card">
        <div class="gate-brand"><span class="brand-mark"></span>${APP_NAME}</div>
        <div class="gate-sub">Set a passcode for this device. There's no recovery for this — if you forget it, the only way back in is resetting this device's local data.</div>
        <div class="gate-error" id="gateError">Enter at least 4 characters.</div>
        <div class="field"><label>New Passcode</label><input type="password" id="gateNewPasscode" inputmode="numeric" placeholder="Choose a passcode"></div>
        <button class="btn brass" style="width:100%; justify-content:center;" onclick="submitLocalPasscodeSetup()">Set Passcode &amp; Continue</button>
      </div>
    </div>
  `;
  document.getElementById('gateNewPasscode').focus();
}
async function submitLocalPasscodeSetup(){
  const val = document.getElementById('gateNewPasscode').value;
  if(!val || val.length < 4){ document.getElementById('gateError').classList.add('show'); return; }
  const settingsRes = await safeGet(STORAGE_KEYS.SETTINGS);
  const stored = completeSettingsObject(settingsRes ? JSON.parse(settingsRes.value) : {});
  stored.localPasscode = val;
  await window.storage.set(STORAGE_KEYS.SETTINGS, JSON.stringify(stored), false);
  await rememberThisUnlock(stored, val);
  gateEl().innerHTML = '';
  window.__gateResolve();
}

async function init(){
  await runPasscodeGate();
  await loadSettingsOnly(); // pick up anything the gate just wrote (pin/passcode), fully
  document.getElementById('loadingScreen').classList.remove('hidden');
  await loadAll();
  document.getElementById('loadingScreen').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  render();
  maybeShowNewDayModal();
  // keep the "Synced Xm ago" label fresh without requiring an interaction
  setInterval(updateSyncBadge, 30000);
  if(!usingNativeAppStorage){
    setTimeout(()=> showToast('Running standalone — saving to this browser instead of Claude'), 700);
  }
}

init();

</script>

<style>
/* ============ DESIGN TOKENS ============ */
:root{
  --ink:#181C22;
  --ink-soft:#2B313B;
  --paper:#F7F4EC;
  --paper-raised:#FFFFFF;
  --paper-dim:#EDE9DD;
  --line:#DCD6C4;
  --brass:#B9862F;
  --brass-deep:#8E661F;
  --teal:#3C7A73;
  --teal-soft:#E4EEEC;
  --flag:#B5432E;
  --flag-soft:#F5E3DE;
  --slate:#6B7280;
  --slate-light:#9CA3AF;
  --gold-stamp:#C8963E;

  --font-display:'Fraunces', serif;
  --font-body:'Inter', sans-serif;
  --font-mono:'IBM Plex Mono', monospace;

  --radius-s:6px;
  --radius-m:10px;
  --radius-l:16px;
  --shadow-card: 0 1px 2px rgba(24,28,34,0.06), 0 1px 1px rgba(24,28,34,0.04);
  --shadow-pop: 0 12px 32px rgba(24,28,34,0.18);
}

*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  font-family:var(--font-body);
  background:var(--paper);
  color:var(--ink);
  -webkit-font-smoothing:antialiased;
}
::selection{background:var(--brass); color:#fff;}

button{font-family:inherit; cursor:pointer;}
input,select,textarea{font-family:inherit;}

::-webkit-scrollbar{width:10px; height:10px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--line); border-radius:8px;}

a{color:inherit;}

/* ============ APP SHELL ============ */
#app{
  display:flex;
  min-height:100vh;
}

.sidebar{
  width:236px;
  flex-shrink:0;
  background:var(--ink);
  color:#EDE9DD;
  display:flex;
  flex-direction:column;
  padding:22px 16px;
  position:sticky;
  top:0;
  height:100vh;
}
.brand{
  font-family:var(--font-display);
  font-size:22px;
  font-weight:600;
  letter-spacing:0.01em;
  color:#fff;
  padding:4px 8px 4px;
  display:flex;
  align-items:baseline;
  gap:8px;
}
.brand .brand-mark{
  width:10px;height:10px;border-radius:2px;
  background:var(--brass);
  display:inline-block;
  transform:rotate(45deg);
  flex-shrink:0;
}
.brand-sub{
  font-family:var(--font-mono);
  font-size:10.5px;
  letter-spacing:0.14em;
  text-transform:uppercase;
  color:#8A93A3;
  padding:0 8px 22px;
}

.nav{
  display:flex;
  flex-direction:column;
  gap:2px;
  margin-top:6px;
}
.nav-item{
  display:flex;
  align-items:center;
  gap:10px;
  padding:9px 10px;
  border-radius:var(--radius-s);
  color:#C7CCD6;
  background:transparent;
  border:none;
  text-align:left;
  font-size:13.5px;
  font-weight:500;
  transition:background .12s ease, color .12s ease;
}
.nav-item:hover{background:rgba(255,255,255,0.06); color:#fff;}
.nav-item.active{background:var(--brass); color:#1a1408;}
.nav-item .nav-icon{width:16px; text-align:center; font-size:14px; opacity:.9;}
.nav-count{
  margin-left:auto;
  font-family:var(--font-mono);
  font-size:10.5px;
  background:rgba(255,255,255,0.1);
  padding:1px 6px;
  border-radius:20px;
  color:#C7CCD6;
}
.nav-item.active .nav-count{background:rgba(0,0,0,0.15); color:#1a1408;}

.sidebar-footer{
  margin-top:auto;
  padding-top:14px;
  border-top:1px solid rgba(255,255,255,0.08);
}
.today-chip{
  font-family:var(--font-mono);
  font-size:11px;
  color:#8A93A3;
  padding:6px 8px;
  line-height:1.5;
}
.today-chip b{color:#EDE9DD; font-weight:600;}

.sync-badge{
  display:flex; align-items:center; gap:7px;
  font-family:var(--font-mono); font-size:10.5px;
  padding:7px 9px; border-radius:8px;
  color:#C7CCD6; background:rgba(255,255,255,0.05);
  margin-bottom:6px; cursor:default;
}
.sync-badge-dot{width:7px; height:7px; border-radius:50%; background:#6B7280; flex-shrink:0;}
.sync-badge.on .sync-badge-dot{background:#4C8C5C;}
.sync-badge.on{color:#9FCBA8;}
.sync-badge.syncing .sync-badge-dot{background:var(--brass); animation:pulse-dot 1s ease-in-out infinite;}
.sync-badge.syncing{color:#E0C68A;}
.sync-badge.error{cursor:pointer; color:#E7A79C; background:rgba(197,90,73,0.15);}
.sync-badge.error .sync-badge-dot{background:var(--flag);}
.sync-badge.off{color:#8A93A3;}
@keyframes pulse-dot{0%,100%{opacity:1;} 50%{opacity:.3;}}

.main{
  flex:1;
  min-width:0;
  padding:28px 36px 80px;
  max-width:1180px;
}

.topbar{
  display:flex;
  align-items:center;
  gap:14px;
  margin-bottom:26px;
  flex-wrap:wrap;
}
.page-title{
  font-family:var(--font-display);
  font-size:28px;
  font-weight:600;
  margin:0;
  flex:1;
  min-width:180px;
}
.page-sub{
  font-family:var(--font-mono);
  font-size:11.5px;
  color:var(--slate);
  margin-top:2px;
  letter-spacing:0.02em;
}

.search-box{
  display:flex;
  align-items:center;
  gap:8px;
  background:var(--paper-raised);
  border:1px solid var(--line);
  border-radius:999px;
  padding:8px 14px;
  min-width:220px;
}
.search-box input{
  border:none; outline:none; background:transparent;
  font-size:13px; width:100%; color:var(--ink);
}
.search-box .icon{color:var(--slate-light); font-size:13px;}

.btn{
  border:1px solid var(--ink);
  background:var(--ink);
  color:#fff;
  padding:9px 16px;
  border-radius:8px;
  font-size:13px;
  font-weight:600;
  display:inline-flex;
  align-items:center;
  gap:6px;
  transition:transform .08s ease, box-shadow .12s ease;
}
.btn:hover{transform:translateY(-1px); box-shadow:var(--shadow-card);}
.btn:active{transform:translateY(0);}
.btn.secondary{background:transparent; color:var(--ink); border-color:var(--line);}
.btn.brass{background:var(--brass); border-color:var(--brass); color:#211705;}
.btn.ghost{background:transparent; border-color:transparent; color:var(--slate); padding:6px 8px;}
.btn.danger{background:transparent; color:var(--flag); border-color:var(--flag-soft);}
.btn.sm{padding:6px 11px; font-size:12px;}
.btn:disabled{opacity:.45; cursor:not-allowed;}

/* ============ CARD / SECTION ============ */
.section{margin-bottom:30px;}
.section-head{
  display:flex; align-items:baseline; justify-content:space-between;
  margin-bottom:12px;
}
.section-head h2{
  font-family:var(--font-display);
  font-size:17px;
  font-weight:600;
  margin:0;
  display:flex;
  align-items:center;
  gap:8px;
}
.section-count{
  font-family:var(--font-mono);
  font-size:11px;
  color:var(--slate);
}

.card{
  background:var(--paper-raised);
  border:1px solid var(--line);
  border-radius:var(--radius-m);
  box-shadow:var(--shadow-card);
}

/* ============ TASK TICKET (signature element) ============ */
.ticket-list{display:flex; flex-direction:column; gap:8px;}
.ticket{
  position:relative;
  display:flex;
  align-items:flex-start;
  gap:12px;
  background:var(--paper-raised);
  border:1px solid var(--line);
  border-radius:var(--radius-m);
  padding:13px 16px 13px 8px;
  transition:box-shadow .15s ease, border-color .15s ease;
}
.ticket:hover{box-shadow:var(--shadow-card); border-color:#C9C2AC;}
.ticket::before{
  content:"";
  position:absolute;
  left:-6px; top:50%;
  width:12px; height:12px;
  background:var(--paper);
  border:1px solid var(--line);
  border-radius:50%;
  transform:translateY(-50%);
}
.ticket.done{
  opacity:.85;
  background:color-mix(in srgb, var(--completed-color, var(--teal)) 8%, var(--paper-raised));
  border-color:color-mix(in srgb, var(--completed-color, var(--teal)) 30%, var(--line));
}
.ticket.overdue{border-color:#E4B7AA; background:linear-gradient(90deg, var(--flag-soft) 0%, var(--paper-raised) 90px);}

.tick-btn{
  flex-shrink:0;
  width:22px; height:22px;
  border-radius:50%;
  border:1.5px solid var(--line);
  background:#fff;
  margin-top:2px;
  display:flex; align-items:center; justify-content:center;
  color:transparent;
  transition:all .12s ease;
}
.tick-btn:hover{border-color:var(--brass);}
.tick-btn.checked{background:var(--completed-color, var(--teal)); border-color:var(--completed-color, var(--teal)); color:#fff;}
.tick-btn.missed-tick{background:#C98A3E; border-color:#C98A3E; color:#fff; font-weight:700;}

.ticket-body{flex:1; min-width:0;}
.ticket-title-row{display:flex; align-items:center; gap:8px; flex-wrap:wrap;}
.ticket-title{
  font-size:14px; font-weight:600; color:var(--ink);
  line-height:1.35;
}
.ticket.done .ticket-title{text-decoration:line-through; color:var(--completed-deep, var(--slate));}
.ticket.missed .ticket-title{text-decoration:line-through; color:#A87B3F;}
body.dark-mode .ticket.missed .ticket-title{color:#D8B078;}
.ticket-meta{
  display:flex; align-items:center; gap:10px; flex-wrap:wrap;
  margin-top:5px;
  font-family:var(--font-mono);
  font-size:10.8px;
  color:var(--slate);
}
.tag{
  display:inline-flex; align-items:center; gap:4px;
  padding:2px 8px;
  border-radius:20px;
  background:var(--paper-dim);
  font-family:var(--font-mono);
  font-size:10.3px;
  color:var(--ink-soft);
  white-space:nowrap;
}
.tag.recur{background:var(--teal-soft); color:var(--teal);}
.tag.pri-High{background:var(--flag-soft); color:var(--flag);}
.tag.pri-Medium{background:#F3EBD8; color:var(--brass-deep);}
.tag.pri-Low{background:var(--paper-dim); color:var(--slate);}

.stamp{
  position:absolute;
  top:10px; right:78px;
  font-family:var(--font-mono);
  font-size:9.5px;
  font-weight:600;
  letter-spacing:0.09em;
  padding:3px 8px;
  border-radius:4px;
  border:1px solid currentColor;
  transform:rotate(3deg);
  text-transform:uppercase;
  background:var(--paper-raised);
  white-space:nowrap;
}
.stamp.overdue{color:var(--flag);}
.stamp.streak{color:var(--brass-deep); border-style:dashed;}
.stamp.reschedule{color:#7C5C8C; cursor:pointer; text-decoration:underline dotted;}

.ticket-actions{
  display:flex; gap:2px; margin-left:auto; flex-shrink:0;
  opacity:0; transition:opacity .12s ease;
}
.ticket:hover .ticket-actions, .ticket:focus-within .ticket-actions{opacity:1;}
.icon-btn{
  width:26px; height:26px; border-radius:6px; border:none; background:transparent;
  color:var(--slate-light); display:flex; align-items:center; justify-content:center; font-size:13px;
}
.icon-btn:hover{background:var(--paper-dim); color:var(--ink);}
.icon-btn.missed-active{background:var(--flag-soft); color:var(--flag);}

.tag-onetime{background:var(--flag-soft); color:var(--flag); font-weight:600;}
.next-date-tag{background:var(--paper-dim); color:var(--slate);}
.ticket.no-tick{padding-left:16px;}
.tag.stat-pill{background:var(--paper-dim); color:var(--ink-soft);}

.select-check{
  flex-shrink:0; width:20px; height:20px; border-radius:5px; border:1.5px solid var(--line);
  background:#fff; margin-top:3px; display:flex; align-items:center; justify-content:center;
  font-size:11px; color:#fff;
}
.select-check.checked{background:var(--brass); border-color:var(--brass);}

.batch-bar{
  display:flex; align-items:center; gap:10px; flex-wrap:wrap;
  padding:12px 16px; margin-bottom:14px; background:var(--paper-dim);
  border:1px solid var(--line); border-radius:10px;
}
.batch-bar-count{font-family:var(--font-mono); font-size:12px; font-weight:600; color:var(--ink);}
.batch-bar select, .batch-bar input[type=date]{
  border:1px solid var(--line); border-radius:6px; padding:6px 8px; font-size:12.5px; background:var(--paper-raised);
}
.batch-date-toggle{display:flex; align-items:center; gap:5px; font-size:12.5px; color:var(--slate);}

.ticket.missed{border-color:#E8C9A0; background:linear-gradient(90deg, #FBF0DE 0%, var(--paper-raised) 90px);}
body.dark-mode .ticket.missed{background:linear-gradient(90deg, rgba(232,201,160,0.12) 0%, var(--paper-raised) 90px);}

.empty-state{
  text-align:center;
  padding:42px 20px;
  color:var(--slate);
  font-size:13.5px;
}
.empty-state .glyph{font-size:26px; margin-bottom:8px; display:block;}

/* ============ STAT STRIP ============ */
.stat-strip{display:flex; gap:12px; margin-bottom:26px; flex-wrap:wrap;}
.stat-card{
  flex:1; min-width:130px;
  background:var(--paper-raised);
  border:1px solid var(--line);
  border-radius:var(--radius-m);
  padding:14px 16px;
}
.stat-num{font-family:var(--font-display); font-size:26px; font-weight:600; line-height:1;}
.stat-missed{font-family:var(--font-mono); font-size:12px; font-weight:600; color:#C9832E; vertical-align:middle;}
.stat-label{font-family:var(--font-mono); font-size:10.5px; color:var(--slate); margin-top:6px; text-transform:uppercase; letter-spacing:0.04em;}
.stat-card.flag .stat-num{color:var(--flag);}
.stat-card.teal .stat-num{color:var(--teal);}
.stat-card.brass .stat-num{color:var(--brass-deep);}

/* ============ FILTER BAR ============ */
.filter-bar{
  display:flex; align-items:center; gap:8px; flex-wrap:wrap; margin-bottom:16px;
}
.chip-select{
  display:flex; background:var(--paper-dim); border-radius:999px; padding:3px; gap:2px;
}
.chip-select button{
  border:none; background:transparent; padding:6px 13px; border-radius:999px;
  font-size:12px; font-weight:600; color:var(--slate);
}
.chip-select button.active{background:var(--ink); color:#fff;}

select.filter-select, input.filter-date{
  border:1px solid var(--line); background:var(--paper-raised);
  border-radius:8px; padding:7px 10px; font-size:12.5px; color:var(--ink);
}

/* ============ FORMS / MODAL ============ */
.modal-overlay{
  position:fixed; inset:0; background:rgba(24,28,34,0.45);
  display:flex; align-items:center; justify-content:center; z-index:100;
  padding:20px;
  backdrop-filter:blur(2px);
}
.modal{
  background:var(--paper-raised);
  border-radius:var(--radius-l);
  max-width:480px; width:100%;
  max-height:88vh; overflow-y:auto;
  box-shadow:var(--shadow-pop);
  padding:26px;
}
.modal.wide{max-width:640px;}
.modal h3{
  font-family:var(--font-display); font-size:20px; margin:0 0 4px;
}
.modal .modal-sub{font-size:12.5px; color:var(--slate); margin-bottom:18px;}

.field{margin-bottom:14px;}
.field label{
  display:block; font-size:11.5px; font-weight:600; color:var(--slate);
  text-transform:uppercase; letter-spacing:0.03em; margin-bottom:6px;
}
.field input, .field select, .field textarea{
  width:100%; padding:9px 11px; border:1px solid var(--line); border-radius:8px;
  font-size:13.5px; background:var(--paper); color:var(--ink);
}
.field textarea{resize:vertical; min-height:60px;}
.quick-date-row{display:flex; flex-wrap:wrap; gap:5px; margin-top:7px;}
.quick-date-btn{
  padding:4px 9px; border-radius:999px; border:1px solid var(--line);
  background:var(--paper); color:var(--slate); font-size:11px; font-weight:500;
}
.quick-date-btn:hover{border-color:var(--brass); color:var(--brass-deep);}
.field-row{display:flex; gap:10px;}
.field-row > .field{flex:1;}
.modal-actions{display:flex; justify-content:flex-end; gap:8px; margin-top:20px;}

.radio-pills{display:flex; gap:6px; flex-wrap:wrap;}
.radio-pill{
  padding:6px 12px; border-radius:999px; border:1px solid var(--line);
  font-size:12px; font-weight:600; color:var(--slate); background:var(--paper);
}
.radio-pill.active{background:var(--ink); color:#fff; border-color:var(--ink);}

/* ============ CALENDAR ============ */
.cal-header{display:flex; align-items:center; gap:12px; margin-bottom:16px;}
.cal-header h2{font-family:var(--font-display); font-size:20px; margin:0; min-width:190px;}
.cal-grid{
  display:grid; grid-template-columns:repeat(7,1fr); gap:6px;
}
.cal-dow{
  font-family:var(--font-mono); font-size:10px; text-transform:uppercase; color:var(--slate);
  text-align:center; padding-bottom:4px; letter-spacing:0.05em;
}
.cal-cell{
  aspect-ratio:1/0.82;
  border:1px solid var(--line); border-radius:8px; background:var(--paper-raised);
  padding:6px; position:relative; cursor:pointer;
  display:flex; flex-direction:column; justify-content:space-between;
}
.cal-cell:hover{border-color:var(--brass);}
.cal-cell.empty{background:transparent; border:none; cursor:default;}
.cal-cell.today{border-color:var(--brass); border-width:2px;}
.cal-cell .date-num{font-family:var(--font-mono); font-size:11px; color:var(--ink-soft);}
.cal-cell .hijri-num{font-family:var(--font-mono); font-size:8.5px; color:var(--slate-light);}
.dot-row{display:flex; gap:3px; flex-wrap:wrap;}
.dot{width:6px; height:6px; border-radius:50%; background:var(--brass);}
.dot.over{background:var(--flag);}
.density-count{font-family:var(--font-mono); font-size:9.5px; color:var(--slate); align-self:flex-end;}

/* ============ LISTS VIEW ============ */
.lists-grid{
  display:grid; grid-template-columns:repeat(auto-fill, minmax(240px,1fr)); gap:14px;
}
.list-card{padding:16px;}
.list-card h4{
  font-family:var(--font-display); font-size:15px; margin:0 0 10px; display:flex; align-items:center; justify-content:space-between;
}
.list-items{display:flex; flex-direction:column; gap:5px; margin-bottom:8px;}
.list-item{display:flex; align-items:center; gap:8px; font-size:13px;}
.list-item .li-check{
  width:16px; height:16px; border-radius:4px; border:1.5px solid var(--line); flex-shrink:0;
  display:flex; align-items:center; justify-content:center; font-size:10px; color:#fff;
}
.list-item .li-check.checked{background:var(--teal); border-color:var(--teal);}
.list-item.done span.li-text{text-decoration:line-through; color:var(--slate-light);}
.li-text{flex:1;}
.li-cat{font-family:var(--font-mono); font-size:9.5px; color:var(--slate-light);}
.add-item-row{display:flex; gap:6px; margin-top:8px;}
.add-item-row input{flex:1; border:1px dashed var(--line); border-radius:6px; padding:6px 8px; font-size:12px; background:transparent;}

/* ============ HEALTH LOG ============ */
.health-grid{display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:14px; margin-bottom:20px;}
.health-input-card{padding:16px;}
.health-input-card label{display:block; font-family:var(--font-mono); font-size:10.5px; text-transform:uppercase; color:var(--slate); margin-bottom:8px;}
.health-input-card .big-input{display:flex; align-items:baseline; gap:6px;}
.health-input-card input[type=number]{
  width:100%; border:none; background:transparent; font-family:var(--font-display); font-size:30px; font-weight:600; color:var(--ink); padding:0;
}
.health-input-card .unit{font-family:var(--font-mono); font-size:11px; color:var(--slate);}
.toggle-yn{display:flex; gap:6px;}
.toggle-yn button{flex:1; padding:10px; border-radius:8px; border:1px solid var(--line); background:var(--paper); font-weight:600; font-size:13px; color:var(--slate);}
.toggle-yn button.active{background:var(--teal); border-color:var(--teal); color:#fff;}

table.log-table{width:100%; border-collapse:collapse; font-size:12.5px;}
table.log-table th{
  text-align:left; font-family:var(--font-mono); font-size:10px; text-transform:uppercase; color:var(--slate);
  padding:8px 10px; border-bottom:1px solid var(--line);
}
table.log-table td{padding:9px 10px; border-bottom:1px solid var(--paper-dim);}

/* ============ SETTINGS ============ */
.tag-editor{display:flex; flex-wrap:wrap; gap:6px; margin-bottom:10px;}
.tag-editable{
  display:flex; align-items:center; gap:6px; background:var(--paper-dim); border-radius:20px; padding:5px 10px 5px 12px; font-size:12.5px;
}
.tag-editable button{border:none; background:transparent; color:var(--slate-light); font-size:13px; line-height:1;}

/* ============ GROUPED SECTIONS (location grouping) ============ */
.group-block{margin-bottom:18px;}
.group-header{
  display:flex; align-items:center; gap:8px; cursor:pointer;
  padding:8px 4px; user-select:none;
}
.group-header .caret{
  font-size:10px; color:var(--slate); transition:transform .15s ease;
  display:inline-block;
}
.group-header.collapsed .caret{transform:rotate(-90deg);}
.group-header h3{
  font-family:var(--font-display); font-size:15px; margin:0; font-weight:600;
}
.group-header .group-count{
  font-family:var(--font-mono); font-size:10.5px; color:var(--slate);
  background:var(--paper-dim); padding:2px 8px; border-radius:20px; margin-left:2px;
}
.group-body{display:flex; flex-direction:column; gap:8px;}
.group-body.collapsed{display:none;}

.toggle-switch-row{display:flex; align-items:center; gap:8px; font-size:12.5px; color:var(--slate);}
.toggle-switch{
  position:relative; width:38px; height:21px; border-radius:20px; background:var(--paper-dim);
  border:1px solid var(--line); cursor:pointer; flex-shrink:0;
}
.toggle-switch .knob{
  position:absolute; top:1px; left:1px; width:17px; height:17px; border-radius:50%;
  background:#fff; box-shadow:0 1px 2px rgba(0,0,0,0.25); transition:left .15s ease;
}
.toggle-switch.on{background:var(--teal);}
.toggle-switch.on .knob{left:18px;}

/* ============ TYPE CHOOSER ============ */
.type-choice-grid{display:flex; gap:12px; margin-top:6px;}
.type-choice{
  flex:1; border:1.5px solid var(--line); border-radius:12px; padding:18px 14px;
  text-align:left; background:var(--paper);
  transition:border-color .12s ease, transform .1s ease;
}
.type-choice:hover{border-color:var(--brass); transform:translateY(-1px);}
.type-choice .tc-icon{font-size:20px; margin-bottom:8px; display:block;}
.type-choice .tc-title{font-weight:700; font-size:14px; margin-bottom:3px;}
.type-choice .tc-sub{font-size:11.5px; color:var(--slate); line-height:1.4;}

/* ============ SYNC PANEL ============ */
.sync-status{
  display:inline-flex; align-items:center; gap:6px; font-family:var(--font-mono); font-size:11px;
  padding:4px 10px; border-radius:20px; background:var(--paper-dim); color:var(--slate);
}
.sync-status.on{background:var(--teal-soft); color:var(--teal);}
.sync-dot{width:7px; height:7px; border-radius:50%; background:var(--slate-light);}
.sync-status.on .sync-dot{background:var(--teal);}
.sql-block{
  background:var(--ink); color:#D8E4E0; font-family:var(--font-mono); font-size:11.5px;
  padding:14px; border-radius:8px; white-space:pre-wrap; line-height:1.6; overflow-x:auto;
}
.sync-warning{
  background:var(--flag-soft); color:var(--flag); border-radius:8px; padding:10px 12px;
  font-size:12px; line-height:1.5; margin-top:10px;
}

/* ============ REORDER LIST (drag and drop) ============ */
.reorder-list{display:flex; flex-direction:column; gap:6px; max-width:340px;}
.reorder-item{
  display:flex; align-items:center; gap:10px;
  background:var(--paper); border:1px solid var(--line); border-radius:8px;
  padding:9px 12px; font-size:13px; cursor:grab;
  transition:opacity .12s ease, box-shadow .12s ease;
}
.reorder-item:active{cursor:grabbing;}
.reorder-item.dragging{opacity:.4; box-shadow:var(--shadow-pop);}
.drag-handle{color:var(--slate-light); font-size:14px; user-select:none;}

/* ============ COLOR SWATCHES ============ */
.swatch-row{display:flex; gap:8px; flex-wrap:wrap; align-items:center; margin-bottom:10px;}
.swatch{
  width:30px; height:30px; border-radius:50%; border:2px solid transparent;
  cursor:pointer; position:relative; flex-shrink:0;
}
.swatch.selected{border-color:var(--ink);}
.swatch.selected::after{
  content:"✓"; position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
  color:#fff; font-size:13px; text-shadow:0 1px 2px rgba(0,0,0,0.4);
}
.color-row{display:flex; align-items:center; gap:10px; margin-bottom:8px;}
.color-row label{
  font-size:12.5px; font-weight:500; color:var(--ink-soft); min-width:120px;
}
.color-row input[type=color]{
  width:36px; height:30px; border:1px solid var(--line); border-radius:6px; padding:2px; background:var(--paper-raised);
}

/* ============ DARK MODE TOGGLE (sidebar) ============ */
.brand-row{display:flex; align-items:center; justify-content:space-between;}
.dark-toggle-btn{
  width:28px; height:28px; border-radius:50%; border:1px solid rgba(255,255,255,0.15);
  background:rgba(255,255,255,0.06); color:#EDE9DD; font-size:13px; flex-shrink:0;
}
.dark-toggle-btn:hover{background:rgba(255,255,255,0.12);}

/* ============ HIDE-PAGES TOGGLES ============ */
.page-toggle-row{
  display:flex; align-items:center; justify-content:space-between;
  padding:9px 0; border-bottom:1px solid var(--paper-dim);
}
.page-toggle-row:last-child{border-bottom:none;}
.page-toggle-row .ptr-label{font-size:13px; font-weight:500;}
.page-toggle-row .ptr-locked{font-family:var(--font-mono); font-size:10px; color:var(--slate-light);}

/* ============ WEEKEND DAY SELECTOR (calendar) ============ */
.weekend-day-pill{
  padding:6px 12px; border-radius:999px; border:1px solid var(--line);
  font-size:12px; font-weight:600; color:var(--slate); background:var(--paper);
}
.weekend-day-pill.active{background:var(--flag); border-color:var(--flag); color:#fff;}
.cal-cell.weekend{background:color-mix(in srgb, var(--brass) 8%, var(--paper-raised));}

/* ============ DARK MODE THEME OVERRIDES ============ */
body.dark-mode{
  --ink:#EDE9DD;
  --ink-soft:#C7CCD6;
  --paper:#181C22;
  --paper-raised:#20252C;
  --paper-dim:#2A3038;
  --line:#3A4048;
  --slate:#9CA3AF;
  --slate-light:#6B7280;
}
body.dark-mode .sidebar{background:#0F1216;}
body.dark-mode .ticket-title{color:var(--ink);}
body.dark-mode input, body.dark-mode select, body.dark-mode textarea{
  background:var(--paper); color:var(--ink); border-color:var(--line);
}
body.dark-mode .sql-block{background:#0F1216;}
body.dark-mode .loading-screen{background:#0F1216;}


.newday-summary{background:var(--paper-dim); border-radius:10px; padding:14px; margin:14px 0; font-size:13px;}
.newday-summary .row{display:flex; justify-content:space-between; padding:4px 0;}

/* ============ MISC ============ */
.hidden{display:none !important;}
.loading-screen{
  position:fixed; inset:0; background:var(--ink); color:#EDE9DD;
  display:flex; align-items:center; justify-content:center; flex-direction:column; gap:10px; z-index:999;
  font-family:var(--font-mono); font-size:12px; letter-spacing:0.06em;
}
.loading-screen .brand-mark{width:14px;height:14px;background:var(--brass); transform:rotate(45deg); animation:spin 1.1s linear infinite;}
@keyframes spin{to{transform:rotate(405deg);}}

.toast{
  position:fixed; bottom:22px; left:50%; transform:translateX(-50%);
  background:var(--ink); color:#fff; padding:11px 18px; border-radius:8px; font-size:13px;
  box-shadow:var(--shadow-pop); z-index:200; font-weight:500;
  display:flex; align-items:center; gap:8px;
}

/* ============ PASSCODE GATE ============ */
.gate-screen{
  position:fixed; inset:0; background:var(--ink); color:#EDE9DD;
  display:flex; align-items:center; justify-content:center; z-index:1000;
  padding:20px;
}
.gate-card{
  background:var(--paper-raised); color:var(--ink); border-radius:var(--radius-l);
  max-width:380px; width:100%; padding:32px; box-shadow:var(--shadow-pop);
}
.gate-card.wide{max-width:440px;}
.gate-brand{display:flex; align-items:center; gap:8px; font-family:var(--font-display); font-size:20px; font-weight:600; margin-bottom:4px;}
.gate-brand .brand-mark{width:10px;height:10px;border-radius:2px; background:var(--brass); transform:rotate(45deg); flex-shrink:0;}
.gate-sub{font-size:12.5px; color:var(--slate); margin-bottom:22px; line-height:1.5;}
.gate-card .field{margin-bottom:14px;}
.gate-card .field label{
  display:block; font-size:11.5px; font-weight:600; color:var(--slate);
  text-transform:uppercase; letter-spacing:0.03em; margin-bottom:6px;
}
.gate-card input{
  width:100%; padding:11px 12px; border:1px solid var(--line); border-radius:8px;
  font-size:15px; background:var(--paper); color:var(--ink); font-family:var(--font-mono);
  letter-spacing:0.05em;
}
.gate-error{
  background:var(--flag-soft); color:var(--flag); border-radius:8px; padding:9px 12px;
  font-size:12.5px; margin-bottom:14px; display:none;
}
.gate-error.show{display:block;}
.gate-link{
  display:inline-block; margin-top:16px; font-size:12px; color:var(--slate);
  text-decoration:underline; cursor:pointer; background:none; border:none; font-family:inherit;
}
.gate-link:hover{color:var(--ink);}
.gate-divider{
  display:flex; align-items:center; gap:10px; margin:18px 0; color:var(--slate-light); font-size:11px;
  text-transform:uppercase; letter-spacing:0.05em;
}
.gate-divider::before, .gate-divider::after{content:""; flex:1; height:1px; background:var(--line);}

@media (max-width: 860px){
  #app{flex-direction:column;}
  .sidebar{width:100%; height:auto; position:relative; flex-direction:row; align-items:center; overflow-x:auto; padding:12px;}
  .brand-sub, .sidebar-footer, .brand{display:none;}
  .nav{flex-direction:row;}
  .main{padding:18px;}
  .stat-strip{gap:8px;}
}
</style>
</head>
<body>

<div id="gateScreen"></div>

<div class="loading-screen hidden" id="loadingScreen">
  <div class="brand-mark"></div>
  <div>LOADING CALENDAROS…</div>

<script>
/* =========================================================
   CalendarOS — Daily Ops
   A task/schedule web app converted from Personal_ToDo_List_V2_0.xlsx
   ========================================================= */

/* ---------- Storage fallback ----------
   window.storage is an API Claude.ai injects only when this file is rendered
   as an artifact inside claude.ai — it does not exist if this HTML file is
   opened directly in a browser (downloaded, double-clicked, self-hosted,
   etc). Rather than hard-depending on it, fall back to the browser's own
   localStorage with the same get/set/delete/list shape, so the app works
   fully standalone too. Supabase sync (if configured) is unaffected either
   way since it talks to Supabase directly over fetch(). */
const usingNativeAppStorage = (typeof window.storage !== 'undefined' && window.storage !== null);
if(!usingNativeAppStorage){
  console.warn('window.storage not found — running standalone using this browser\'s local storage instead.');
  window.storage = {
    async get(key, shared){
      const raw = localStorage.getItem('cos_'+key);
      if(raw === null) return null;
      return { key, value: raw, shared: !!shared };
    },
    async set(key, value, shared){
      localStorage.setItem('cos_'+key, value);
      return { key, value, shared: !!shared };
    },
    async delete(key, shared){
      localStorage.removeItem('cos_'+key);
      return { key, deleted:true, shared: !!shared };
    },
    async list(prefix, shared){
      const keys = Object.keys(localStorage)
        .filter(k=>k.startsWith('cos_'))
        .map(k=>k.slice(4))
        .filter(k=> !prefix || k.startsWith(prefix));
      return { keys, prefix, shared: !!shared };
    }
  };
}

/* ---------- App Version (bump on every shipped change) ---------- */
const APP_VERSION = '1.7.0';
const APP_NAME = 'CalendarOS';

/* ---------- Constants ---------- */
const DOW_ABBR = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const DOW_FULL = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const MONTH_NAMES = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const RECUR_TYPES = ['Daily','Days of Week','Weekly','Bi-Weekly','Monthly','Yearly','Every X Days'];
const PRIORITIES = ['High','Medium','Low'];
const MAX_UNDO = 5;
const ACCENT_PRESETS = ['#B9862F','#2F6E68','#3E6491','#7C5C8C','#4C7A3D','#3A3F47'];
const COMPLETED_PRESETS = ['#3C7A73','#4C8C5C','#6B8C4C','#5C7999','#7A7A7A'];
const HIDEABLE_PAGES = [
  ['overdue','Overdue'],
  ['tasks','All Tasks'],
  ['calendar','Calendar'],
  ['lists','Lists'],
  ['health','Health Log'],
];
const DEFAULT_SETTINGS_EXTRAS = {
  weekendDays: ['Fri','Sat'],
  completedColor: '#3C7A73',
  accentColor: '#B9862F',
  recurTypeColors: {
    'Daily': '#B9862F',
    'Days of Week': '#3C7A73',
    'Weekly': '#5C7999',
    'Bi-Weekly': '#8E661F',
    'Monthly': '#A0527A',
    'Yearly': '#4C7A3D',
    'Every X Days': '#7C5CBF',
  },
  siloColors: {
    'Financial': '#4C7A3D',
    'Work': '#5C7999',
    'Personal Tasks': '#B9862F',
    'Self Development': '#7C5CBF',
    'Career Development': '#A0527A',
    'Home Maintenance': '#8E661F',
    'Lamees': '#C1443D',
  },
  hiddenPages: [],
  pageOrder: ['dashboard','overdue','tasks','calendar','lists','health','settings'],
  rememberUnlock: true,
  darkMode: false,
  localPasscode: null, // used only when no Supabase sync is configured on this device
};
// Fills in any settings fields missing from a saved blob (e.g. one written by
// an earlier version of the app), including partially-missing nested objects
// like recurTypeColors. Safe to call any time — never overwrites real values.
function backfillSettingsDefaults(){
  Object.keys(DEFAULT_SETTINGS_EXTRAS).forEach(k=>{
    if(state.settings[k] === undefined || state.settings[k] === null){
      state.settings[k] = DEFAULT_SETTINGS_EXTRAS[k];
    }
  });
  // recurTypeColors can exist but be missing individual newer types
  RECUR_TYPES.forEach(type=>{
    if(!state.settings.recurTypeColors[type]){
      state.settings.recurTypeColors[type] = DEFAULT_SETTINGS_EXTRAS.recurTypeColors[type] || '#3C7A73';
    }
  });
  if(!state.settings.siloColors) state.settings.siloColors = {};
  // any locations/pages added since pageOrder was created should still show up
  const ALL_PAGE_KEYS = ['dashboard','overdue','tasks','calendar','lists','health','settings'];
  if(!state.settings.pageOrder) state.settings.pageOrder = ALL_PAGE_KEYS.slice();
  ALL_PAGE_KEYS.forEach(k=>{ if(!state.settings.pageOrder.includes(k)) state.settings.pageOrder.push(k); });
}

// NOTE: storage key prefix stays "dispatch:" (the app's original internal name)
// so existing users don't lose data on this rename. Only the displayed brand changed.
const STORAGE_KEYS = {
  TASKS: 'dispatch:tasks',        // { oneTime:[], recurring:[], completions:{} }
  LISTS: 'dispatch:lists',        // [ {id,title,items:[]} ]
  HEALTH: 'dispatch:health',      // [ {date,water,no2,calDeficit} ]
  SETTINGS: 'dispatch:settings',  // { locations, silos, lastActiveDate, sync }
  SYNC_META: 'dispatch:syncmeta', // { dirty, lastSyncedAt, lastError }
  UNLOCK: 'dispatch:unlock',      // { pin: '<last successfully entered pin>' } — only set if "remember" is on
};

/* ---------- App State ---------- */
const state = {
  view: 'dashboard',
  tasks: { oneTime: [], recurring: [], completions: {} }, // completions: { taskId: [dateStr,...] }
  lists: [],
  health: [],
  settings: { locations: [], silos: [], lastActiveDate: null, sync: null },
  selectedDate: todayStr(),
  dashboardFilter: 'Today', // Today | Next7 | Next30 | Custom
  locationFilter: 'All',
  searchQuery: '',
  groupByLocation: true, // always defaults on each load, per user preference — not persisted
  calMonthCursor: null, // {year, month}
  calDensityMode: 'all', // 'all' | 'oneTime'
  loaded: false,
  undoStack: [], // [{kind, taskId, dateStr, prevValue}]
  // status: 'off' | 'syncing' | 'synced' | 'pending' | 'error'
  syncMeta: { status: 'off', dirty: false, lastSyncedAt: null, lastError: null, progress: null },
};

/* ---------- Date helpers ---------- */
function todayStr(){
  const d = new Date();
  return fmtDate(d);
}
function fmtDate(d){
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const day = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}
function parseDate(s){
  if(!s) return null;
  const [y,m,d] = s.split('-').map(Number);
  return new Date(y, m-1, d);
}
function addDays(dateStr, n){
  const d = parseDate(dateStr);
  d.setDate(d.getDate()+n);
  return fmtDate(d);
}
function daysBetween(aStr, bStr){
  const a = parseDate(aStr), b = parseDate(bStr);
  return Math.round((b - a) / 86400000);
}
function isPast(dateStr, refStr){
  return daysBetween(dateStr, refStr) > 0;
}
function humanDate(dateStr){
  if(!dateStr) return '—';
  const d = parseDate(dateStr);
  const t = parseDate(todayStr());
  const diff = daysBetween(todayStr(), dateStr);
  if(diff === 0) return 'Today';
  if(diff === 1) return 'Tomorrow';
  if(diff === -1) return 'Yesterday';
  return `${DOW_ABBR[d.getDay()]}, ${MONTH_NAMES[d.getMonth()].slice(0,3)} ${d.getDate()}`;
}
function fullDate(dateStr){
  const d = parseDate(dateStr);
  return `${DOW_FULL[d.getDay()]}, ${MONTH_NAMES[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}`;
}

/* ---------- Recurrence Engine ---------- */
// Determine whether a recurring task is "due" (should show) on a given date.
function isDueOn(task, dateStr){
  if(task.start && dateStr < task.start) return false;
  if(task.end && dateStr > task.end) return false;
  const d = parseDate(dateStr);
  const dow = d.getDay();

  switch(task.type){
    case 'Daily':
      return true;
    case 'Days of Week': {
      if(!task.detail) return false;
      const days = task.detail.split(',').map(s=>s.trim());
      return days.includes(DOW_ABBR[dow]);
    }
    case 'Weekly': {
      if(!task.detail) return false;
      return task.detail.trim().toLowerCase() === DOW_FULL[dow].toLowerCase();
    }
    case 'Bi-Weekly': {
      if(!task.detail) return false;
      if(task.detail.trim().toLowerCase() !== DOW_FULL[dow].toLowerCase()) return false;
      const startD = parseDate(task.start);
      // align to the first matching weekday on/after start
      let firstOcc = new Date(startD);
      while(firstOcc.getDay() !== dow) firstOcc.setDate(firstOcc.getDate()+1);
      const weeksDiff = Math.floor((d - firstOcc) / (7*86400000));
      return weeksDiff >= 0 && weeksDiff % 2 === 0;
    }
    case 'Monthly': {
      const dom = parseInt(task.detail, 10);
      if(isNaN(dom)) return false;
      // clamp to last day of month for short months
      const lastDay = new Date(d.getFullYear(), d.getMonth()+1, 0).getDate();
      return d.getDate() === Math.min(dom, lastDay);
    }
    case 'Yearly': {
      if(!task.detail || !task.detail.includes('-')) return false;
      const [mm, dd] = task.detail.split('-').map(Number);
      return (d.getMonth()+1) === mm && d.getDate() === dd;
    }
    case 'Every X Days': {
      const n = parseInt(task.detail, 10);
      if(isNaN(n) || n <= 0) return false;
      const diff = daysBetween(task.start, dateStr);
      return diff >= 0 && diff % n === 0;
    }
    default:
      return false;
  }
}

/* ---------- Occurrence completion tracking ----------
   state.tasks.completions[taskId] = { 'YYYY-MM-DD': { status:'done'|'missed', loggedAt: isoString } }
   Replaces the old flat array-of-dates format; migrateCompletionsFormat() upgrades
   any old data on load. */
function getOccurrence(taskId, dateStr){
  const log = state.tasks.completions[taskId];
  return log ? log[dateStr] : undefined;
}
function isCompletedOn(taskId, dateStr){
  const o = getOccurrence(taskId, dateStr);
  return !!(o && o.status === 'done');
}
function isMissedOn(taskId, dateStr){
  const o = getOccurrence(taskId, dateStr);
  return !!(o && o.status === 'missed');
}
// Pending deletes to push to Supabase — entries removed locally that Supabase
// still needs to be told about (fixes: unchecking didn't sync — see changelog).
const pendingCompletionDeletes = [];
function setOccurrenceStatus(taskId, dateStr, status){
  // status: 'done' | 'missed' | null (null clears the occurrence entirely)
  const c = state.tasks.completions;
  if(!c[taskId]) c[taskId] = {};
  const existed = !!c[taskId][dateStr];
  if(status === null){
    delete c[taskId][dateStr];
    if(existed) pendingCompletionDeletes.push({ taskId, date: dateStr });
  } else {
    c[taskId][dateStr] = { status, loggedAt: new Date().toISOString() };
  }
  saveTasks();
}
// Toggle helpers: clicking an already-active state clears it; each is
// mutually exclusive with the other (marking done clears a missed flag, etc).
function toggleDone(taskId, dateStr){
  setOccurrenceStatus(taskId, dateStr, isCompletedOn(taskId, dateStr) ? null : 'done');
}
function toggleMissed(taskId, dateStr){
  setOccurrenceStatus(taskId, dateStr, isMissedOn(taskId, dateStr) ? null : 'missed');
}
function migrateCompletionsFormat(){
  const c = state.tasks.completions;
  Object.keys(c).forEach(taskId=>{
    if(Array.isArray(c[taskId])){
      const obj = {};
      c[taskId].forEach(dateStr=>{ obj[dateStr] = { status:'done', loggedAt: null }; });
      c[taskId] = obj;
    }
  });
}

// Compute current streak (consecutive due-occurrences completed) ending at refDate (exclusive of today unless done)
function computeStreak(task, refDateStr){
  let streak = 0;
  let cursor = refDateStr;
  let guard = 0;
  while(guard < 730){
    guard++;
    if(cursor < task.start) break;
    if(isDueOn(task, cursor)){
      if(isCompletedOn(task.id, cursor)){
        streak++;
      } else {
        break;
      }
    }
    cursor = addDays(cursor, -1);
  }
  return streak;
}

// Next date (today or later) this recurring task is due, searching up to
// ~2 years out. Returns null for tasks that have effectively ended (e.g. a
// past end date) with no future occurrences.
function nextOccurrenceDate(task){
  let cursor = todayStr();
  let guard = 0;
  while(guard < 730){
    if(task.end && cursor > task.end) return null;
    if(isDueOn(task, cursor)) return cursor;
    cursor = addDays(cursor, 1);
    guard++;
  }
  return null;
}

// On-time % and average delay in days, based only on occurrences the person
// actually logged (checked done or flagged missed) — untouched days aren't
// counted since we have no signal either way.
function computeOnTimeStats(task){
  const log = state.tasks.completions[task.id];
  if(!log) return null;
  const entries = Object.entries(log);
  if(!entries.length) return null;
  let doneCount = 0, missedCount = 0, delaySum = 0;
  entries.forEach(([dateStr, o])=>{
    if(o.status === 'missed'){ missedCount++; return; }
    if(o.status === 'done'){
      doneCount++;
      if(o.loggedAt){
        const loggedDateStr = fmtDate(new Date(o.loggedAt));
        delaySum += Math.max(0, daysBetween(dateStr, loggedDateStr));
      }
    }
  });
  const total = doneCount + missedCount;
  if(total === 0) return null;
  return {
    onTimePercent: Math.round((doneCount/total)*100),
    avgDelayDays: doneCount ? +(delaySum/doneCount).toFixed(1) : 0,
    total,
  };
}

// Aggregate on-time % across ALL recurring tasks, but only for occurrences
// logged (done or missed) within the current calendar week (Sun–Sat, up to
// today). Returns null if nothing's been logged yet this week.
function computeWeeklyOnTimeRate(){
  const today = parseDate(todayStr());
  const weekStart = addDays(todayStr(), -today.getDay()); // most recent Sunday
  let doneCount = 0, missedCount = 0;
  Object.values(state.tasks.completions).forEach(byDate=>{
    Object.entries(byDate).forEach(([dateStr, o])=>{
      if(dateStr < weekStart || dateStr > todayStr()) return;
      if(o.status === 'done') doneCount++;
      else if(o.status === 'missed') missedCount++;
    });
  });
  const total = doneCount + missedCount;
  if(total === 0) return null;
  return Math.round((doneCount/total)*100);
}

/* ---------- Overdue helpers ---------- */
function oneTimeIsOverdue(t){
  return !t.done && t.due && t.due < todayStr();
}

/* ---------- Storage (window.storage persistence) ---------- */
// Loads ONLY settings — used to check whether a passcode gate is needed
// before anything else (tasks, lists, health, or any Supabase sync) touches
// memory or the network. Deliberately minimal and fast.
async function loadSettingsOnly(){
  try{
    const settingsRes = await safeGet(STORAGE_KEYS.SETTINGS);
    if(settingsRes){
      state.settings = JSON.parse(settingsRes.value);
      if(!state.settings.sync) state.settings.sync = null;
      backfillSettingsDefaults();
    } else {
      state.settings = Object.assign({
        locations: ['1.Office','2.Errand','3.Home','4.Madinah','5.Last'],
        silos: ['Financial','Work','Personal Tasks','Self Development','Career Development','Home Maintenance','Lamees'],
        lastActiveDate: todayStr(),
        sync: null,
      }, DEFAULT_SETTINGS_EXTRAS);
    }
  } catch(e){
    console.error('Settings load error', e);
  }
}

async function loadAll(){
  try{
    const [tasksRes, listsRes, healthRes] = await Promise.all([
      safeGet(STORAGE_KEYS.TASKS),
      safeGet(STORAGE_KEYS.LISTS),
      safeGet(STORAGE_KEYS.HEALTH),
    ]);

    if(tasksRes){
      state.tasks = JSON.parse(tasksRes.value);
      migrateCompletionsFormat();
      state.tasks.oneTime.forEach(t=>{ if(!t.dueHistory) t.dueHistory = []; });
    } else {
      // seed from the original spreadsheet
      const seed = JSON.parse(document.getElementById('seed-data').textContent);
      seed.oneTime.forEach(t=>{ t.dueHistory = []; });
      state.tasks = { oneTime: seed.oneTime, recurring: seed.recurring, completions: {} };
      await window.storage.set(STORAGE_KEYS.TASKS, JSON.stringify(state.tasks), false);
    }

    if(listsRes){
      state.lists = JSON.parse(listsRes.value);
    } else {
      state.lists = JSON.parse(document.getElementById('seed-lists').textContent);
      await window.storage.set(STORAGE_KEYS.LISTS, JSON.stringify(state.lists), false);
    }

    if(healthRes){
      state.health = JSON.parse(healthRes.value);
    } else {
      state.health = [];
    }

    // settings were already loaded by loadSettingsOnly() before the gate;
    // if for some reason this runs standalone, make sure they're present.
    if(!state.settings || !state.settings.locations) await loadSettingsOnly();
    if(!state.settings.sync) state.settings.sync = null;

    const syncMetaRes = await safeGet(STORAGE_KEYS.SYNC_META);
    if(syncMetaRes){
      const saved = JSON.parse(syncMetaRes.value);
      state.syncMeta = Object.assign(state.syncMeta, saved, { status: 'off' });
    }
  } catch(e){
    console.error('Load error', e);
  }

  // If cross-device sync is configured, get to the freshest possible state
  // before the app becomes usable.
  //   - If the last session ended with unconfirmed local changes (dirty),
  //     push local first so it can never be silently overwritten by a stale
  //     remote copy — local always wins over an incomplete sync.
  //   - Otherwise, pull from Supabase since remote is trusted authoritative
  //     (e.g. changes made from another device).
  if(syncConfigured()){
    state.syncMeta.status = 'syncing';
    const verb = state.syncMeta.dirty ? 'SENDING UNSAVED CHANGES' : 'PULLING LATEST FROM SUPABASE';
    setLoadingText(verb + '…');
    const onProgress = (cur, total)=> setLoadingText(`${verb}… ${Math.round((cur/total)*100)}%`);
    try{
      if(state.syncMeta.dirty){
        await pushFullStateToSupabase(onProgress);
        await markSyncSuccess();
      } else {
        await pullFromSupabase(onProgress);
        await markSyncSuccess();
      }
    } catch(e){
      console.error('Supabase sync on load failed', e);
      await markSyncError(e.message || String(e));
      setLoadingText('SYNC UNAVAILABLE — CONTINUING OFFLINE…');
      await new Promise(r=>setTimeout(r, 900));
    }
  }

  state.loaded = true;
}

function markSyncDirty(){
  // In-memory only — no storage write here. This is a transient "in flight"
  // state; the outcome (success or error) writes to storage a moment later
  // regardless, so persisting this intermediate step would only add an extra
  // storage call per save for no durability benefit.
  state.syncMeta.dirty = true;
  state.syncMeta.status = 'syncing';
}
async function markSyncSuccess(){
  state.syncMeta.dirty = false;
  state.syncMeta.status = 'synced';
  state.syncMeta.lastSyncedAt = new Date().toISOString();
  state.syncMeta.lastError = null;
  await safeStorageSet(STORAGE_KEYS.SYNC_META, JSON.stringify(state.syncMeta));
}
async function markSyncError(message){
  state.syncMeta.status = 'error';
  state.syncMeta.lastError = message;
  // dirty stays true — we know local hasn't been confirmed on the server
  await safeStorageSet(STORAGE_KEYS.SYNC_META, JSON.stringify(state.syncMeta));
}

/* ---------- Supabase sync (optional, cross-device) ----------
   Normalized tables (see Settings > Sync for the exact SQL):
     one_time_tasks, recurring_tasks, task_completions, lists, list_items,
     health_logs, app_settings — each scoped by a "pin" column.
   Each entity table also carries a `meta jsonb` column for fields added
   later without needing a migration first.
   Security note: RLS on these tables is permissive (open to anyone holding
   the anon key). The PIN is an app-level convenience, not a cryptographic
   guarantee. */
function syncConfigured(){
  const s = state.settings.sync;
  return !!(s && s.url && s.anonKey && s.pin);
}
function supaHeaders(extra){
  const s = state.settings.sync;
  return Object.assign({ apikey: s.anonKey, Authorization: `Bearer ${s.anonKey}`, 'Content-Type':'application/json' }, extra||{});
}
// Guards every Supabase call so a dead network or unreachable project can
// never hang the app on the loading screen forever.
async function fetchWithTimeout(url, options, timeoutMs){
  timeoutMs = timeoutMs || 10000;
  const controller = new AbortController();
  const timer = setTimeout(()=>controller.abort(), timeoutMs);
  try{
    return await fetch(url, Object.assign({}, options, { signal: controller.signal }));
  } catch(e){
    if(e.name === 'AbortError') throw new Error('Supabase request timed out — check your connection');
    throw e;
  } finally {
    clearTimeout(timer);
  }
}
async function supaUpsert(table, rows, conflictCols){
  if(!rows.length) return;
  const s = state.settings.sync;
  const url = `${s.url.replace(/\/$/,'')}/rest/v1/${table}?on_conflict=${conflictCols}`;
  const res = await fetchWithTimeout(url, {
    method: 'POST',
    headers: supaHeaders({ Prefer: 'resolution=merge-duplicates,return=minimal' }),
    body: JSON.stringify(rows)
  });
  if(!res.ok) throw new Error(`${table} upsert failed: ${res.status} ${await res.text()}`);
}
async function supaDeleteMatch(table, matchQuery){
  const s = state.settings.sync;
  const url = `${s.url.replace(/\/$/,'')}/rest/v1/${table}?${matchQuery}`;
  const res = await fetchWithTimeout(url, { method:'DELETE', headers: supaHeaders() });
  if(!res.ok) throw new Error(`${table} delete failed: ${res.status}`);
}
async function supaSelectAll(table){
  const s = state.settings.sync;
  const url = `${s.url.replace(/\/$/,'')}/rest/v1/${table}?pin=eq.${encodeURIComponent(s.pin)}&select=*`;
  const res = await fetchWithTimeout(url, { headers: supaHeaders() });
  if(!res.ok) throw new Error(`${table} select failed: ${res.status}`);
  return await res.json();
}

/* ---- row <-> app-object mapping ---- */
function oneTimeToRow(t){
  const s = state.settings.sync;
  return { id:t.id, pin:s.pin, name:t.name, location:t.location, silo:t.silo, priority:t.priority,
           due:t.due||null, done:!!t.done, done_date:t.doneDate||null, notes:t.notes||'',
           due_history: t.dueHistory||[], meta:{}, updated_at:new Date().toISOString() };
}
function rowToOneTime(r){
  return { id:r.id, name:r.name, location:r.location, silo:r.silo, priority:r.priority||'Medium',
           due:r.due, done:!!r.done, doneDate:r.done_date, notes:r.notes||'', dueHistory:r.due_history||[] };
}
function recurringToRow(t){
  const s = state.settings.sync;
  return { id:t.id, pin:s.pin, name:t.name, location:t.location, silo:t.silo, priority:t.priority,
           type:t.type, detail:t.detail||'', start_date:t.start||null, end_date:t.end||null, notes:t.notes||'', meta:{}, updated_at:new Date().toISOString() };
}
function rowToRecurring(r){
  return { id:r.id, name:r.name, location:r.location, silo:r.silo, priority:r.priority||'Medium',
           type:r.type, detail:r.detail, start:r.start_date, end:r.end_date, notes:r.notes||'' };
}
function listToRow(l, idx){
  const s = state.settings.sync;
  return { id:l.id, pin:s.pin, title:l.title, sort_order:idx, updated_at:new Date().toISOString() };
}
function listItemToRow(item, listId, idx){
  const s = state.settings.sync;
  return { id:item.id, pin:s.pin, list_id:listId, text:item.text, category:item.category||null, done:!!item.done, sort_order:idx };
}
function healthToRow(h){
  const s = state.settings.sync;
  return { pin:s.pin, log_date:h.date, water:h.water, no2:h.no2===null||h.no2===undefined?null:h.no2, cal_deficit:h.calDeficit };
}
function buildCompletionRows(){
  const s = state.settings.sync;
  const rows = [];
  Object.entries(state.tasks.completions).forEach(([taskId, byDate])=>{
    Object.entries(byDate).forEach(([dateStr, o])=>{
      rows.push({ pin: s.pin, task_id: taskId, completed_date: dateStr, status: o.status, logged_at: o.loggedAt });
    });
  });
  return rows;
}
// Actually tells Supabase about locally-removed occurrences (the root cause
// of "unchecking doesn't sync" — see changelog). Safe to call even if the
// list is empty; only removes entries once the delete call succeeds.
async function flushPendingCompletionDeletes(){
  while(pendingCompletionDeletes.length){
    const { taskId, date } = pendingCompletionDeletes[0];
    await supaDeleteMatch('task_completions', `task_id=eq.${encodeURIComponent(taskId)}&completed_date=eq.${encodeURIComponent(date)}`);
    pendingCompletionDeletes.shift();
  }
}

/* ---- full push / pull ---- */
async function pushFullStateToSupabase(onProgress){
  const steps = [
    ()=> supaUpsert('one_time_tasks', state.tasks.oneTime.map(oneTimeToRow), 'id'),
    ()=> supaUpsert('recurring_tasks', state.tasks.recurring.map(recurringToRow), 'id'),
    ()=> flushPendingCompletionDeletes(),
    ()=> { const rows = buildCompletionRows(); return rows.length ? supaUpsert('task_completions', rows, 'pin,task_id,completed_date') : null; },
    ()=> supaUpsert('lists', state.lists.map((l,i)=>listToRow(l,i)), 'id'),
    ()=> {
      const itemRows = [];
      state.lists.forEach(l=> l.items.forEach((it,i)=> itemRows.push(listItemToRow(it, l.id, i))));
      return itemRows.length ? supaUpsert('list_items', itemRows, 'id') : null;
    },
    ()=> { const rows = state.health.map(healthToRow); return rows.length ? supaUpsert('health_logs', rows, 'pin,log_date') : null; },
    ()=> supaUpsert('app_settings', [{ pin: state.settings.sync.pin, locations: state.settings.locations, silos: state.settings.silos, last_active_date: state.settings.lastActiveDate }], 'pin'),
  ];
  for(let i=0;i<steps.length;i++){
    await steps[i]();
    if(onProgress) onProgress(i+1, steps.length);
  }
}

async function pullFromSupabase(onProgress){
  const tables = ['one_time_tasks','recurring_tasks','task_completions','lists','list_items','health_logs','app_settings'];
  const results = {};
  for(let i=0;i<tables.length;i++){
    results[tables[i]] = await supaSelectAll(tables[i]);
    if(onProgress) onProgress(i+1, tables.length);
  }
  const { one_time_tasks:oneTimeRows, recurring_tasks:recurringRows, task_completions:completionRows,
          lists:listRows, list_items:itemRows, health_logs:healthRows, app_settings:settingsRows } = results;

  const hasAnyRemoteData = oneTimeRows.length || recurringRows.length || listRows.length;

  if(hasAnyRemoteData){
    state.tasks.oneTime = oneTimeRows.map(rowToOneTime);
    state.tasks.recurring = recurringRows.map(rowToRecurring);
    const completions = {};
    completionRows.forEach(r=>{
      if(!completions[r.task_id]) completions[r.task_id] = {};
      completions[r.task_id][r.completed_date] = { status: r.status || 'done', loggedAt: r.logged_at || null };
    });
    state.tasks.completions = completions;

    listRows.sort((a,b)=> (a.sort_order||0)-(b.sort_order||0));
    const itemsByList = {};
    itemRows.sort((a,b)=> (a.sort_order||0)-(b.sort_order||0)).forEach(r=>{
      if(!itemsByList[r.list_id]) itemsByList[r.list_id] = [];
      itemsByList[r.list_id].push({ id:r.id, text:r.text, category:r.category, done:!!r.done });
    });
    state.lists = listRows.map(l=>({ id:l.id, title:l.title, items: itemsByList[l.id] || [] }));

    state.health = healthRows.map(r=>({ date:r.log_date, water:r.water, no2:r.no2, calDeficit:r.cal_deficit }));

    if(settingsRows.length){
      state.settings.locations = settingsRows[0].locations || state.settings.locations;
      state.settings.silos = settingsRows[0].silos || state.settings.silos;
    }
    pendingCompletionDeletes.length = 0; // remote is now authoritative, drop any stale pending deletes

    await window.storage.set(STORAGE_KEYS.TASKS, JSON.stringify(state.tasks), false);
    await window.storage.set(STORAGE_KEYS.LISTS, JSON.stringify(state.lists), false);
    await window.storage.set(STORAGE_KEYS.HEALTH, JSON.stringify(state.health), false);
    await window.storage.set(STORAGE_KEYS.SETTINGS, JSON.stringify(state.settings), false);
  } else {
    // nothing remote yet — seed it from what we have locally
    await pushFullStateToSupabase(onProgress);
  }
}

async function testSupabaseConnection(url, anonKey, pin){
  const testUrl = `${url.replace(/\/$/,'')}/rest/v1/one_time_tasks?pin=eq.${encodeURIComponent(pin)}&limit=1`;
  const res = await fetchWithTimeout(testUrl, { headers: { apikey: anonKey, Authorization: `Bearer ${anonKey}` } }, 10000);
  if(!res.ok) throw new Error('Connection test failed: HTTP ' + res.status);
  return true;
}

async function safeGet(key){
  try{
    return await window.storage.get(key, false);
  } catch(e){
    return null;
  }
}

// Wraps window.storage.set with a couple of short retries before giving up —
// a transient rejection (e.g. two writes landing in the same instant) shouldn't
// mean a lost change. Returns true/false instead of throwing, and surfaces the
// real error message so a genuine failure is diagnosable without dev tools.
async function safeStorageSet(key, value, label){
  const delays = [0, 300, 900];
  let lastErr = null;
  for(let i=0;i<delays.length;i++){
    if(delays[i]) await new Promise(r=>setTimeout(r, delays[i]));
    try{
      await window.storage.set(key, value, false);
      return true;
    } catch(e){
      lastErr = e;
    }
  }
  console.error(`Local save failed for "${label||key}" after retries:`, lastErr);
  showToast(`⚠ Save failed: ${lastErr && lastErr.message ? lastErr.message : 'storage unavailable'}`);
  return false;
}

// Runs a list of {label, fn} sync steps sequentially, updating syncMeta
// progress (and the badge) after each so "syncing... 43%" is real progress,
// not a guess. Used by every save path so progress shows up everywhere.
// Serializes every sync push so two saves can never race each other. Without
// this, a slow/earlier save could still be holding a stale, larger snapshot
// of the data (e.g. a completion row that has since been unchecked) and
// overwrite a newer, smaller snapshot if it happens to finish later —
// resurrecting things that were just deleted. Queuing means only one sync
// runs at a time, and each one reads state fresh right when its turn comes
// (see the lazy `()=> ...` closures below), not from a snapshot taken back
// when the click happened.
let syncChain = Promise.resolve();
function enqueueSync(taskFn){
  const run = () => taskFn().catch(e=> console.error('queued sync task failed', e));
  syncChain = syncChain.then(run, run);
  return syncChain;
}

async function runSyncSteps(steps){
  markSyncDirty();
  state.syncMeta.progress = { current: 0, total: steps.length };
  updateSyncBadge();
  try{
    for(let i=0;i<steps.length;i++){
      await steps[i]();
      state.syncMeta.progress = { current: i+1, total: steps.length };
      updateSyncBadge();
    }
    await markSyncSuccess();
  } catch(e){
    console.error('sync step failed', e);
    await markSyncError(e.message||String(e));
  }
  updateSyncBadge();
}

async function saveTasks(){
  await safeStorageSet(STORAGE_KEYS.TASKS, JSON.stringify(state.tasks), 'tasks');
  if(syncConfigured()){
    await enqueueSync(()=> runSyncSteps([
      ()=> supaUpsert('one_time_tasks', state.tasks.oneTime.map(oneTimeToRow), 'id'),
      ()=> supaUpsert('recurring_tasks', state.tasks.recurring.map(recurringToRow), 'id'),
      ()=> flushPendingCompletionDeletes(),
      ()=> { const rows = buildCompletionRows(); return rows.length ? supaUpsert('task_completions', rows, 'pin,task_id,completed_date') : null; },
    ]));
  }
}
async function saveLists(){
  await safeStorageSet(STORAGE_KEYS.LISTS, JSON.stringify(state.lists), 'lists');
  if(syncConfigured()){
    await enqueueSync(()=> runSyncSteps([
      ()=> supaUpsert('lists', state.lists.map((l,i)=>listToRow(l,i)), 'id'),
      ()=> {
        const itemRows = [];
        state.lists.forEach(l=> l.items.forEach((it,i)=> itemRows.push(listItemToRow(it, l.id, i))));
        return itemRows.length ? supaUpsert('list_items', itemRows, 'id') : null;
      },
    ]));
  }
}
async function saveHealth(){
  await safeStorageSet(STORAGE_KEYS.HEALTH, JSON.stringify(state.health), 'health log');
  if(syncConfigured()){
    await enqueueSync(()=> runSyncSteps([
      ()=> supaUpsert('health_logs', state.health.map(healthToRow), 'pin,log_date'),
    ]));
  }
}
async function saveSettings(){
  await safeStorageSet(STORAGE_KEYS.SETTINGS, JSON.stringify(state.settings), 'settings');
  if(syncConfigured()){
    await enqueueSync(()=> runSyncSteps([
      ()=> supaUpsert('app_settings', [{ pin: state.settings.sync.pin, locations: state.settings.locations, silos: state.settings.silos, last_active_date: state.settings.lastActiveDate }], 'pin'),
    ]));
  }
}

/* ---------- ID generator ---------- */
function newId(prefix){
  return prefix + '_' + Date.now().toString(36) + Math.random().toString(36).slice(2,7);
}

/* ---------- Dynamic theming (accent color, completed color, dark mode) ---------- */
function darken(hex, amount){
  hex = hex.replace('#','');
  if(hex.length===3) hex = hex.split('').map(c=>c+c).join('');
  const num = parseInt(hex,16);
  let r = (num>>16) - Math.round(255*amount);
  let g = ((num>>8)&0xff) - Math.round(255*amount);
  let b = (num&0xff) - Math.round(255*amount);
  r = Math.max(0,Math.min(255,r)); g = Math.max(0,Math.min(255,g)); b = Math.max(0,Math.min(255,b));
  return '#' + [r,g,b].map(v=>v.toString(16).padStart(2,'0')).join('');
}
function applyDynamicTheme(){
  let styleEl = document.getElementById('dynamicTheme');
  if(!styleEl){
    styleEl = document.createElement('style');
    styleEl.id = 'dynamicTheme';
    document.head.appendChild(styleEl);
  }
  const accent = state.settings.accentColor || '#B9862F';
  const completed = state.settings.completedColor || '#3C7A73';
  styleEl.textContent = `
    :root{
      --brass: ${accent};
      --brass-deep: ${darken(accent, 0.18)};
      --completed-color: ${completed};
      --completed-deep: ${darken(completed, 0.2)};
    }
  `;
  document.body.classList.toggle('dark-mode', !!state.settings.darkMode);
}
function recurTypeColor(type){
  return (state.settings.recurTypeColors && state.settings.recurTypeColors[type]) || 'var(--teal)';
}

const SILO_FALLBACK_PALETTE = ['#B9862F','#3C7A73','#5C7999','#8E661F','#A0527A','#4C7A3D','#7C5CBF','#C1443D','#3A3F47'];
function siloColor(silo){
  if(!state.settings.siloColors) state.settings.siloColors = {};
  if(state.settings.siloColors[silo]) return state.settings.siloColors[silo];
  // stable fallback: hash the name so the same silo always gets the same color
  // even before it's been explicitly assigned one in Settings
  let hash = 0;
  for(let i=0;i<silo.length;i++) hash = (hash*31 + silo.charCodeAt(i)) >>> 0;
  return SILO_FALLBACK_PALETTE[hash % SILO_FALLBACK_PALETTE.length];
}

/* ---------- Toast ---------- */
let toastTimer = null;
function showToast(msg){
  let el = document.getElementById('toast');
  if(!el){
    el = document.createElement('div');
    el.id = 'toast';
    el.className = 'toast';
    document.body.appendChild(el);
  }
  el.textContent = msg;
  el.style.display = 'flex';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>{ el.style.display = 'none'; }, 2400);
}

function escapeHtml(s){
  if(s === null || s === undefined) return '';
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

/* =========================================================
   DATA QUERIES
   ========================================================= */
function getOverdueOneTime(){
  return state.tasks.oneTime
    .filter(oneTimeIsOverdue)
    .sort((a,b)=> a.due < b.due ? -1 : 1);
}

function matchesFilters(item){
  if(state.locationFilter !== 'All' && item.location !== state.locationFilter) return false;
  if(state.searchQuery){
    const q = state.searchQuery.toLowerCase();
    const hay = `${item.name} ${item.location} ${item.silo}`.toLowerCase();
    if(!hay.includes(q)) return false;
  }
  return true;
}

// Build the unified due-list for the dashboard given current filter window
function getDashboardTasks(){
  const sel = state.selectedDate;
  let windowDays = 0;
  if(state.dashboardFilter === 'Today') windowDays = 0;
  else if(state.dashboardFilter === 'Next7') windowDays = 7;
  else if(state.dashboardFilter === 'Next30') windowDays = 30;
  const endDate = addDays(sel, windowDays);

  const rows = [];

  // one-time tasks due within window (and not done)
  state.tasks.oneTime.forEach(t=>{
    if(t.done) return;
    if(!t.due) return;
    if(t.due >= sel && t.due <= endDate){
      rows.push({ kind:'oneTime', task:t, dueOn:t.due, overdue: oneTimeIsOverdue(t) });
    }
  });

  // completed-today one-time tasks stay visible (muted) in the Today view only,
  // regardless of their original due date — they drop off once the day rolls over.
  if(state.dashboardFilter === 'Today' && sel === todayStr()){
    state.tasks.oneTime.forEach(t=>{
      if(t.done && t.doneDate === todayStr()){
        rows.push({ kind:'oneTime', task:t, dueOn:t.due, overdue:false, completedToday:true });
      }
    });
  }

  // overdue one-time — only pinned when looking at "Today". When viewing a
  // specific past date, that date's own overdue task already appears above
  // via the normal due-within-window match, so it isn't duplicated here.
  if(sel === todayStr()){
    getOverdueOneTime().forEach(t=>{
      rows.push({ kind:'oneTime', task:t, dueOn:t.due, overdue:true });
    });
  }

  // recurring tasks — earliest occurrence within window
  state.tasks.recurring.forEach(t=>{
    for(let i=0;i<=windowDays;i++){
      const d = addDays(sel, i);
      if(isDueOn(t, d)){
        rows.push({ kind:'recurring', task:t, dueOn:d, overdue:false });
        break;
      }
    }
  });

  // dedupe overdue duplicates (a one-time task could theoretically be both overdue+in-window; overdue wins already separate list)
  const seen = new Set();
  const deduped = [];
  rows.forEach(r=>{
    const key = r.kind+'_'+r.task.id+'_'+(r.overdue?'OD':(r.completedToday?'DONE':'W'));
    if(seen.has(key)) return;
    seen.add(key);
    if(matchesFilters(r.task)) deduped.push(r);
  });

  // sort: overdue first, then normal tasks by due date/priority, completed-today last
  const prOrder = {High:0, Medium:1, Low:2};
  deduped.sort((a,b)=>{
    const aDone = !!a.completedToday, bDone = !!b.completedToday;
    if(aDone !== bDone) return aDone ? 1 : -1;
    if(a.overdue !== b.overdue) return a.overdue ? -1 : 1;
    if(a.dueOn !== b.dueOn) return a.dueOn < b.dueOn ? -1 : 1;
    return (prOrder[a.task.priority]??1) - (prOrder[b.task.priority]??1);
  });
  return deduped;
}

function countDueToday(){
  const sel = todayStr();
  let count = 0;
  state.tasks.oneTime.forEach(t=>{ if(!t.done && t.due === sel) count++; });
  state.tasks.recurring.forEach(t=>{ if(isDueOn(t, sel) && !isCompletedOn(t.id, sel)) count++; });
  return count;
}

function syncBadgeHtml(){
  if(!syncConfigured()){
    return `<div class="sync-badge off" title="Cross-device sync isn't set up">
      <span class="sync-badge-dot"></span>Local only
    </div>`;
  }
  const m = state.syncMeta;
  const relTime = m.lastSyncedAt ? timeAgo(m.lastSyncedAt) : 'never';
  if(m.status === 'syncing'){
    const pct = m.progress && m.progress.total ? Math.round((m.progress.current/m.progress.total)*100) : null;
    return `<div class="sync-badge syncing" title="Syncing with Supabase…">
      <span class="sync-badge-dot"></span>Syncing${pct!==null?` ${pct}%`:'…'}
    </div>`;
  }
  if(m.status === 'error' || m.dirty){
    return `<div class="sync-badge error" title="${escapeHtml(m.lastError||'Changes are waiting to sync')}" onclick="retrySync()">
      <span class="sync-badge-dot"></span>Sync pending — retry
    </div>`;
  }
  return `<div class="sync-badge on" title="Last synced ${relTime}">
    <span class="sync-badge-dot"></span>Synced ${relTime}
  </div>`;
}
function updateSyncBadge(){
  const el = document.getElementById('syncBadgeWrap');
  if(el) el.innerHTML = syncBadgeHtml();
}
function timeAgo(isoStr){
  const diffMs = Date.now() - new Date(isoStr).getTime();
  const mins = Math.floor(diffMs/60000);
  if(mins < 1) return 'just now';
  if(mins < 60) return `${mins}m ago`;
  const hrs = Math.floor(mins/60);
  if(hrs < 24) return `${hrs}h ago`;
  return `${Math.floor(hrs/24)}d ago`;
}
async function retrySync(){
  if(!syncConfigured()) return;
  state.syncMeta.status = 'syncing';
  updateSyncBadge();
  await enqueueSync(async ()=>{
    try{
      await pushFullStateToSupabase((cur,total)=>{
        state.syncMeta.progress = { current: cur, total };
        updateSyncBadge();
        renderMain(); // keeps the Settings-page progress line live too
      });
      await markSyncSuccess();
      showToast('Synced');
    } catch(e){
      console.error('Retry sync failed', e);
      await markSyncError(e.message||String(e));
      showToast('Sync retry failed — still saved locally');
    }
  });
  updateSyncBadge();
}

function renderGroupedTickets(rows, opts){
  opts = opts || {};
  if(rows.length === 0){
    return `<div class="card empty-state"><span class="glyph">☺</span>Nothing here. Clear runway ahead.</div>`;
  }
  const groups = {};
  rows.forEach(r=>{
    const loc = r.task.location || 'Unassigned';
    if(!groups[loc]) groups[loc] = [];
    groups[loc].push(r);
  });
  const locOrder = state.settings.locations.filter(l=>groups[l]).concat(Object.keys(groups).filter(l=>!state.settings.locations.includes(l)));
  return locOrder.map(loc=>{
    const groupRows = groups[loc];
    const collapsed = collapsedGroups.has(loc);
    const completedCount = groupRows.filter(isRowCompleted).length;
    const pct = groupRows.length ? Math.round((completedCount/groupRows.length)*100) : 0;
    return `
      <div class="group-block">
        <div class="group-header ${collapsed?'collapsed':''}" onclick="toggleGroupCollapse('${escapeHtml(loc)}')">
          <span class="caret">▾</span>
          <h3>${escapeHtml(loc)}</h3>
          <span class="group-count">${completedCount}/${groupRows.length} (${pct}%)</span>
        </div>
        <div class="group-body ${collapsed?'collapsed':''}">
          ${sortWithCompletedLast(groupRows).map(r=>renderTicket(r, Object.assign({hideLocation:true}, opts))).join('')}
        </div>
      </div>
    `;
  }).join('');
}

function isRowCompleted(row){
  return row.kind==='recurring' ? isCompletedOn(row.task.id, row.dueOn) : !!row.task.done;
}
function isRowResolved(row){
  // "resolved" = no longer needs attention today — either done or explicitly
  // flagged missed. Both sink to the bottom of their section.
  return isRowCompleted(row) || (row.kind==='recurring' && isMissedOn(row.task.id, row.dueOn));
}
function sortWithCompletedLast(rows){
  return rows.map((r,i)=>({r,i})).sort((a,b)=>{
    const aDone = isRowResolved(a.r), bDone = isRowResolved(b.r);
    if(aDone !== bDone) return aDone ? 1 : -1;
    return a.i - b.i; // stable: preserve original relative order otherwise
  }).map(x=>x.r);
}

function renderTicketList(rows, opts){
  if(rows.length === 0){
    return `<div class="card empty-state"><span class="glyph">☺</span>Nothing here. Clear runway ahead.</div>`;
  }
  return `<div class="ticket-list">${sortWithCompletedLast(rows).map(r=>renderTicket(r, opts)).join('')}</div>`;
}

function renderTicket(row, opts){
  opts = opts || {};
  const t = row.task;
  const isRecurring = row.kind === 'recurring';
  const dateForCompletion = row.dueOn;
  const completed = isRecurring ? isCompletedOn(t.id, dateForCompletion) : t.done;
  const missed = isRecurring && isMissedOn(t.id, dateForCompletion);
  const overdue = row.overdue;
  const streak = isRecurring ? computeStreak(t, addDays(dateForCompletion,-1)) : 0;
  const onTimeStats = isRecurring ? computeOnTimeStats(t) : null;

  const typeTag = isRecurring
    ? `<span class="tag recur" style="background:${recurTypeColor(t.type)}22; color:${recurTypeColor(t.type)};">${t.type} ↻</span>`
    : `<span class="tag tag-onetime">One-Time</span>`;

  const priTag = `<span class="tag pri-${t.priority}">${t.priority}</span>`;
  const siloTag = `<span class="tag" style="background:${siloColor(t.silo)}22; color:${siloColor(t.silo)};">${escapeHtml(t.silo)}</span>`;
  const locTag = opts.hideLocation ? '' : `<span class="tag">${escapeHtml(t.location)}</span>`;
  const statsTag = onTimeStats ? `<span class="tag stat-pill" title="${onTimeStats.total} logged occurrence${onTimeStats.total===1?'':'s'}">${onTimeStats.onTimePercent}% on-time${onTimeStats.avgDelayDays>0?` · +${onTimeStats.avgDelayDays}d avg`:''}</span>` : '';

  const dueLabel = isRecurring
    ? (t.detail ? `${t.type}${t.type==='Days of Week'||t.type==='Weekly'||t.type==='Bi-Weekly' ? ' · '+t.detail : ''}` : t.type)
    : humanDate(t.due);
  const nextDateTag = (opts.showNextDate && isRecurring)
    ? (()=>{ const n = nextOccurrenceDate(t); return n ? `<span class="tag next-date-tag">Next: ${humanDate(n)}</span>` : ''; })()
    : '';

  // one stamp at a time, priority: overdue > rescheduled > streak
  let stamp = '';
  if(overdue){
    stamp = `<div class="stamp overdue">Overdue</div>`;
  } else if(!isRecurring && t.dueHistory && t.dueHistory.length){
    stamp = `<div class="stamp reschedule" onclick="event.stopPropagation(); showRescheduleHistory('${t.id}')" title="Click to see previous dates">Rescheduled ${t.dueHistory.length}×</div>`;
  } else if(isRecurring && streak >= 2){
    stamp = `<div class="stamp streak">${streak} day streak</div>`;
  }

  const tickClass = completed ? 'checked' : (missed ? 'missed-tick' : '');
  const tickGlyph = missed ? '✕' : '✓';
  const missedBtn = isRecurring
    ? `<button class="icon-btn ${missed?'missed-active':''}" title="${missed?'Unmark missed':'Mark missed for this day'}" onclick="toggleMissedTask('${t.id}','${dateForCompletion}')">⚑</button>`
    : '';
  const selectBox = state.batchSelectMode
    ? `<button class="li-check select-check ${state.selectedTaskIds.has(t.id)?'checked':''}" onclick="toggleTaskSelected('${t.id}')">${state.selectedTaskIds.has(t.id)?'✓':''}</button>`
    : '';
  const tickBtn = opts.hideCheckbox
    ? ''
    : `<button class="tick-btn ${tickClass}" onclick="toggleComplete('${row.kind}','${t.id}','${dateForCompletion}')">${tickGlyph}</button>`;

  return `
    <div class="ticket ${completed?'done':''} ${overdue?'overdue':''} ${missed?'missed':''} ${opts.hideCheckbox?'no-tick':''}">
      ${stamp}
      ${selectBox}
      ${tickBtn}
      <div class="ticket-body">
        <div class="ticket-title-row">
          <span class="ticket-title">${escapeHtml(t.name)}</span>
        </div>
        <div class="ticket-meta">
          ${locTag}
          ${siloTag}
          ${typeTag}
          ${priTag}
          ${statsTag}
          ${nextDateTag}
          <span>${dueLabel}</span>
        </div>
      </div>
      <div class="ticket-actions">
        ${missedBtn}
        <button class="icon-btn" title="Edit" onclick="openTaskModal('${row.kind}','${t.id}')">✎</button>
        <button class="icon-btn" title="Delete" onclick="deleteTask('${row.kind}','${t.id}')">✕</button>
      </div>
    </div>
  `;
}

async function toggleComplete(kind, taskId, dateStr, isUndo){
  if(kind === 'oneTime'){
    const t = state.tasks.oneTime.find(x=>x.id===taskId);
    if(!t) return;
    const prevDone = t.done;
    t.done = !t.done;
    t.doneDate = t.done ? todayStr() : null;
    saveTasks(); // fire-and-forget: UI updates now, sync (local+remote) happens in the background
    if(!isUndo) pushUndo({ kind, taskId, dateStr, prevValue: prevDone, name: t.name });
  } else {
    const t = state.tasks.recurring.find(x=>x.id===taskId);
    if(!t) return;
    const cur = isCompletedOn(taskId, dateStr);
    toggleDone(taskId, dateStr);
    if(!isUndo) pushUndo({ kind, taskId, dateStr, prevValue: cur, name: t.name });
  }
  renderMain();
}

/* ---------- Undo (Ctrl+Z / Cmd+Z) ---------- */
function pushUndo(entry){
  state.undoStack.push(entry);
  if(state.undoStack.length > MAX_UNDO) state.undoStack.shift();
}
async function undoLast(){
  const entry = state.undoStack.pop();
  if(!entry) { showToast('Nothing to undo'); return; }
  if(entry.kind === 'oneTime'){
    const t = state.tasks.oneTime.find(x=>x.id===entry.taskId);
    if(t){ t.done = entry.prevValue; t.doneDate = t.done ? todayStr() : null; saveTasks(); }
  } else {
    setOccurrenceStatus(entry.taskId, entry.dateStr, entry.prevValue ? 'done' : null);
  }
  renderMain();
  showToast(`Undid: ${entry.name}`);
}
document.addEventListener('keydown', (e)=>{
  const isUndoCombo = (e.ctrlKey || e.metaKey) && (e.key === 'z' || e.key === 'Z');
  if(isUndoCombo && !e.shiftKey){
    // don't hijack undo while typing in a text field
    const tag = (document.activeElement && document.activeElement.tagName) || '';
    if(tag === 'INPUT' || tag === 'TEXTAREA') return;
    e.preventDefault();
    undoLast();
  }
  const isSaveCombo = (e.ctrlKey || e.metaKey) && e.key === 'Enter';
  if(isSaveCombo && document.getElementById('modalOverlay')){
    e.preventDefault();
    saveTaskModal();
  }
});

async function deleteTask(kind, taskId){
  if(!confirm('Delete this task? This cannot be undone.')) return;
  if(kind === 'oneTime'){
    state.tasks.oneTime = state.tasks.oneTime.filter(t=>t.id!==taskId);
  } else {
    state.tasks.recurring = state.tasks.recurring.filter(t=>t.id!==taskId);
    delete state.tasks.completions[taskId];
  }
  await saveTasks();
  if(syncConfigured()){
    await enqueueSync(()=> runSyncSteps([
      ()=> supaDeleteMatch(kind === 'oneTime' ? 'one_time_tasks' : 'recurring_tasks', `id=eq.${encodeURIComponent(taskId)}`),
      ()=> kind === 'recurring' ? supaDeleteMatch('task_completions', `task_id=eq.${encodeURIComponent(taskId)}`) : null,
    ]));
  }
  renderMain();
  showToast('Task deleted');
}
